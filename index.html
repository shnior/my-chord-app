<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chord Architect Pro - V11.1 Master</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #111418; --accent: #00f2ff; --gold: #f2cc60; --key-active: #ff2d55; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #e1e1e1; margin: 0; overflow: hidden; }
        .app-grid { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        
        .sidebar { background: var(--panel); padding: 20px; border-left: 1px solid #222; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 100; }
        .sidebar h2 { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 8px; margin-top: 20px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #888; font-weight: 600; }
        input, select { background: #1a1d23; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-size: 13px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }

        .main-content { padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }
        
        .display-unit { position: relative; width: 380px; height: 380px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1d23 0%, #05070a 80%); border-radius: 50%; border: 1px solid #222; }
        #chord-box { font-size: 110px; font-weight: 900; color: var(--gold); z-index: 10; text-shadow: 0 0 40px rgba(242,204,96,0.3); letter-spacing: -2px; }
        
        #progress-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--accent); transform: scale(0); transition: transform 0.1s linear; filter: drop-shadow(0 0 12px var(--accent)); pointer-events: none; }

        .chord-history { width: 90%; max-height: 100px; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 15px; overflow-x: auto; display: flex; gap: 10px; align-items: center; border: 1px solid #222; scroll-behavior: smooth; }
        .history-item { background: #1c2128; padding: 10px 18px; border-radius: 6px; font-weight: 800; border-right: 4px solid var(--accent); min-width: 65px; color: #fff; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .piano-container { width: 100%; padding: 25px 0; background: #000; border-top: 1px solid #222; }
        .piano { display: flex; justify-content: center; direction: ltr; position: relative; }
        .key { width: 44px; height: 180px; background: #fafafa; border: 1px solid #000; border-radius: 0 0 6px 6px; position: relative; cursor: pointer; transition: 0.05s; }
        .key.black { width: 30px; height: 110px; background: #1a1a1a; margin-left: -15px; margin-right: -15px; z-index: 2; border-radius: 0 0 4px 4px; border: 1px solid #000; }
        .key.active { background: var(--key-active) !important; box-shadow: 0 0 35px var(--key-active); transform: translateY(4px); }

        #start-btn { background: var(--accent); color: #000; border: none; padding: 18px; font-size: 16px; font-weight: 800; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        #start-btn:hover:not(:disabled) { background: #fff; box-shadow: 0 0 25px var(--accent); transform: translateY(-2px); }
        #start-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        audio { width: 100%; margin-top: 15px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }
    </style>
</head>
<body>

<div class="app-grid">
    <div class="sidebar">
        <h2>DSP Engine</h2>
        <div class="control-group"><label>BPM (קצב)</label><input type="number" id="bpm" value="120" min="40" max="250"></div>
        <div class="control-group"><label>משקל</label><select id="sig"><option value="4">4/4</option><option value="3">3/4</option><option value="6">6/8</option></select></div>
        <div class="control-group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
        
        <h2>Audio Profile</h2>
        <div class="control-group"><label>צליל פסנתר</label><select id="wave"><option value="triangle">Triangle (Classic)</option><option value="sine">Sine (Soft)</option><option value="square">Square (8-Bit)</option></select></div>
        <div class="control-group"><label>ווליום קליק</label><input type="range" id="vol" min="0" max="100" value="35"></div>
        <button id="clickBtn" style="background:#222; color:#fff; border:1px solid #444; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold;">🔊 מטרונום כבוי</button>
        
        <div style="flex-grow: 1;"></div>
        <input type="file" id="fileIn" style="display:none" accept="audio/*">
        <button onclick="document.getElementById('fileIn').click()" style="background:#1c2128; color:var(--accent); border:1px solid var(--accent); padding:12px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:10px;">בחר קובץ מוזיקה</button>
        <button id="start-btn" disabled>הפעל מערכת - START</button>
        <audio id="audio" controls></audio>
    </div>

    <div class="main-content">
        <div class="display-unit">
            <div id="progress-ring"></div>
            <p id="chord-box">--</p>
            <div id="beat-text" style="position:absolute; bottom:50px; font-weight:900; color:var(--accent); font-family:monospace; font-size:20px; letter-spacing:3px;">WAITING</div>
        </div>

        <div class="chord-history" id="history">
            <span style="color:#555; font-size:11px; font-weight:bold; text-transform:uppercase; margin-left:10px;">CHART:</span>
        </div>

        <div class="piano-container">
            <div class="piano" id="piano"></div>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), chordBox = document.getElementById('chord-box'), ring = document.getElementById('progress-ring');
    const historyDiv = document.getElementById('history'), beatText = document.getElementById('beat-text'), piano = document.getElementById('piano');
    let ctx, source, analyzer, clickOn = false, lastBeat = -1, measureChords = [], lastAddedChord = "";

    // יצירת מקלדת
    const pattern = [0,1,0,1,0,0,1,0,1,0,1,0];
    for(let i=0; i<24; i++){
        const k = document.createElement('div');
        k.className = `key ${pattern[i%12] ? 'black' : ''}`;
        k.dataset.note = i;
        k.onmousedown = (e) => { e.preventDefault(); playSynth(i); };
        piano.appendChild(k);
    }

    function playSynth(i) {
        if(!ctx) ctx = new AudioContext();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = document.getElementById('wave').value;
        osc.frequency.setValueAtTime(261.63 * Math.pow(2, i/12), ctx.currentTime);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.7);
        osc.connect(g).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.7);
    }

    document.getElementById('fileIn').onchange = (e) => { 
        if(e.target.files[0]) { 
            audio.src = URL.createObjectURL(e.target.files[0]); 
            document.getElementById('start-btn').disabled = false;
            beatText.innerText = "READY";
        } 
    };

    document.getElementById('clickBtn').onclick = (e) => {
        clickOn = !clickOn;
        e.target.innerText = clickOn ? "🔊 מטרונום פעיל" : "🔊 מטרונום כבוי";
        e.target.style.background = clickOn ? "var(--accent)" : "#222";
        e.target.style.color = clickOn ? "#000" : "#fff";
    };

    document.getElementById('start-btn').onclick = async () => {
        if(!ctx) ctx = new AudioContext();
        if(ctx.state === 'suspended') await ctx.resume();
        if(!source) { source = ctx.createMediaElementSource(audio); source.connect(ctx.destination); }

        if(analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                if(audio.paused) return;

                const bpm = Math.max(1, parseInt(document.getElementById('bpm').value) || 120);
                const sig = parseInt(document.getElementById('sig').value) || 4;
                const beatSec = 60 / bpm;
                const totalBeats = Math.floor(audio.currentTime / beatSec);
                const beatInBar = (totalBeats % sig) + 1;
                
                // אנימציית טבעת חלקה
                const beatProgress = (audio.currentTime % beatSec) / beatSec;
                ring.style.transform = `scale(${beatProgress})`;
                ring.style.opacity = 1 - beatProgress;

                if(totalBeats !== lastBeat) {
                    if(clickOn) {
                        const osc = ctx.createOscillator(), g = ctx.createGain();
                        osc.frequency.value = beatInBar === 1 ? 1000 : 500;
                        g.gain.value = document.getElementById('vol').value / 400;
                        osc.connect(g).connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.05);
                    }
                    
                    beatText.innerText = `BEAT ${beatInBar}`;

                    if(beatInBar === 1 && measureChords.length > 0) {
                        const counts = {};
                        measureChords.forEach(x => counts[x] = (counts[x] || 0) + 1);
                        const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                        chordBox.innerText = winner;
                        updatePiano(winner);
                        if(winner !== lastAddedChord) {
                            addHistory(winner);
                            lastAddedChord = winner;
                        }
                        measureChords = []; // איפוס תיבה
                    }
                    lastBeat = totalBeats;
                }

                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const chords = [{n:'', p:[4,7]}, {n:'m', p:[3,7]}];
                const trans = parseInt(document.getElementById('trans').value);
                let best = "---", top = 0.42;

                for(let r=0; r<12; r++) {
                    for(let c of chords) {
                        let score = (f.chroma[r] + f.chroma[(r+c.p[0])%12] + f.chroma[(r+c.p[1])%12]) / 3;
                        if(score > top) { top = score; best = notes[(r+trans+12)%12] + c.n; }
                    }
                }
                if(best !== "---") measureChords.push(best);
            }
        });
        analyzer.start();
        audio.play();
    };

    function addHistory(chord) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = chord;
        historyDiv.appendChild(item);
        historyDiv.scrollTo({ left: historyDiv.scrollWidth, behavior: 'smooth' });
    }

    function updatePiano(chord) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const root = chord.replace('m',''), rootIdx = notes.indexOf(root);
        if(rootIdx === -1) return;
        const intervals = chord.includes('m') ? [0,3,7] : [0,4,7];
        intervals.forEach(i => {
            const n = (rootIdx + i) % 12;
            document.querySelectorAll(`.key[data-note="${n}"], .key[data-note="${n+12}"]`).forEach(k => k.classList.add('active'));
        });
    }
</script>
</body>
</html>
