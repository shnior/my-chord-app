<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Platinum v22.2 | Shneior Eisenbach</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root {
            --bg: #030508; --panel: #0a0d12; --accent: #00f2ff;
            --gold: #ffcc00; --red: #ff3e3e; --border: #1f2937;
            --text: #f3f4f6; --gray: #9ca3af;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 1fr 280px; height: 100vh; overflow: hidden; }

        /* Sidebar - Pro Controls */
        aside {
            grid-row: 1 / -1; background: var(--panel); border-left: 1px solid var(--border);
            padding: 25px; display: flex; flex-direction: column; gap: 20px; z-index: 50;
        }
        .logo { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        .logo h1 { font-size: 22px; color: var(--accent); margin: 0; letter-spacing: 1px; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .label { font-size: 10px; color: var(--gray); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .val { font-size: 32px; font-weight: 900; text-align: center; color: #fff; font-family: monospace; }

        /* Main Display */
        main { grid-column: 2; grid-row: 1; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111827 0%, #030508 100%); }
        .display-unit { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        #chord-main { font-size: 240px; font-weight: 950; color: var(--gold); text-shadow: 0 0 60px rgba(255,204,0,0.4); line-height: 0.8; }
        #chord-sub { font-size: 36px; color: var(--accent); font-weight: 300; margin-top: 10px; }

        /* Waveform & Visualizer */
        #visual-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 50%; opacity: 0.15; pointer-events: none; }
        #waveform-area { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 180px; 
            background: rgba(0,0,0,0.3); border-top: 1px solid var(--border); cursor: pointer;
        }
        #waveform-canvas { width: 100%; height: 100%; opacity: 0.6; }

        /* Footer */
        footer { grid-column: 2; grid-row: 2; background: #000; border-top: 2px solid var(--border); padding: 15px; display: grid; grid-template-rows: auto 1fr; gap: 10px; }
        .history { display: flex; gap: 10px; overflow-x: auto; padding: 10px; direction: ltr; scrollbar-width: none; }
        .tag { background: var(--panel); border: 1px solid var(--border); padding: 8px 18px; border-radius: 6px; color: var(--accent); font-weight: 900; font-size: 20px; }

        .piano { display: flex; justify-content: center; height: 120px; direction: ltr; padding-bottom: 10px; }
        .key { width: 45px; background: #fff; border: 1px solid #333; border-radius: 0 0 5px 5px; position: relative; transition: 0.1s; }
        .key.b { width: 30px; background: #1a1a1a; height: 75px; margin-left: -15px; margin-right: -15px; z-index: 5; border-radius: 0 0 3px 3px; }
        .key.active { background: var(--red) !important; box-shadow: 0 10px 30px var(--red); transform: translateY(5px); border: none; }

        /* UI Elements */
        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.2); }
        .btn:disabled { opacity: 0.1; cursor: not-allowed; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
    </style>
</head>
<body>

<aside>
    <div class="logo"><h1>MAESTRO V22.2</h1><span>PRO CHORD ENGINE</span></div>
    
    <div class="card"><span class="label">BPM</span><div id="bpm-val" class="val">---</div></div>
    
    <div class="card">
        <span class="label">טרנספוזיציה</span>
        <input type="number" id="trans-val" value="0" style="width:100%; background:0; border:1px solid var(--border); color:#fff; text-align:center; font-size:24px; border-radius:8px;">
    </div>

    <div class="card">
        <span class="label">ווליום מאסטר</span>
        <input type="range" id="vol" min="0" max="100" value="80">
    </div>

    <div id="midi-info" style="font-size:12px; color:var(--gold); text-align:center; font-weight:bold;">מחפש MIDI...</div>

    <button class="btn" style="background:#21262d; color:#fff;" onclick="document.getElementById('audio-in').click()">טען קובץ שמע</button>
    <input type="file" id="audio-in" style="display:none" accept="audio/*">
    <button id="play-btn" class="btn" disabled>הפעל מערכת</button>
    
    <div id="clock" style="margin-top:auto; text-align:center; font-family:monospace; color:var(--gray);">00:00 / 00:00</div>
</aside>

<main>
    <canvas id="visual-canvas"></canvas>
    <div id="waveform-area" title="לחץ כדי לקפוץ בזמן">
        <canvas id="waveform-canvas"></canvas>
    </div>
    <div class="display-unit">
        <div id="chord-main">--</div>
        <div id="chord-sub">ממתין לפקודה</div>
    </div>
</main>

<footer>
    <div class="history" id="hist"></div>
    <div class="piano" id="p-keys"></div>
</footer>

<script>
/**
 * MAESTRO PLATINUM ENGINE v22.2
 * ALL-IN-ONE SOLUTION
 */

let aCtx, source, analyser, meyda, masterGain;
let player = new Audio();
let isEngaged = false;
const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const notesHeb = ["דו", "דו#", "רה", "רה#", "מי", "פה", "פה#", "סול", "סול#", "לה", "לה#", "סי"];

// 1. יצירת קלידים
const piano = document.getElementById('p-keys');
const bKeys = [1, 3, 6, 8, 10];
for(let i=0; i<36; i++) {
    const k = document.createElement('div');
    k.className = `key ${bKeys.includes(i%12) ? 'b' : ''}`;
    k.dataset.note = i;
    piano.appendChild(k);
}

// 2. ניהול קבצים ו-Waveform אינטראקטיבי
document.getElementById('audio-in').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    player.src = URL.createObjectURL(file);
    document.getElementById('chord-sub').innerText = "מנתח שיר...";
    
    // ניתוח מקדים לגל קול
    const buffer = await file.arrayBuffer();
    const tempCtx = new OfflineAudioContext(1, 44100 * 300, 44100);
    const audioBuffer = await tempCtx.decodeAudioData(buffer);
    drawWaveform(audioBuffer);
    
    document.getElementById('play-btn').disabled = false;
    document.getElementById('chord-sub').innerText = "מוכן לנגינה";
};

// קפיצה בזמן בלחיצה על הגל
document.getElementById('waveform-area').onclick = (e) => {
    if(!player.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    player.currentTime = pct * player.duration;
};

// 3. מנוע זיהוי אקורדים (גרסה רגישה)
class ChordEngine {
    constructor() {
        this.buffer = [];
        this.limit = 3; // רגישות: מספיק 2-3 דגימות זהות כדי להחליף אקורד
    }

    process(chroma) {
        const trans = parseInt(document.getElementById('trans-val').value);
        let best = { s: 0.45, n: "--", h: "" };

        const types = [
            {n:"", p:[4,7], h:"מז'ור"}, {n:"m", p:[3,7], h:"מינור"},
            {n:"7", p:[4,10], h:"7"}, {n:"maj7", p:[4,11], h:"מז'ור 7"}
        ];

        for(let r=0; r<12; r++) {
            types.forEach(t => {
                let score = (chroma[r] * 1.5 + chroma[(r+t.p[0])%12] + chroma[(r+t.p[1])%12]) / 3.5;
                if(score > best.s) {
                    best.s = score;
                    const root = notes[(r + trans + 12) % 12];
                    best.n = root + t.n;
                    best.h = notesHeb[(r + trans + 12) % 12] + " " + t.h;
                }
            });
        }

        this.buffer.push(best.n);
        if(this.buffer.length > this.limit) this.buffer.shift();
        
        const mode = this.buffer.sort((a,b) =>
            this.buffer.filter(v => v===a).length - this.buffer.filter(v => v===b).length
        ).pop();

        if(mode !== "--" && document.getElementById('chord-main').innerText !== mode) {
            this.updateUI(mode, best.h);
        }
    }

    updateUI(n, h) {
        document.getElementById('chord-main').innerText = n;
        document.getElementById('chord-sub').innerText = h;
        const tag = document.createElement('div');
        tag.className = 'tag'; tag.innerText = n;
        const hRail = document.getElementById('hist');
        hRail.prepend(tag);
        if(hRail.children.length > 20) hRail.lastChild.remove();
        this.lightPiano(n);
    }

    lightPiano(chord) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const root = chord.replace(/m|7|maj7/g, '');
        const rIdx = notes.indexOf(root);
        let intervals = [0, 4, 7];
        if(chord.includes('m')) intervals = [0, 3, 7];
        if(chord.includes('7')) intervals.push(10);
        
        intervals.forEach(i => {
            const n = (rIdx + i) % 12;
            document.querySelectorAll(`.key[data-note="${n}"], .key[data-note="${n+12}"], .key[data-note="${n+24}"]`)
                    .forEach(k => k.classList.add('active'));
        });
    }
}
const engine = new ChordEngine();

// 4. אתחול Audio
document.getElementById('play-btn').onclick = async () => {
    if(!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
    await aCtx.resume();
    
    masterGain = aCtx.createGain();
    analyser = aCtx.createAnalyser();
    masterGain.connect(analyser).connect(aCtx.destination);
    
    source = aCtx.createMediaElementSource(player);
    source.connect(masterGain);

    meyda = Meyda.createMeydaAnalyzer({
        audioContext: aCtx, source: source, bufferSize: 8192,
        featureExtractors: ['chroma'],
        callback: (f) => engine.process(f.chroma)
    });

    meyda.start();
    player.play();
    isEngaged = true;
    loop();
};

// 5. ויזואליזציה (ספקטרום וגל קול)
function drawWaveform(buffer) {
    const canvas = document.getElementById('waveform-canvas');
    const ctx = canvas.getContext('2d');
    const data = buffer.getChannelData(0);
    const step = Math.ceil(data.length / canvas.width);
    canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
    ctx.clearRect(0,0, canvas.width, canvas.height);
    ctx.strokeStyle = '#00f2ff';
    ctx.beginPath();
    for(let i=0; i<canvas.width; i++) {
        let min = 1, max = -1;
        for(let j=0; j<step; j++) {
            const d = data[(i*step)+j];
            if(d < min) min = d; if(d > max) max = d;
        }
        ctx.moveTo(i, (1+min)*canvas.height/2);
        ctx.lineTo(i, (1+max)*canvas.height/2);
    }
    ctx.stroke();
}

function loop() {
    if(!isEngaged) return;
    
    // ויזואליזציה עליונה
    const vCanvas = document.getElementById('visual-canvas');
    const vCtx = vCanvas.getContext('2d');
    const fData = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(fData);
    vCanvas.width = vCanvas.clientWidth; vCanvas.height = vCanvas.clientHeight;
    vCtx.fillStyle = '#00f2ff';
    const bw = vCanvas.width / 100;
    for(let i=0; i<100; i++) {
        const h = (fData[i]/255) * vCanvas.height;
        vCtx.fillRect(i*bw, vCanvas.height-h, bw-1, h);
    }

    // עדכון זמן ו-Seek bar
    const fmt = (s) => new Date(s * 1000).toISOString().substr(14, 5);
    document.getElementById('clock').innerText = `${fmt(player.currentTime)} / ${fmt(player.duration)}`;
    
    // ווליום
    masterGain.gain.value = document.getElementById('vol').value / 100;
    
    requestAnimationFrame(loop);
}

// 6. MIDI ל-Tyros 5
if(navigator.requestMIDIAccess) {
    navigator.requestMIDIAccess().then(m => {
        const ins = m.inputs.values();
        for(let i of ins) {
            document.getElementById('midi-info').innerText = "מחובר ל: " + i.name;
            i.onmidimessage = (msg) => {
                const [s, n, v] = msg.data;
                const k = document.querySelector(`.key[data-note="${n-36}"]`);
                if(s === 144 && v > 0) k?.classList.add('active');
                else if(s === 128 || (s === 144 && v === 0)) k?.classList.remove('active');
            };
        }
    });
}
</script>
</body>
</html>
