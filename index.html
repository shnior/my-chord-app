<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAESTRO PRO AI</title>
<script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>

<style>
:root{
--bg:#05070a;--panel:#0d1117;--accent:#00f2ff;
--gold:#ffcc00;--red:#ff3e3e;--border:#30363d;
--text:#e6edf3;
}
body{margin:0;background:#000;color:#fff;font-family:sans-serif;display:flex;height:100vh}
aside{width:320px;background:#111;padding:15px;display:flex;flex-direction:column;gap:10px}
main{flex:1;display:flex;flex-direction:column}

#chord-main{
font-size:120px;
font-weight:900;
text-align:center;
color:var(--gold);
transition:all .25s,opacity .2s;
}

.player-bar{padding:10px;background:#111;text-align:center}
button{padding:10px;margin:5px;border:none;background:#00f2ff;color:#000;font-weight:bold;cursor:pointer}

.key{width:40px;height:120px;background:white;border:1px solid #000;display:inline-block}
.key.active{background:red}

</style>
</head>

<body>

<aside>

<button onclick="document.getElementById('audio').click()">טען שיר</button>
<input type="file" id="audio" accept="audio/*" hidden>

<div>BPM: <span id="bpm">---</span></div>
<div>KEY: <span id="key">---</span></div>

<button onclick="toggleAI()">AI BOOST</button>
<button onclick="autoTranspose()">AUTO KEY</button>

</aside>

<main>

<div id="chord-main">--</div>

<div class="player-bar">
<button onclick="togglePlay()">▶</button>
</div>

<div id="piano"></div>

</main>

<script>

let ctx,src,meyda;
let player=new Audio();
let currentBPM=120;
let aiBoost=false;
let smoothed=new Array(12).fill(0.1);

const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const chords=[
{n:"",p:[0,4,7]},
{n:"m",p:[0,3,7]},
{n:"7",p:[0,4,10]},
{n:"dim",p:[0,3,6]},
{n:"aug",p:[0,4,8]}
];

document.getElementById("audio").onchange=async e=>{
player.src=URL.createObjectURL(e.target.files[0]);
}

function init(){
ctx=new AudioContext();
src=ctx.createMediaElementSource(player);
meyda=Meyda.createMeydaAnalyzer({
audioContext:ctx,
source:src,
bufferSize:8192,
featureExtractors:["chroma"],
callback:analyze
});
meyda.start();
}

function togglePlay(){
if(!ctx) init();
player.paused?player.play():player.pause();
}

function toggleAI(){
aiBoost=!aiBoost;
}

function analyze(f){

let chroma=[...f.chroma];

if(aiBoost){
for(let i=0;i<12;i++){
smoothed[i]=smoothed[i]*0.9+chroma[i]*0.1;
smoothed[i]=Math.pow(smoothed[i],1.5);
}
chroma=smoothed;
}

let best={score:0,name:"--"};
let second={score:0};

for(let r=0;r<12;r++){
chords.forEach(c=>{
let score=chroma[r]*1.2;
c.p.forEach(i=>{
score+=chroma[(r+i)%12];
});

if(score>best.score){
second=best;
best={score,name:notes[r]+c.n};
}
else if(score>second.score){
second={score};
}
});
}

let confidence=best.score/(second.score+0.001);
if(confidence<1.15) return;

// bass
let bass=chroma.indexOf(Math.max(...chroma));
if(bass!==notes.indexOf(best.name[0])){
best.name+="/"+notes[bass];
}

updateUI(best);
detectKey(chroma);

}

function updateUI(best){
let el=document.getElementById("chord-main");
if(el.innerText===best.name)return;

el.style.opacity=0;
setTimeout(()=>{
el.innerText=best.name;
el.style.opacity=1;
},80);

updatePiano(best.name);
}

function updatePiano(ch){
document.querySelectorAll(".key").forEach(k=>k.classList.remove("active"));

let root=notes.indexOf(ch[0]);

[0,4,7].forEach(i=>{
let n=(root+i)%12;
document.querySelectorAll(".key").forEach(k=>{
if(k.dataset.note%12==n)k.classList.add("active");
});
});
}

function detectKey(chroma){
let max=chroma.indexOf(Math.max(...chroma));
document.getElementById("key").innerText=notes[max];
}

function autoTranspose(){
let k=document.getElementById("key").innerText;
let idx=notes.indexOf(k);
alert("Transpose: "+(-idx));
}

// piano
let p=document.getElementById("piano");
for(let i=0;i<24;i++){
let k=document.createElement("div");
k.className="key";
k.dataset.note=i;
p.appendChild(k);
}

</script>

</body>
</html>
