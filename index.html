<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>מזהה אקורדים מקצועי</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>

        .card { background: #1e1e1e; border-radius: 20px; padding: 30px; max-width: 500px; margin: 40px auto; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.7); }
        h1 { margin-bottom: 10px; font-size: 28px; }
        .upload-section { margin: 25px 0; border: 2px dashed #444; padding: 20px; border-radius: 12px; }
        input[type="file"] { width: 100%; color: #aaa; cursor: pointer; }
        #start-btn { background: #007bff; color: white; border: none; padding: 18px 60px; font-size: 22px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 20px; box-shadow: 0 5px 20px rgba(0,123,255,0.4); }
        #start-btn:hover { background: #0056b3; transform: scale(1.05); }
        #start-btn:active { transform: scale(0.95); }
        #chord-result { font-size: 4.5em; color: #ffeb3b; margin: 25px 0; min-height: 1.2em; text-shadow: 0 0 25px rgba(255,235,59,0.5); font-weight: 800; }
        .visualizer { display: flex; justify-content: center; gap: 8px; height: 120px; align-items: flex-end; margin-bottom: 25px; }
        .bar { width: 22px; background: #4CAF50; transition: height 0.1s; border-radius: 5px 5px 0 0; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 11px; color: #888; margin-top: 5px; font-weight: bold; }
        audio { width: 100%; margin-top: 20px; border-radius: 30px; }
    </style>
</head>
<body>

    <div class="upload-section">
        <input type="file" id="audio-file" accept="audio/*">
    </div>

    <div class="visualizer" id="visualizer">

    <button id="start-btn">התחל ניתוח</button>
    
    <div id="audio-container" style="margin-top:20px; display:none;">
        <audio id="audio-player" controls></audio>
    </div>
</div>
