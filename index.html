<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAESTRO ULTIMATE v29.0</title>

<script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<style>
:root {
  --bg:#05070a; --panel:#0d1117; --accent:#00f2ff;
  --gold:#ffcc00; --text:#e6edf3;
}
body {
  margin:0; display:grid;
  grid-template-columns:320px 1fr;
  height:100vh; background:var(--bg); color:var(--text);
  font-family:sans-serif;
}
aside {
  background:var(--panel);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
button {
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}
.btn-main {
  background:linear-gradient(45deg,#ff00ff,#00ffaa,#ffff00);
  color:#000;
}
</style>
</head>

<body>

<aside>
  <h2>MAESTRO ULTIMATE</h2>

  <button class="btn-main" onclick="loadAudio()">טען קובץ</button>
  <input type="file" id="audioInput" hidden accept="audio/*">

  <button onclick="voiceClone()">🎙️ Voice Clone</button>
  <button onclick="cloudSync()">☁️ Cloud Sync</button>
  <button onclick="startStudio()">🎥 8K Studio</button>
  <button onclick="exportAll()">💾 Export</button>

  <div>BPM: <span id="bpm">---</span></div>
  <div>Key: <span id="key">---</span></div>
</aside>

<main>
  <canvas id="wave"></canvas>
</main>

<script>
const state = {
  audioCtx: null,
  audioBuffer: null,
  source: null,
  isPlaying: false,
  cloned: false
};

// ================= AUDIO =================
function loadAudio() {
  document.getElementById("audioInput").click();
}

document.getElementById("audioInput").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const arrayBuffer = await file.arrayBuffer();
    state.audioCtx = new AudioContext();
    state.audioBuffer = await state.audioCtx.decodeAudioData(arrayBuffer);

    analyzeAudio(state.audioBuffer);
    alert("✅ קובץ נטען בהצלחה");
  } catch (err) {
    console.error(err);
    alert("שגיאה בטעינת הקובץ");
  }
});

// ================= ANALYSIS =================
function analyzeAudio(buffer) {
  try {
    const signal = buffer.getChannelData(0);

    const features = Meyda.extract(["rms","spectralCentroid"], signal);

    document.getElementById("bpm").textContent =
      Math.round(features.rms * 100);

    document.getElementById("key").textContent =
      features.spectralCentroid.toFixed(0);
  } catch (err) {
    console.error(err);
  }
}

// ================= VOICE =================
function voiceClone() {
  if (state.cloned) return alert("כבר הופעל");

  try {
    const msg = new SpeechSynthesisUtterance("שלום, אני הקול שלך");
    msg.lang = "he-IL";
    speechSynthesis.speak(msg);

    state.cloned = true;
  } catch (err) {
    console.error(err);
  }
}

// ================= CLOUD =================
function cloudSync() {
  console.log("Syncing...");
  alert("☁️ Sync הופעל (דמו)");
}

// ================= STUDIO =================
async function startStudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    const video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.style.width = "100%";

    document.querySelector("main").appendChild(video);
  } catch (err) {
    console.error(err);
    alert("אין גישה למצלמה");
  }
}

// ================= EXPORT =================
function exportAll() {
  alert("💾 Export בוצע (דמו)");
}

// ================= INIT =================
window.onload = () => {
  console.log("MAESTRO READY");
};
</script>

</body>
</html>
