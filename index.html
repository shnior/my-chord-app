<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAESTRO PRO AI</title>
<script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:sans-serif;display:flex;height:100vh}
aside{width:300px;background:#121821;padding:15px;display:flex;flex-direction:column;gap:10px}
main{flex:1;display:flex;flex-direction:column}

#chord{font-size:120px;text-align:center;color:#ffcc00}
.timeline{display:flex;gap:5px;overflow-x:auto;padding:10px}
.tag{border:1px solid cyan;padding:5px}

.piano{display:flex;justify-content:center}
.key{width:40px;height:120px;background:white;border:1px solid #000}
.key.active{background:red}
</style>
</head>

<body>

<aside>
<button id="loadBtn">טען שיר</button>
<input type="file" id="file" hidden>

<div>BPM: <span id="bpm">---</span></div>
<div>KEY: <span id="key">---</span></div>

<button id="aiBtn">AI BOOST</button>
</aside>

<main>

<div id="chord">--</div>

<div style="text-align:center">
<button id="playBtn">▶</button>
</div>

<div class="timeline" id="timeline"></div>
<div class="piano" id="piano"></div>

</main>

<script>

const fileInput = document.getElementById("file");
const loadBtn = document.getElementById("loadBtn");
const playBtn = document.getElementById("playBtn");
const timeline = document.getElementById("timeline");

let audio = new Audio();
let ctx, src, gain, meyda;

let chromaHist = [];
let lastChord = "--";
let stability = 0;
let ai = false;

const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const templates = [
{name:"", i:[0,4,7]},
{name:"m", i:[0,3,7]},
{name:"7", i:[0,4,7,10]},
{name:"maj7", i:[0,4,7,11]},
{name:"m7", i:[0,3,7,10]}
];

loadBtn.onclick = () => fileInput.click();

fileInput.onchange = e => {
audio.src = URL.createObjectURL(e.target.files[0]);
};

playBtn.onclick = () => {
if(!ctx) initAudio();
audio.paused ? audio.play() : audio.pause();
};

document.getElementById("aiBtn").onclick = () => ai = !ai;

function initAudio(){
ctx = new AudioContext();
src = ctx.createMediaElementSource(audio);
gain = ctx.createGain();

src.connect(gain).connect(ctx.destination);

meyda = Meyda.createMeydaAnalyzer({
audioContext: ctx,
source: src,
bufferSize: 8192,
featureExtractors: ["chroma"],
callback: analyze
});

meyda.start();
}

function analyze(f){

// ממוצע זמן
chromaHist.push(f.chroma);
if(chromaHist.length > 6) chromaHist.shift();

let chroma = new Array(12).fill(0);
chromaHist.forEach(c=>{
for(let i=0;i<12;i++) chroma[i]+=c[i];
});
chroma = chroma.map(v => v / chromaHist.length);

// AI boost
if(ai){
chroma = chroma.map(v => Math.pow(v, 1.4));
}

// זיהוי אקורד
let best = {score:-999, name:"--"};
let second = {score:-999};

for(let r=0;r<12;r++){
templates.forEach(t=>{
let score = 0;

t.i.forEach(i=>{
score += chroma[(r+i)%12]*1.2;
});

for(let i=0;i<12;i++){
if(!t.i.includes((i-r+12)%12)){
score -= chroma[i]*0.25;
}
}

if(score > best.score){
second = best;
best = {score, name: notes[r]+t.name};
}
else if(score > second.score){
second = {score};
}
});
}

let conf = best.score/(second.score+0.001);
if(conf < 1.1) return;

// ROOT FIX (# support)
let rootMatch = best.name.match(/^([A-G]#?)/);
let root = rootMatch ? rootMatch[1] : "C";
let rootIndex = notes.indexOf(root);

// Bass
let bass = chroma.indexOf(Math.max(...chroma));
if(bass !== rootIndex){
best.name += "/" + notes[bass];
}

// Stability
if(best.name === lastChord){
stability++;
} else {
stability = 0;
}

if(stability < 2) return;

lastChord = best.name;

updateUI(best.name);
updateKey(chroma);
}

function updateUI(ch){

const el = document.getElementById("chord");

if(el.innerText === ch) return;

el.innerText = ch;

// timeline
let tag = document.createElement("div");
tag.className = "tag";
tag.innerText = ch;
timeline.prepend(tag);

if(timeline.children.length > 30){
timeline.lastChild.remove();
}

updatePiano(ch);
}

function updateKey(chroma){
let i = chroma.indexOf(Math.max(...chroma));
document.getElementById("key").innerText = notes[i];
}

function updatePiano(ch){

document.querySelectorAll(".key").forEach(k=>k.classList.remove("active"));

let rootMatch = ch.match(/^([A-G]#?)/);
let root = rootMatch ? rootMatch[1] : "C";
let rootIndex = notes.indexOf(root);

[0,4,7].forEach(i=>{
let n = (rootIndex+i)%12;

document.querySelectorAll(".key").forEach(k=>{
if(k.dataset.note % 12 == n){
k.classList.add("active");
}
});
});
}

// יצירת פסנתר
const piano = document.getElementById("piano");
for(let i=0;i<24;i++){
let k = document.createElement("div");
k.className = "key";
k.dataset.note = i;
piano.appendChild(k);
}

</script>

</body>
</html>
