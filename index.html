<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>זיהוי אקורדים מקצועי </title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 24px; padding: 30px; max-width: 900px; margin: 0 auto; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        h1 { color: #007bff; margin-bottom: 25px; }

        .setup-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 15px; 
            background: #252525; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 25px;
            border: 1px solid #333;
        }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; color: #aaa; }
        input, select { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; text-align: center; font-size: 16px; }

        #chord-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            margin-top: 30px; 
        }
        
        .measure { 
            background: #2a2a2a; 
            border: 2px solid #3d3d3d; 
            padding: 25px 10px; 
            border-radius: 12px; 
            font-size: 2.2em; 
            font-weight: 900; 
            color: #ffeb3b;
            position: relative;
            transition: 0.2s;
        }
        
        .measure-num { position: absolute; top: 5px; right: 8px; font-size: 11px; color: #666; font-weight: normal; }
        .active-measure { 
            border-color: #ff0055; 
            background: #33101a;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,0,85,0.3);
            z-index: 10;
        }

        #start-btn { background: #ff0055; color: white; border: none; padding: 18px; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
        #start-btn:disabled { background: #333; opacity: 0.5; }
        
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>זיהוי אקורדים מקצועי</h1>
    
    <div class="setup-grid">
        <div class="input-group">
            <label>קצב (BPM)</label>
            <input type="number" id="bpm-input" value="120">
        </div>
        <div class="input-group">
            <label>משקל</label>
            <select id="time-sig">
                <option value="4">4/4 (רגיל)</option>
                <option value="3">3/4 (וולס)</option>
                <option value="2">2/4</option>
            </select>
        </div>
        <div class="input-group">
            <label>כמות תיבות</label>
            <input type="number" id="measures-input" value="32">
        </div>
        <div class="input-group">
            <label>Transpose</label>
            <input type="number" id="trans-input" value="0">
        </div>
    </div>

    <div style="border: 2px dashed #444; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
        <input type="file" id="audio-file" accept="audio/*">
    </div>

    <button id="start-btn" disabled>התחל ניתוח מבני</button>
    <audio id="audio-player" controls></audio>

    <div id="chord-grid"></div>
</div>
