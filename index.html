<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chord Analyzer Pro - Studio Edition</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #0a0a0c; --text: #e2e8f0; --accent: #f43f5e; --panel: #161b22; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #30363d; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
        input { background: #0d1117; color: #58a6ff; border: 1px solid #30363d; padding: 10px; border-radius: 6px; text-align: center; font-family: monospace; }

        #main-display { margin: 20px 0; background: #0d1117; border-radius: 15px; border: 1px solid #30363d; padding: 40px 10px; position: relative; overflow: hidden; }
        #current-chord { font-size: 10em; font-weight: 800; color: #f2cc60; margin: 0; line-height: 1; transition: all 0.2s ease; }
        
        /* פסנתר מקצועי */
        .piano { display: flex; justify-content: center; height: 160px; margin: 25px auto; padding: 10px; background: #000; border-radius: 10px; width: fit-content; border: 4px solid #21262d; }
        .key { width: 42px; height: 140px; border: 1px solid #000; background: #f0f0f0; border-radius: 0 0 4px 4px; position: relative; }
        .key.black { width: 28px; height: 85px; background: #333; margin-left: -14px; margin-right: -14px; z-index: 2; border-radius: 0 0 2px 2px; }
        .key.active { background: #f43f5e !important; box-shadow: 0 0 20px #f43f5e; transform: translateY(2px); }

        #start-btn { background: #238636; color: white; border: none; padding: 20px; font-size: 1.3em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        #start-btn:hover { background: #2ea043; }
        audio { width: 100%; margin-top: 15px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="group"><label>רקע</label><input type="color" id="bgCol"></div>
        <div class="group"><label>גופן</label><input type="color" id="txtCol"></div>
        <div class="group"><label>BPM (יציבות)</label><input type="number" id="bpm" value="120"></div>
        <div class="group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
    </div>

    <input type="file" id="fileInput" accept="audio/*" style="margin-bottom: 20px; color: #8b949e;">
    <button id="start-btn" disabled>הפעל מנוע ניתוח Pro</button>
    <audio id="audio" controls></audio>

    <div id="main-display">
        <p id="current-chord">---</p>
    </div>

    <div class="piano" id="piano">
        <div class="key" data-n="0"></div><div class="key black" data-n="1"></div>
        <div class="key" data-n="2"></div><div class="key black" data-n="3"></div>
        <div class="key" data-n="4"></div><div class="key" data-n="5"></div>
        <div class="key black" data-n="6"></div><div class="key" data-n="7"></div>
        <div class="key black" data-n="8"></div><div class="key" data-n="9"></div>
        <div class="key black" data-n="10"></div><div class="key" data-n="11"></div>
        <div class="key" data-n="12"></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), btn = document.getElementById('start-btn'), display = document.getElementById('current-chord');
    const bgIn = document.getElementById('bgCol'), txtIn = document.getElementById('txtCol');
    let ctx, source, analyzer;
    
    // הגדרות וזיכרון
    bgIn.value = localStorage.getItem('studio-bg') || '#0a0a0c';
    txtIn.value = localStorage.getItem('studio-txt') || '#e2e8f0';
    const applyColors = () => {
        document.documentElement.style.setProperty('--bg', bgIn.value);
        document.documentElement.style.setProperty('--text', txtIn.value);
    };
    applyColors();
    bgIn.oninput = () => { applyColors(); localStorage.setItem('studio-bg', bgIn.value); };
    txtIn.oninput = () => { applyColors(); localStorage.setItem('studio-txt', txtIn.value); };

    document.getElementById('fileInput').onchange = (e) => { if(e.target.files[0]) { audio.src = URL.createObjectURL(e.target.files[0]); btn.disabled = false; } };

    // מנגנון החלקה מקצועי
    let chordBuffer = [];
    const BUFFER_SIZE = 15; // כמות דגימות להחלטה
    let lastDisplayedChord = "";
    let lastSwitchTime = 0;

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        await ctx.resume();
        if (!source) { source = ctx.createMediaElementSource(audio); source.connect(ctx.destination); }

        if (analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                const trans = parseInt(document.getElementById('trans').value);
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const chords = [{n:'', p:[4,7], w:1.2}, {n:'m', p:[3,7], w:1.1}];

                let bestChord = "---";
                let topScore = 0.65;

                for(let r=0; r<12; r++) {
                    for(let c of chords) {
                        let s = (f.chroma[r] + f.chroma[(r+c.p[0])%12] + f.chroma[(r+c.p[1])%12]) / 3 * c.w;
                        if(s > topScore) { topScore = s; bestChord = notes[(r+trans+12)%12] + c.n; }
                    }
                }

                // ניהול באפר ההחלקות
                chordBuffer.push(bestChord);
                if (chordBuffer.length > BUFFER_SIZE) chordBuffer.shift();

                // בחירת האקורד השכיח ביותר בבאפר (Voting)
                const counts = {};
                chordBuffer.forEach(x => counts[x] = (counts[x] || 0) + 1);
                const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);

                const now = Date.now();
                // החלפה רק אם האקורד שונה, שכיח מספיק, ועבר זמן מינימלי (400ms)
                if (winner !== lastDisplayedChord && counts[winner] > BUFFER_SIZE * 0.7 && now - lastSwitchTime > 400) {
                    display.innerText = winner;
                    lastDisplayedChord = winner;
                    lastSwitchTime = now;
                    updatePiano(winner);
                }
            }
        });
        analyzer.start();
        audio.play();
    };

    function updatePiano(chord) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        if (chord === "---") return;
        
        const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const rootStr = chord.replace('m', '');
        const isMinor = chord.includes('m');
        const rootIdx = notes.indexOf(rootStr);
        
        if (rootIdx === -1) return;
        const intervals = isMinor ? [0, 3, 7] : [0, 4, 7];
        intervals.forEach(i => {
            const key = document.querySelector(`.key[data-n="${(rootIdx + i) % 12}"]`);
            if (key) key.classList.add('active');
        });
    }
</script>
</body>
</html>
