<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chord Studio Black Edition - V18.0</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #030508; --panel: rgba(20, 25, 35, 0.8); --gold: #ffcc00; --red: #ff3e3e; --green: #00ff95; }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* סיידבר מעוצב */
        .sidebar { width: 360px; background: #080a0f; border-left: 1px solid #1f242d; padding: 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: 20px 0 60px rgba(0,0,0,0.9); z-index: 50; }
        .sidebar h1 { font-size: 14px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; border-right: 3px solid var(--accent); padding-right: 15px; }

        .glass-module { background: var(--panel); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .label { font-size: 10px; color: #667085; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 900; color: #fff; }

        /* אזור עבודה */
        .stage { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 30% 30%, #111827 0%, #030508 100%); }
        
        /* גלגל הקווינטות והתצוגה המרכזית */
        .main-display { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .orbit { position: absolute; width: 480px; height: 480px; border: 1px dashed rgba(0, 242, 255, 0.15); border-radius: 50%; animation: rotate 60s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .chord-core { position: relative; text-align: center; z-index: 10; transform: scale(1.1); }
        #chord-name { font-size: 160px; font-weight: 950; background: linear-gradient(135deg, #fff 30%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.8; filter: drop-shadow(0 0 30px rgba(255,204,0,0.3)); }
        #chord-sub { font-size: 24px; color: var(--accent); font-weight: 300; margin-top: 15px; letter-spacing: 5px; }

        /* מטרונום לייזר */
        #pulse-laser { position: absolute; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 50%; opacity: 0; pointer-events: none; }
        .laser-hit { animation: laser-strike 0.4s ease-out; }
        @keyframes laser-strike { 0% { transform: scale(0.8); opacity: 1; filter: blur(0px); } 100% { transform: scale(1.5); opacity: 0; filter: blur(10px); } }

        /* מקלדת והיסטוריה */
        .shelf { height: 180px; background: rgba(0,0,0,0.8); border-top: 1px solid #1f242d; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .piano { display: flex; justify-content: center; height: 80px; gap: 2px; direction: ltr; }
        .key { width: 34px; background: #e5e7eb; border-radius: 0 0 6px 6px; border: 1px solid #9ca3af; position: relative; }
        .key.black { width: 22px; background: #111827; height: 50px; margin-left: -11px; margin-right: -11px; z-index: 5; border: 1px solid #000; }
        .key.active { background: var(--red) !important; box-shadow: 0 0 30px var(--red); transform: translateY(4px); border-color: transparent; }

        .history-flow { display: flex; gap: 12px; overflow-x: auto; padding: 5px; direction: ltr; }
        .h-chip { background: #111827; border: 1px solid #1f242d; padding: 6px 16px; border-radius: 50px; font-size: 12px; font-weight: 700; color: var(--accent); transition: 0.3s; }
        .h-chip:first-child { background: var(--accent); color: #000; transform: scale(1.1); }

        /* שליטה */
        .btn { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0,242,255,0.4); }
        .btn:disabled { opacity: 0.1; filter: grayscale(1); }
        
        input[type="range"] { accent-color: var(--accent); width: 100%; cursor: pointer; }
        select { background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%; }
        audio { width: 100%; margin-top: 10px; opacity: 0.5; filter: invert(1); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Chord Studio <span style="font-weight: 300;">Black Edition</span></h1>
    
    <div class="glass-module">
        <span class="label">BPM ENGINE</span>
        <div id="bpm-val" class="val">---</div>
    </div>

    <div class="glass-module">
        <span class="label">SPEED CONTROL</span>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.05" value="1">
        <div id="rate-disp" style="text-align:center; font-size:11px; color:var(--accent); margin-top:8px; font-weight:bold;">100% (NORMAL)</div>
    </div>

    <div class="glass-module">
        <span class="label">HARMONIC SENSITIVITY</span>
        <input type="range" id="sens" min="0.1" max="0.9" step="0.05" value="0.4">
    </div>

    <div class="glass-module">
        <span class="label">TRANSPOSE / TUNING</span>
        <input type="number" id="trans" value="0" style="background:transparent; border:none; color:#fff; font-size:20px; font-weight:900; width:100%; text-align:center;">
    </div>

    <div class="glass-module">
        <span class="label">METRONOME VOL</span>
        <input type="range" id="vol" min="0" max="100" value="25">
    </div>

    <button class="btn" onclick="document.getElementById('fileIn').click()" style="background:#1f242d; color:#fff; margin-bottom: 5px;">LOAD MASTER TRACK</button>
    <input type="file" id="fileIn" style="display:none" accept="audio/*">
    
    <button id="start-btn" class="btn" disabled>ENGAGE STUDIO CORE</button>
    
    <audio id="audio" controls></audio>
</div>

<div class="stage">
    <div class="main-display">
        <div class="orbit"></div>
        <div id="pulse-laser"></div>
        <div class="chord-core">
            <div id="chord-name">--</div>
            <div id="chord-sub">READY</div>
        </div>
        <div id="harmonic-pos" style="position:absolute; bottom:40px; font-size:12px; color:#444; font-weight:bold; letter-spacing:2px;">MULTI-BAND ANALYZER ACTIVE</div>
    </div>

    <div class="shelf">
        <div class="history-flow" id="history"></div>
        <div class="piano" id="piano"></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), chordName = document.getElementById('chord-name');
    const bpmDisp = document.getElementById('bpm-val'), pulseLaser = document.getElementById('pulse-laser');
    const historyDiv = document.getElementById('history'), piano = document.getElementById('piano');
    const rateSlider = document.getElementById('rate'), rateDisp = document.getElementById('rate-disp');
    
    let audioCtx, source, analyzer, meyda, baseBPM = 120, nextBeat = 0, beatCount = 0;

    // אתחול מקלדת פרמיומים
    for(let i=0; i<36; i++) {
        const k = document.createElement('div');
        k.className = `key ${[1,3,6,8,10].includes(i%12) ? 'black' : ''}`;
        k.dataset.note = i;
        piano.appendChild(k);
    }

    rateSlider.oninput = () => {
        audio.playbackRate = rateSlider.value;
        rateDisp.innerText = `${Math.round(rateSlider.value * 100)}% (${rateSlider.value < 1 ? 'SLOW-MO' : 'FAST'})`;
    };

    document.getElementById('fileIn').onchange = async (e) => {
        if(e.target.files[0]) {
            chordName.innerText = "WAIT";
            audio.src = URL.createObjectURL(e.target.files[0]);
            await detectBPM(e.target.files[0]);
            document.getElementById('start-btn').disabled = false;
            chordName.innerText = "--";
        }
    };

    async function detectBPM(file) {
        const offCtx = new OfflineAudioContext(1, 44100 * 30, 44100);
        const buf = await offCtx.decodeAudioData(await file.arrayBuffer());
        const src = offCtx.createBufferSource(); src.buffer = buf;
        const filter = offCtx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 160;
        src.connect(filter).connect(offCtx.destination); src.start(0);
        const rendered = await offCtx.startRendering();
        const data = rendered.getChannelData(0);
        let peaks = [];
        for(let i=0; i<data.length; i+=250) if(Math.abs(data[i]) > 0.85) peaks.push(i/44100);
        let diffs = [];
        for(let i=1; i<peaks.length; i++) { let d = peaks[i]-peaks[i-1]; if(d>0.3 && d<1.2) diffs.push(d); }
        if(diffs.length > 0) {
            baseBPM = Math.round(60 / (diffs.reduce((a,b)=>a+b)/diffs.length));
            bpmDisp.innerText = baseBPM;
        }
    }

    document.getElementById('start-btn').onclick = async () => {
        if(!audioCtx) audioCtx = new AudioContext();
        await audioCtx.resume();
        if(!source) { source = audioCtx.createMediaElementSource(audio); source.connect(audioCtx.destination); }

        if(meyda) meyda.stop();
        meyda = Meyda.createMeydaAnalyzer({
            audioContext: audioCtx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                if(audio.paused) return;
                
                // מנוע מטרונום לייזר
                const now = audioCtx.currentTime;
                const beatDur = 60 / (baseBPM * audio.playbackRate);
                if(now >= nextBeat) {
                    if(nextBeat === 0) nextBeat = now;
                    triggerPulse();
                    nextBeat += beatDur;
                    beatCount = (beatCount % 4) + 1;
                }

                // זיהוי אקורדים Multi-Type
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const types = [
                    {n:'', p:[4,7], s:'MAJOR'}, {n:'m', p:[3,7], s:'MINOR'}, 
                    {n:'7', p:[4,10], s:'DOMINANT 7'}, {n:'maj7', p:[4,11], s:'MAJOR 7'}, 
                    {n:'dim', p:[3,6], s:'DIMINISHED'}
                ];
                const trans = parseInt(document.getElementById('trans').value);
                const sens = parseFloat(document.getElementById('sens').value);
                let best = "---", top = sens, currentS = "READY";

                for(let r=0; r<12; r++) {
                    for(let t of types) {
                        let score = (f.chroma[r] * 1.5 + f.chroma[(r+t.p[0])%12] + f.chroma[(r+t.p[1])%12]) / 3.5;
                        if(score > top) { top = score; best = notes[(r+trans+12)%12] + t.n; currentS = t.s; }
                    }
                }

                if(best !== "---" && chordName.innerText !== best) {
                    chordName.innerText = best;
                    document.getElementById('chord-sub').innerText = currentS;
                    updateStudioUI(best);
                }
            }
        });
        meyda.start(); audio.play(); nextBeat = audioCtx.currentTime;
    };

    function triggerPulse() {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.frequency.setValueAtTime(beatCount === 4 ? 900 : 450, audioCtx.currentTime);
        g.gain.setValueAtTime(document.getElementById('vol').value / 500, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.06);
        pulseLaser.classList.remove('laser-hit');
        void pulseLaser.offsetWidth; pulseLaser.classList.add('laser-hit');
    }

    function updateStudioUI(chord) {
        // הזרקת היסטוריה
        const chip = document.createElement('div'); chip.className = 'h-chip';
        chip.innerText = chord; historyDiv.prepend(chip);

        // עדכון מקלדת
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const root = chord.replace(/m|7|maj7|dim/g, '');
        const rootIdx = notes.indexOf(root);
        let intervals = [0,4,7];
        if(chord.includes('maj7')) intervals = [0,4,7,11];
        else if(chord.includes('7')) intervals = [0,4,7,10];
        else if(chord.includes('m')) intervals = [0,3,7];
        else if(chord.includes('dim')) intervals = [0,3,6];

        intervals.forEach(i => {
            const n = (rootIdx + i) % 12;
            document.querySelectorAll(`.key[data-note="${n}"], .key[data-note="${n+12}"], .key[data-note="${n+24}"]`).forEach(k => k.classList.add('active'));
        });
    }
</script>
</body>
</html>
