<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתח אקורדים Studio - גרסה יציבה</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #0f172a; --text: #ffffff; --accent: #f43f5e; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        input, select { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; }
        #start-btn { background: var(--accent); color: white; border: none; padding: 15px; font-size: 1.2em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        #start-btn:disabled { opacity: 0.3; }
        #chord-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 25px; }
        .measure { background: rgba(255,255,255,0.05); border: 2px solid transparent; padding: 25px 10px; border-radius: 12px; font-size: 2em; font-weight: 800; color: #fbbf24; position: relative; cursor: pointer; }
        .active { border-color: var(--accent); background: rgba(244, 63, 94, 0.1); }
        .progress { position: absolute; bottom: 0; left: 0; height: 4px; background: #38bdf8; width: 0%; }
    </style>
</head>
<body>
<div class="container">
    <h1>הגדרות סטודיו</h1>
    <div class="dashboard">
        <div class="group"><label>צבע רקע</label><input type="color" id="bgCol" value="#0f172a"></div>
        <div class="group"><label>צבע גופן</label><input type="color" id="txtCol" value="#ffffff"></div>
        <div class="group"><label>BPM</label><input type="number" id="bpm" value="120"></div>
        <div class="group"><label>תיבות</label><input type="number" id="measures" value="32"></div>
    </div>
    <input type="file" id="file" accept="audio/*" style="margin-bottom:20px;">
    <button id="start-btn" disabled>הפעל ניתוח</button>
    <audio id="audio" controls style="width:100%; margin-top:10px;"></audio>
    <div id="chord-grid"></div>
</div>

<script>
    const audio = document.getElementById('audio');
    const btn = document.getElementById('start-btn');
    let ctx, source, analyzer;

    // שינוי צבעים בזמן אמת
    document.getElementById('bgCol').oninput = (e) => document.documentElement.style.setProperty('--bg', e.target.value);
    document.getElementById('txtCol').oninput = (e) => document.documentElement.style.setProperty('--text', e.target.value);

    document.getElementById('file').onchange = (e) => {
        if(e.target.files[0]) { audio.src = URL.createObjectURL(e.target.files[0]); btn.disabled = false; }
    };

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') await ctx.resume(); // פתרון לבעיית ה"תקוע"

        if (!source) {
            source = ctx.createMediaElementSource(audio);
            source.connect(ctx.destination);
        }

        const bpm = parseInt(document.getElementById('bpm').value);
        const total = parseInt(document.getElementById('measures').value);
        const secPerM = (60 / bpm) * 4;

        const grid = document.getElementById('chord-grid');
        grid.innerHTML = "";
        for(let i=0; i<total; i++) {
            grid.innerHTML += `<div class="measure" id="m-${i}"><span style="font-size:10px; position:absolute; top:5px; right:5px;">${i+1}</span><span class="v">---</span><div class="progress" id="p-${i}"></div></div>`;
        }

        if (analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 4096,
            featureExtractors: ['chroma'],
            callback: f => {
                const time = audio.currentTime;
                const idx = Math.floor(time / secPerM);
                if (idx >= total) return;

                document.querySelectorAll('.measure').forEach(m => m.classList.remove('active'));
                const mDiv = document.getElementById(`m-${idx}`);
                if(mDiv) {
                    mDiv.classList.add('active');
                    document.getElementById(`p-${idx}`).style.width = ((time % secPerM) / secPerM * 100) + "%";
                }

                // אלגוריתם זיהוי בסיסי
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                let max = 0, best = "---";
                f.chroma.forEach((v, i) => { if(v > max) { max = v; best = notes[i]; } });
                if(max > 0.5 && mDiv) mDiv.querySelector('.v').innerText = best;
            }
        });
        analyzer.start();
        audio.play();
    };
</script>
</body>
</html>
