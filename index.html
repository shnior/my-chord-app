<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chord Studio Pro - Beat Lock Edition</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #f43f5e; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; background: #161b22; padding: 25px; border-radius: 20px; border: 1px solid #30363d; }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10px; color: #8b949e; font-weight: bold; }
        input, select { background: #0d1117; color: #58a6ff; border: 1px solid #30363d; padding: 8px; border-radius: 6px; text-align: center; }

        #main-display { background: #010409; border-radius: 15px; border: 1px solid #30363d; padding: 40px 0; margin-bottom: 20px; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #current-chord { font-size: 9em; font-weight: 900; color: #f2cc60; margin: 0; line-height: 1; }
        #beat-indicator { font-size: 1.5em; color: #238636; margin-top: 10px; font-weight: bold; }

        .piano { display: flex; justify-content: center; position: relative; height: 160px; margin: 0 auto; background: #000; padding: 5px; border-radius: 8px; direction: ltr; } /* כיוון משמאל לימין */
        .key { width: 40px; height: 150px; border: 1px solid #111; background: white; border-radius: 0 0 5px 5px; cursor: pointer; }
        .key.black { width: 26px; height: 95px; background: #222; margin-left: -13px; margin-right: -13px; z-index: 2; border-radius: 0 0 3px 3px; }
        .key.active { background: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }

        #start-btn { background: #238636; color: white; border: none; padding: 15px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .btn-secondary { background: #30363d; color: white; padding: 8px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="group"><label>BPM</label><input type="number" id="bpm" value="120"></div>
        <div class="group"><label>משקל</label>
            <select id="sig"><option value="4">4/4</option><option value="3">3/4</option></select>
        </div>
        <div class="group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
        <div class="group"><label>ווליום קליק</label><input type="range" id="clickVol" min="0" max="100" value="30"></div>
    </div>

    <input type="file" id="fileInput" accept="audio/*" style="margin-bottom: 15px;">
    <button id="start-btn" disabled>הפעל ניתוח + מטרונום</button>
    <button class="btn-secondary" id="toggleClick">🔊 השמע קליק: כבוי</button>
    <audio id="audio" controls style="width:100%"></audio>

    <div id="main-display">
        <p id="current-chord">---</p>
        <div id="beat-indicator">BEAT: 1</div>
    </div>

    <div class="piano" id="piano"></div>
</div>

<script>
    const audio = document.getElementById('audio'), btn = document.getElementById('start-btn'), display = document.getElementById('current-chord');
    const piano = document.getElementById('piano'), beatDisp = document.getElementById('beat-indicator');
    let ctx, source, analyzer, clickEnabled = false;

    // בניית מקלדת (משמאל לימין - נמוך לגבוה)
    const pattern = [0,1,0,1,0,0,1,0,1,0,1,0];
    for(let i=0; i<24; i++) {
        const isBlack = pattern[i % 12] === 1;
        const key = document.createElement('div');
        key.className = `key ${isBlack ? 'black' : ''}`;
        key.dataset.note = i;
        key.onmousedown = () => playSynth(i);
        piano.appendChild(key);
    }

    function playSynth(index) {
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.frequency.value = 261.63 * Math.pow(2, index/12);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        osc.connect(g).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
    }

    document.getElementById('toggleClick').onclick = (e) => {
        clickEnabled = !clickEnabled;
        e.target.innerText = clickEnabled ? "🔊 השמע קליק: פעיל" : "🔊 השמע קליק: כבוי";
    };

    document.getElementById('fileInput').onchange = (e) => { if(e.target.files[0]) { audio.src = URL.createObjectURL(e.target.files[0]); btn.disabled = false; } };

    let currentMeasureChords = [];
    let lastBeat = -1;

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        await ctx.resume();
        if (!source) { source = ctx.createMediaElementSource(audio); source.connect(ctx.destination); }

        if (analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                const bpm = parseInt(document.getElementById('bpm').value);
                const sig = parseInt(document.getElementById('sig').value);
                const trans = parseInt(document.getElementById('trans').value);
                const beatDuration = 60 / bpm;
                const currentTime = audio.currentTime;
                
                const currentBeatTotal = Math.floor(currentTime / beatDuration);
                const beatInMeasure = (currentBeatTotal % sig) + 1;

                // השמעת קליק וניהול תיבות
                if (currentBeatTotal !== lastBeat) {
                    if (clickEnabled) {
                        const osc = ctx.createOscillator();
                        const g = ctx.createGain();
                        osc.frequency.value = beatInMeasure === 1 ? 880 : 440;
                        g.gain.value = document.getElementById('clickVol').value / 200;
                        osc.connect(g).connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.05);
                    }
                    
                    beatDisp.innerText = `BEAT: ${beatInMeasure}`;
                    
                    // אם הגענו לביט הראשון של התיבה - מחליטים על האקורד של התיבה הקודמת
                    if (currentMeasureChords.length > 0) {
                        const counts = {};
                        currentMeasureChords.forEach(x => counts[x] = (counts[x] || 0) + 1);
                        const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                        display.innerText = winner;
                        updatePiano(winner);
                        currentMeasureChords = [];
                    }
                    lastBeat = currentBeatTotal;
                }

                // איסוף נתונים לאקורד הבא
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const chords = [{n:'', p:[4,7]}, {n:'m', p:[3,7]}];
                let best = "---", top = 0.4;
                for(let r=0; r<12; r++) {
                    for(let c of chords) {
                        let s = (f.chroma[r] + f.chroma[(r+c.p[0])%12] + f.chroma[(r+c.p[1])%12]) / 3;
                        if(s > top) { top = s; best = notes[(r+trans+12)%12] + c.n; }
                    }
                }
                if (best !== "---") currentMeasureChords.push(best);
            }
        });
        analyzer.start();
        audio.play();
    };

    function updatePiano(chord) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        if (chord === "---") return;
        const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const rootStr = chord.replace('m', '');
        const rootIdx = notes.indexOf(rootStr);
        const intervals = chord.includes('m') ? [0, 3, 7] : [0, 4, 7];
        intervals.forEach(i => {
            const n1 = (rootIdx + i) % 12;
            const n2 = n1 + 12;
            document.querySelectorAll(`.key[data-note="${n1}"], .key[data-note="${n2}"]`).forEach(k => k.classList.add('active'));
        });
    }
</script>
</body>
</html>
