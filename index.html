<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתח אקורדים Studio - גרסה מופשטת</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #0f172a; --text: #ffffff; --accent: #f43f5e; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; text-align: center; }
        
        #main-display { margin: 30px 0; padding: 60px 10px; background: rgba(0,0,0,0.2); border-radius: 25px; min-height: 220px; display: flex; align-items: center; justify-content: center; }
        #current-chord { font-size: 12em; font-weight: 900; color: #fbbf24; margin: 0; text-shadow: 0 0 40px rgba(251, 191, 36, 0.4); }
        
        #start-btn { background: var(--accent); color: white; border: none; padding: 18px; font-size: 1.4em; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; }
        audio { width: 100%; filter: invert(0.8); }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="group"><label>רקע</label><input type="color" id="bgCol"></div>
        <div class="group"><label>גופן</label><input type="color" id="txtCol"></div>
        <div class="group"><label>קצב (BPM)</label><input type="number" id="bpm" value="120"></div>
        <div class="group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
    </div>

    <input type="file" id="fileInput" accept="audio/*" style="margin-bottom: 20px;">
    <button id="start-btn" disabled>הפעל ניתוח מדויק</button>
    <audio id="audio" controls></audio>

    <div id="main-display">
        <p id="current-chord">---</p>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), btn = document.getElementById('start-btn');
    const bgIn = document.getElementById('bgCol'), txtIn = document.getElementById('txtCol');
    const display = document.getElementById('current-chord');
    let ctx, source, analyzer, lastChord = "", chordCount = 0;

    // שמירה וטעינה מהזיכרון
    function updateColors(bg, txt) {
        document.documentElement.style.setProperty('--bg', bg);
        document.documentElement.style.setProperty('--text', txt);
    }
    bgIn.value = localStorage.getItem('studio-bg') || '#0f172a';
    txtIn.value = localStorage.getItem('studio-txt') || '#ffffff';
    updateColors(bgIn.value, txtIn.value);

    bgIn.oninput = (e) => { updateColors(e.target.value, txtIn.value); localStorage.setItem('studio-bg', e.target.value); };
    txtIn.oninput = (e) => { updateColors(bgIn.value, e.target.value); localStorage.setItem('studio-txt', e.target.value); };

    document.getElementById('fileInput').onchange = (e) => { if(e.target.files[0]) { audio.src = URL.createObjectURL(e.target.files[0]); btn.disabled = false; } };

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        await ctx.resume();
        if (!source) { source = ctx.createMediaElementSource(audio); source.connect(ctx.destination); }

        const trans = parseInt(document.getElementById('trans').value);
        const bpm = parseInt(document.getElementById('bpm').value);
        const minChangeInterval = 60 / bpm; // זמן מינימלי להחלפת אקורד (פעימה אחת)
        let lastUpdateTime = 0;

        if (analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                const now = audio.currentTime;
                // מונע קפיצות מהירות מדי - מתעדכן רק לפי הקצב
                if (now - lastUpdateTime < minChangeInterval / 2) return;

                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                // העדפה לאקורדים פשוטים (מז'ור ומינור)
                const chords = [
                    {n:'', p:[0,4,7], weight: 1.2}, // בונוס לאקורד פשוט
                    {n:'m', p:[0,3,7], weight: 1.1},
                    {n:'7', p:[0,4,7,10], weight: 0.8},
                    {n:'maj7', p:[0,4,7,11], weight: 0.7}
                ];

                let maxScore = 0.5, detected = "---";

                for(let r=0; r<12; r++) {
                    for(let c of chords) {
                        let score = c.p.reduce((acc, p) => acc + f.chroma[(r+p)%12], 0) * c.weight;
                        if(score > maxScore) { 
                            maxScore = score; 
                            detected = notes[(r + trans + 12) % 12] + c.n; 
                        }
                    }
                }

                // מנגנון החלקה: האקורד חייב להופיע פעמיים ברצף כדי להחליף את התצוגה
                if (detected !== "---") {
                    if (detected === lastChord) {
                        chordCount++;
                        if (chordCount >= 2) {
                            display.innerText = detected;
                            lastUpdateTime = now;
                        }
                    } else {
                        lastChord = detected;
                        chordCount = 0;
                    }
                }
            }
        });
        analyzer.start();
        audio.play();
    };
</script>
</body>
</html>
