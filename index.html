<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #c8ff4e;
    --accent2: #7c5cfc;
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.5);
    --dim: rgba(240,240,248,0.25);
    --error: #ff5c5c;
    --chord-bg: #1c1c27;
    --chord-hover: #252535;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 2rem 2rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; }
  .logo h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-badge {
    font-size: 0.65rem;
    background: rgba(124,92,252,0.2);
    color: #a78bfa;
    border: 1px solid rgba(124,92,252,0.3);
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
  }

  /* Main layout */
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* Search area */
  .search-area {
    margin-bottom: 2.5rem;
  }
  .search-label {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    letter-spacing: -1px;
  }
  .search-label em { color: var(--accent); font-style: normal; }
  .search-row {
    display: flex;
    gap: 10px;
  }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'Syne', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--dim); }
  .search-input:focus { border-color: var(--accent); }
  .search-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-btn:hover { opacity: 0.9; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Examples */
  .examples {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .examples-label { font-size: 0.8rem; color: var(--muted); }
  .example-pill {
    font-size: 0.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-pill:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading-area {
    display: none;
    padding: 3rem 0;
    text-align: center;
  }
  .loading-area.active { display: block; }
  .loading-bars {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 1rem;
  }
  .loading-bar {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
    animation: barPulse 1s ease-in-out infinite;
  }
  .loading-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
  .loading-bar:nth-child(2) { height: 35px; animation-delay: 0.1s; }
  .loading-bar:nth-child(3) { height: 28px; animation-delay: 0.2s; }
  .loading-bar:nth-child(4) { height: 40px; animation-delay: 0.3s; }
  .loading-bar:nth-child(5) { height: 22px; animation-delay: 0.4s; }
  .loading-bar:nth-child(6) { height: 32px; animation-delay: 0.5s; }
  .loading-bar:nth-child(7) { height: 18px; animation-delay: 0.6s; }
  @keyframes barPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
    50% { opacity: 1; transform: scaleY(1); }
  }
  .loading-text { color: var(--muted); font-size: 0.9rem; }

  /* Error */
  .error-area {
    display: none;
    padding: 1.5rem;
    background: rgba(255,92,92,0.1);
    border: 1px solid rgba(255,92,92,0.3);
    border-radius: 10px;
    color: var(--error);
    margin-bottom: 2rem;
  }
  .error-area.active { display: block; }

  /* Song result */
  .result-area { display: none; }
  .result-area.active { display: block; }

  /* Song header */
  .song-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .song-title { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
  .song-artist { font-size: 1rem; color: var(--muted); margin-top: 4px; }
  .song-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .meta-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    text-align: center;
  }
  .meta-chip .val {
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }
  .meta-chip .lbl {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-top: 1px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .control-group label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .control-btn {
    width: 28px;
    height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .control-btn:hover { background: var(--border2); }
  .control-val {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    min-width: 28px;
    text-align: center;
    font-weight: 700;
    color: var(--accent);
  }
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    margin-right: auto;
  }
  .view-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn.active {
    background: var(--accent);
    color: #0a0a0f;
    font-weight: 700;
  }

  /* Sections */
  .sections { display: flex; flex-direction: column; gap: 1.5rem; }
  .section-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .section-name {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    color: var(--accent2);
  }
  .section-repeats {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .chords-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px;
  }
  .chord-card {
    background: var(--chord-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 80px;
    text-align: center;
    position: relative;
  }
  .chord-card:hover {
    border-color: var(--accent);
    background: var(--chord-hover);
    transform: translateY(-2px);
  }
  .chord-card.active {
    border-color: var(--accent);
    background: rgba(200,255,78,0.08);
  }
  .chord-name {
    font-size: 1.4rem;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    letter-spacing: -0.5px;
  }
  .chord-type {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .chord-beats {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 0.6rem;
    color: var(--dim);
    font-family: 'Space Mono', monospace;
  }

  /* Chord diagram panel */
  .diagram-panel {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: none;
    align-items: center;
    gap: 2rem;
    z-index: 50;
  }
  .diagram-panel.active { display: flex; }
  .diagram-content {
    display: flex;
    align-items: center;
    gap: 2rem;
    flex: 1;
  }
  .diagram-chord-name {
    font-size: 2.5rem;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    min-width: 100px;
  }
  .chord-info { flex: 1; }
  .chord-notes {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .chord-function {
    font-size: 0.85rem;
    color: var(--text);
    margin-top: 6px;
  }
  .diagram-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .diagram-close:hover { border-color: var(--border2); color: var(--text); }

  /* Guitar diagram SVG */
  .guitar-diagram svg {
    display: block;
  }

  /* Notes section */
  .notes-box {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
  }
  .notes-box h4 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .notes-box p { font-size: 0.9rem; line-height: 1.6; color: var(--muted); }

  /* Piano view */
  .piano-view { display: none; }
  .piano-view.active { display: block; }
  .chord-view.piano .sections { display: none; }

  /* Scroll hint */
  .scroll-hint {
    text-align: center;
    padding: 3rem 0 1rem;
    color: var(--dim);
    font-size: 0.8rem;
  }

  @media (max-width: 600px) {
    .main { padding: 1rem; }
    .search-row { flex-direction: column; }
    .song-title { font-size: 1.5rem; }
    .diagram-panel { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 18V5l12-2v13" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="18" r="3" stroke="#0a0a0f" stroke-width="2"/>
        <circle cx="18" cy="16" r="3" stroke="#0a0a0f" stroke-width="2"/>
      </svg>
    </div>
    <h1>Chord<span>AI</span></h1>
  </div>
  <div class="header-badge">POWERED BY CLAUDE</div>
</div>

<div class="main">
  <div class="search-area">
    <div class="search-label">ניתוח אקורדים<br><em>מתקדם לכל שיר</em></div>
    <div class="search-row">
      <input class="search-input" id="songInput" type="text"
        placeholder="שם שיר ואמן — למשל: Hotel California, Eagles"
        onkeydown="if(event.key==='Enter') analyze()">
      <button class="search-btn" id="searchBtn" onclick="analyze()">נתח ♪</button>
    </div>
    <div class="examples">
      <span class="examples-label">דוגמאות:</span>
      <span class="example-pill" onclick="setExample('Wonderwall, Oasis')">Wonderwall</span>
      <span class="example-pill" onclick="setExample('Let It Be, Beatles')">Let It Be</span>
      <span class="example-pill" onclick="setExample('Creep, Radiohead')">Creep</span>
      <span class="example-pill" onclick="setExample('Stand By Me, Ben E. King')">Stand By Me</span>
      <span class="example-pill" onclick="setExample('Stairway to Heaven, Led Zeppelin')">Stairway to Heaven</span>
    </div>
  </div>

  <div class="loading-area" id="loading">
    <div class="loading-bars">
      <div class="loading-bar"></div><div class="loading-bar"></div>
      <div class="loading-bar"></div><div class="loading-bar"></div>
      <div class="loading-bar"></div><div class="loading-bar"></div>
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text" id="loadingText">מנתח את השיר...</div>
  </div>

  <div class="error-area" id="errorArea"></div>

  <div class="result-area" id="resultArea">
    <div class="song-header">
      <div>
        <div class="song-title" id="songTitle"></div>
        <div class="song-artist" id="songArtistEl"></div>
      </div>
      <div class="song-meta" id="songMeta"></div>
    </div>

    <div class="controls">
      <div class="view-toggle">
        <button class="view-btn active" id="viewChords" onclick="setView('chords')">אקורדים</button>
        <button class="view-btn" id="viewTimeline" onclick="setView('timeline')">ציר זמן</button>
      </div>
      <div class="control-group">
        <label>קאפו</label>
        <button class="control-btn" onclick="changeCapo(-1)">−</button>
        <span class="control-val" id="capoVal">0</span>
        <button class="control-btn" onclick="changeCapo(1)">+</button>
      </div>
      <div class="control-group">
        <label>טרנספוזיציה</label>
        <button class="control-btn" onclick="changeTranspose(-1)">♭</button>
        <span class="control-val" id="transposeVal">0</span>
        <button class="control-btn" onclick="changeTranspose(1)">♯</button>
      </div>
    </div>

    <div id="chordsView" class="sections"></div>
    <div id="timelineView" style="display:none;"></div>

    <div class="notes-box" id="notesBox" style="display:none;">
      <h4>הערות מוזיקליות</h4>
      <p id="notesText"></p>
    </div>

    <div class="scroll-hint">לחץ על אקורד כדי לראות את הדיאגרמה שלו</div>
  </div>
</div>

<!-- Sticky chord diagram panel -->
<div class="diagram-panel" id="diagramPanel">
  <div class="diagram-content">
    <div class="diagram-chord-name" id="diagChordName">Am</div>
    <div class="guitar-diagram" id="guitarDiagram"></div>
    <div class="chord-info">
      <div id="diagNotes" class="chord-notes"></div>
      <div id="diagFunction" class="chord-function"></div>
    </div>
  </div>
  <button class="diagram-close" onclick="closeDiagram()">✕</button>
</div>

<script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_NAMES_FLAT = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

let currentData = null;
let transposeAmount = 0;
let capoAmount = 0;
let selectedChord = null;

function setExample(val) {
  document.getElementById('songInput').value = val;
  analyze();
}

function showLoading(msg) {
  document.getElementById('loading').classList.add('active');
  document.getElementById('loadingText').textContent = msg || 'מנתח...';
  document.getElementById('resultArea').classList.remove('active');
  document.getElementById('errorArea').classList.remove('active');
}

function hideLoading() {
  document.getElementById('loading').classList.remove('active');
}

function showError(msg) {
  hideLoading();
  const el = document.getElementById('errorArea');
  el.textContent = msg;
  el.classList.add('active');
}

async function analyze() {
  const input = document.getElementById('songInput').value.trim();
  if (!input) return;
  transposeAmount = 0;
  capoAmount = 0;
  document.getElementById('transposeVal').textContent = '0';
  document.getElementById('capoVal').textContent = '0';
  closeDiagram();

  document.getElementById('searchBtn').disabled = true;
  showLoading('מנתח מבנה הרמוני...');

  const loadMsgs = ['מזהה אקורדים...', 'מנתח פרוגרסיות...', 'בונה דיאגרמות...'];
  let mi = 0;
  const loadInterval = setInterval(() => {
    mi = (mi + 1) % loadMsgs.length;
    document.getElementById('loadingText').textContent = loadMsgs[mi];
  }, 1800);

  try {
    const systemPrompt = `You are an expert music theorist and guitarist. When given a song name and artist, analyze the chord progression.
Return ONLY valid JSON with this exact structure (no markdown, no backticks):
{
  "title": "Song Title",
  "artist": "Artist Name",
  "key": "G",
  "mode": "major",
  "bpm": 120,
  "time_signature": "4/4",
  "capo": 0,
  "difficulty": "intermediate",
  "sections": [
    {
      "name": "Intro",
      "chords": [
        {"chord": "G", "beats": 4, "notes": "G B D"},
        {"chord": "Em", "beats": 4, "notes": "E G B"},
        {"chord": "C", "beats": 4, "notes": "C E G"},
        {"chord": "D", "beats": 4, "notes": "D F# A"}
      ],
      "repeats": 2,
      "description": "fingerpicked arpeggios"
    }
  ],
  "common_patterns": ["I-V-vi-IV", "circle of fifths"],
  "theory_notes": "Brief music theory explanation of the song's harmony in Hebrew.",
  "playing_tips": "Brief playing tips in Hebrew."
}
Section names must be in Hebrew (פתיחה, בית, פזמון, גשר, סיום, אינטרו, outro).
Include all main sections. Be accurate to the real song. BPM and key should be correct.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Analyze this song: ${input}` }]
      })
    });

    clearInterval(loadInterval);
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'שגיאת API');

    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    currentData = parsed;
    renderResult(parsed);
  } catch(e) {
    clearInterval(loadInterval);
    showError('שגיאה בניתוח השיר. בדוק שהשם נכון ונסה שוב. (' + e.message + ')');
  }
  document.getElementById('searchBtn').disabled = false;
}

function transposeChord(chord, semitones) {
  if (!semitones) return chord;
  const modifiers = chord.match(/[^A-Gb#]+$/)?.[0] || '';
  const base = chord.replace(modifiers, '');
  let root = base;
  let idx = NOTES.indexOf(root);
  if (idx === -1) {
    const flatMap = {'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
    root = flatMap[root] || root;
    idx = NOTES.indexOf(root);
  }
  if (idx === -1) return chord;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;
  return NOTES[newIdx] + modifiers;
}

function renderResult(data) {
  hideLoading();
  document.getElementById('resultArea').classList.add('active');

  document.getElementById('songTitle').textContent = data.title || '';
  document.getElementById('songArtistEl').textContent = data.artist || '';

  const diffColor = {beginner:'#4ade80', intermediate:'#facc15', advanced:'#f97316', expert:'#ef4444'};
  const diffLabel = {beginner:'מתחיל', intermediate:'בינוני', advanced:'מתקדם', expert:'מומחה'};

  document.getElementById('songMeta').innerHTML = `
    <div class="meta-chip"><div class="val">${data.key || '?'} ${data.mode === 'minor' ? 'm' : ''}</div><div class="lbl">טונאליות</div></div>
    <div class="meta-chip"><div class="val">${data.bpm || '?'}</div><div class="lbl">BPM</div></div>
    <div class="meta-chip"><div class="val">${data.time_signature || '4/4'}</div><div class="lbl">משקל</div></div>
    <div class="meta-chip"><div class="val" style="color:${diffColor[data.difficulty]||'#c8ff4e'}">${diffLabel[data.difficulty]||'בינוני'}</div><div class="lbl">רמה</div></div>
  `;

  renderChordView(data);

  if (data.theory_notes || data.playing_tips) {
    document.getElementById('notesBox').style.display = 'block';
    document.getElementById('notesText').textContent = (data.theory_notes || '') + (data.playing_tips ? ' | ' + data.playing_tips : '');
  }
}

function renderChordView(data) {
  const container = document.getElementById('chordsView');
  container.innerHTML = '';

  (data.sections || []).forEach(section => {
    const block = document.createElement('div');
    block.className = 'section-block';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="section-name">${section.name}</span>
      <span class="section-repeats">${section.description || ''} ${section.repeats > 1 ? '× ' + section.repeats : ''}</span>
    `;
    block.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'chords-grid';

    (section.chords || []).forEach(c => {
      const transposed = transposeChord(c.chord, transposeAmount);
      const card = document.createElement('div');
      card.className = 'chord-card';
      card.innerHTML = `
        <span class="chord-beats">${c.beats}♩</span>
        <div class="chord-name">${transposed}</div>
        <div class="chord-type">${getChordType(transposed)}</div>
      `;
      card.onclick = () => showChordDiagram(transposed, c.notes);
      grid.appendChild(card);
    });

    block.appendChild(grid);
    container.appendChild(block);
  });
}

function setView(v) {
  document.getElementById('viewChords').classList.toggle('active', v === 'chords');
  document.getElementById('viewTimeline').classList.toggle('active', v === 'timeline');
  document.getElementById('chordsView').style.display = v === 'chords' ? 'flex' : 'none';
  document.getElementById('timelineView').style.display = v === 'timeline' ? 'block' : 'none';

  if (v === 'timeline' && currentData) renderTimeline(currentData);
}

function renderTimeline(data) {
  const container = document.getElementById('timelineView');
  const allChords = [];
  (data.sections || []).forEach(s => {
    for (let r = 0; r < (s.repeats || 1); r++) {
      s.chords.forEach(c => allChords.push({...c, section: s.name}));
    }
  });

  const totalBeats = allChords.reduce((a, c) => a + (c.beats || 4), 0);
  let html = '<div style="overflow-x:auto;padding:1rem 0;">';
  html += '<div style="display:flex;gap:2px;min-width:600px;height:70px;align-items:stretch;">';

  allChords.forEach(c => {
    const transposed = transposeChord(c.chord, transposeAmount);
    const pct = ((c.beats || 4) / totalBeats * 100).toFixed(1);
    const hue = getChordHue(transposed);
    html += `<div onclick="showChordDiagram('${transposed}','${c.notes||''}')"
      style="flex:${pct};background:${hue};border-radius:6px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-weight:800;font-family:'Space Mono',monospace;font-size:0.85rem;
      color:#0a0a0f;min-width:50px;transition:opacity 0.15s;"
      onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">${transposed}</div>`;
  });

  html += '</div></div>';
  container.innerHTML = html;
}

function getChordHue(chord) {
  const colors = {
    'C':'#c8ff4e','D':'#4ecfff','E':'#ff6b9d','F':'#ffb347','G':'#7c5cfc',
    'A':'#4ecfff','B':'#ff6b9d','C#':'#a8ff78','D#':'#78c1ff','F#':'#ff9a9e','G#':'#a8edea','A#':'#fed6e3'
  };
  const root = chord.match(/^[A-G]#?/)?.[0] || 'C';
  return colors[root] || '#c8ff4e';
}

function getChordType(chord) {
  if (chord.includes('maj7')) return 'maj7';
  if (chord.includes('maj')) return 'major 7th';
  if (chord.includes('m7')) return 'minor 7th';
  if (chord.includes('7')) return 'dominant 7th';
  if (chord.includes('sus4')) return 'suspended 4th';
  if (chord.includes('sus2')) return 'suspended 2nd';
  if (chord.includes('add9')) return 'added 9th';
  if (chord.includes('dim')) return 'diminished';
  if (chord.includes('aug')) return 'augmented';
  if (chord.includes('m')) return 'minor';
  return 'major';
}

function showChordDiagram(chord, notes) {
  selectedChord = chord;
  document.getElementById('diagChordName').textContent = chord;
  document.getElementById('diagNotes').textContent = 'תווים: ' + (notes || getChordNotes(chord));
  document.getElementById('diagFunction').textContent = getChordFunction(chord, currentData?.key);
  document.getElementById('guitarDiagram').innerHTML = buildGuitarSVG(chord);
  document.getElementById('diagramPanel').classList.add('active');

  document.querySelectorAll('.chord-card').forEach(c => {
    c.classList.toggle('active', c.querySelector('.chord-name')?.textContent === chord);
  });
}

function closeDiagram() {
  document.getElementById('diagramPanel').classList.remove('active');
  document.querySelectorAll('.chord-card').forEach(c => c.classList.remove('active'));
}

function changeCapo(d) {
  capoAmount = Math.max(0, Math.min(12, capoAmount + d));
  document.getElementById('capoVal').textContent = capoAmount;
}

function changeTranspose(d) {
  transposeAmount += d;
  document.getElementById('transposeVal').textContent = transposeAmount > 0 ? '+' + transposeAmount : transposeAmount;
  if (currentData) renderChordView(currentData);
  if (document.getElementById('timelineView').style.display !== 'none' && currentData) renderTimeline(currentData);
}

function getChordNotes(chord) {
  const chordMap = {
    'C':'C E G', 'Cm':'C Eb G', 'D':'D F# A', 'Dm':'D F A', 'E':'E G# B',
    'Em':'E G B', 'F':'F A C', 'Fm':'F Ab C', 'G':'G B D', 'Gm':'G Bb D',
    'A':'A C# E', 'Am':'A C E', 'B':'B D# F#', 'Bm':'B D F#',
    'C#':'C# F G#', 'D#':'D# G A#', 'F#':'F# A# C#', 'G#':'G# C D#', 'A#':'A# D F',
    'E7':'E G# B D', 'A7':'A C# E G', 'D7':'D F# A C', 'G7':'G B D F',
    'Am7':'A C E G', 'Em7':'E G B D', 'Dm7':'D F A C', 'Cmaj7':'C E G B',
    'Fmaj7':'F A C E', 'Gmaj7':'G B D F#'
  };
  return chordMap[chord] || '—';
}

function getChordFunction(chord, key) {
  if (!key) return '';
  const degrees = ['I','II','III','IV','V','VI','VII'];
  const keyIdx = NOTES.indexOf(key.replace('m','').trim()) || 0;
  const chordRoot = chord.match(/^[A-G]#?/)?.[0] || '';
  const chordIdx = NOTES.indexOf(chordRoot);
  if (chordIdx === -1) return '';
  const interval = ((chordIdx - keyIdx) + 12) % 12;
  const degreeMap = {0:'I (טוניקה)', 2:'II', 3:'IIIb / vi', 4:'III', 5:'IV (סובדומיננטה)', 7:'V (דומיננטה)', 9:'VI', 10:'VIIb', 11:'VII'};
  return degreeMap[interval] ? `פונקציה: ${degreeMap[interval]}` : '';
}

// Guitar chord diagrams
const CHORD_SHAPES = {
  'C':    {frets:[0,3,2,0,1,0], fingers:[0,3,2,0,1,0], barre:0},
  'Cm':   {frets:[3,3,5,5,4,3], fingers:[1,1,3,4,2,1], barre:3},
  'D':    {frets:[-1,-1,0,2,3,2], fingers:[0,0,0,1,3,2], barre:0},
  'Dm':   {frets:[-1,-1,0,2,3,1], fingers:[0,0,0,2,3,1], barre:0},
  'E':    {frets:[0,2,2,1,0,0], fingers:[0,2,3,1,0,0], barre:0},
  'Em':   {frets:[0,2,2,0,0,0], fingers:[0,2,3,0,0,0], barre:0},
  'F':    {frets:[1,3,3,2,1,1], fingers:[1,3,4,2,1,1], barre:1},
  'Fm':   {frets:[1,3,3,1,1,1], fingers:[1,3,4,1,1,1], barre:1},
  'G':    {frets:[3,2,0,0,0,3], fingers:[2,1,0,0,0,3], barre:0},
  'Gm':   {frets:[3,5,5,3,3,3], fingers:[1,3,4,1,1,1], barre:3},
  'A':    {frets:[0,0,2,2,2,0], fingers:[0,0,1,2,3,0], barre:0},
  'Am':   {frets:[0,0,2,2,1,0], fingers:[0,0,2,3,1,0], barre:0},
  'B':    {frets:[2,2,4,4,4,2], fingers:[1,1,2,3,4,1], barre:2},
  'Bm':   {frets:[2,2,4,4,3,2], fingers:[1,1,3,4,2,1], barre:2},
  'E7':   {frets:[0,2,0,1,0,0], fingers:[0,2,0,1,0,0], barre:0},
  'A7':   {frets:[0,0,2,0,2,0], fingers:[0,0,2,0,1,0], barre:0},
  'D7':   {frets:[-1,-1,0,2,1,2], fingers:[0,0,0,2,1,3], barre:0},
  'G7':   {frets:[3,2,0,0,0,1], fingers:[3,2,0,0,0,1], barre:0},
  'Am7':  {frets:[0,0,2,0,1,0], fingers:[0,0,2,0,1,0], barre:0},
  'Em7':  {frets:[0,2,2,0,3,0], fingers:[0,1,2,0,3,0], barre:0},
  'Cmaj7':{frets:[0,3,2,0,0,0], fingers:[0,3,2,0,0,0], barre:0},
  'Fmaj7':{frets:[1,3,3,2,1,0], fingers:[1,3,4,2,1,0], barre:0},
};

function buildGuitarSVG(chord) {
  const shape = CHORD_SHAPES[chord];
  if (!shape) {
    return `<div style="color:var(--muted);font-size:0.8rem;padding:1rem 0">דיאגרמה לא זמינה</div>`;
  }

  const w = 120, h = 130;
  const fretStart = 20, fretEnd = 100;
  const stringStart = 25, stringEnd = 105;
  const fretCount = 5;
  const stringCount = 6;
  const fretSpacing = (stringEnd - stringStart) / fretCount;
  const stringSpacing = (fretEnd - fretStart) / (stringCount - 1);

  let dots = '';
  const minFret = Math.min(...shape.frets.filter(f => f > 0));
  const offset = minFret > 3 ? minFret - 1 : 0;

  shape.frets.forEach((fret, i) => {
    const x = fretEnd - i * stringSpacing;
    if (fret === -1) {
      dots += `<text x="${x}" y="18" text-anchor="middle" font-size="12" fill="#ff5c5c">✕</text>`;
    } else if (fret === 0) {
      dots += `<circle cx="${x}" cy="14" r="5" fill="none" stroke="#888" stroke-width="1.5"/>`;
    } else {
      const y = stringStart + (fret - offset - 0.5) * fretSpacing;
      dots += `<circle cx="${x}" cy="${y}" r="6" fill="#c8ff4e"/>`;
    }
  });

  // Barre indicator
  let barreEl = '';
  if (shape.barre > 0) {
    const y = stringStart + (shape.barre - offset - 0.5) * fretSpacing;
    barreEl = `<rect x="${fretStart+2}" y="${y-6}" width="${fretEnd-fretStart-4}" height="12" rx="6" fill="#c8ff4e" opacity="0.6"/>`;
  }

  let fretLines = '';
  for (let f = 0; f <= fretCount; f++) {
    const y = stringStart + f * fretSpacing;
    fretLines += `<line x1="${fretStart}" y1="${y}" x2="${fretEnd}" y2="${y}" stroke="#444" stroke-width="${f===0?2:1}"/>`;
  }

  let stringLines = '';
  for (let s = 0; s < stringCount; s++) {
    const x = fretEnd - s * stringSpacing;
    stringLines += `<line x1="${x}" y1="${stringStart}" x2="${x}" y2="${stringEnd}" stroke="#555" stroke-width="1.5"/>`;
  }

  const fretLabel = offset > 0 ? `<text x="${fretStart - 6}" y="${stringStart + fretSpacing * 0.5 + 4}" text-anchor="end" font-size="9" fill="#888">${offset+1}fr</text>` : '';

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${fretLines}${stringLines}${barreEl}${dots}${fretLabel}
    <text x="${w/2}" y="${h-4}" text-anchor="middle" font-size="9" fill="#666">E A D G B E</text>
  </svg>`;
}

function getChordNotes(chord) {
  const map = {
    'C':'C E G','Cm':'C Eb G','D':'D F# A','Dm':'D F A','E':'E G# B','Em':'E G B',
    'F':'F A C','Fm':'F Ab C','G':'G B D','Gm':'G Bb D','A':'A C# E','Am':'A C E',
    'B':'B D# F#','Bm':'B D F#','E7':'E G# B D','A7':'A C# E G','D7':'D F# A C',
    'G7':'G B D F','Am7':'A C E G','Em7':'E G B D','Cmaj7':'C E G B','Fmaj7':'F A C E'
  };
  return map[chord] || '—';
}
