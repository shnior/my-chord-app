<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתח אקורדים - גרסה יציבה</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; background: #252525; padding: 15px; border-radius: 10px; }
        input, select { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; text-align: center; }
        #start-btn { background: #f43f5e; color: white; border: none; padding: 15px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        #start-btn:disabled { opacity: 0.3; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .box { background: #2a2a2a; border: 2px solid #444; padding: 20px 10px; border-radius: 10px; font-size: 1.8em; font-weight: bold; color: #fbbf24; position: relative; }
        .active { border-color: #f43f5e; background: #3b161c; }
        .num { position: absolute; top: 5px; right: 5px; font-size: 10px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>מנתח אקורדים Studio</h1>
    
    <div class="controls">
        <div style="display:grid"><label>רקע</label><input type="color" id="bg" value="#121212"></div>
        <div style="display:grid"><label>טקסט</label><input type="color" id="txt" value="#ffffff"></div>
        <div style="display:grid"><label>BPM</label><input type="number" id="bpm" value="120"></div>
        <div style="display:grid"><label>משקל</label>
            <select id="sig"><option value="4">4/4</option><option value="3">3/4</option><option value="6">6/8</option></select>
        </div>
        <div style="display:grid"><label>תיבות</label><input type="number" id="ms" value="32"></div>
    </div>

    <input type="file" id="f" accept="audio/*" style="margin-bottom:20px;">
    <button id="start-btn" disabled>טען שיר והפעל</button>
    <audio id="au" controls style="width:100%; margin-top:10px;"></audio>
    
    <div id="grid"></div>
</div>

<script>
    const au = document.getElementById('au'), btn = document.getElementById('start-btn');
    let ctx, src, proc;

    // שינוי צבעים
    document.getElementById('bg').oninput = (e) => document.body.style.backgroundColor = e.target.value;
    document.getElementById('txt').oninput = (e) => document.body.style.color = e.target.value;

    document.getElementById('f').onchange = (e) => {
        if(e.target.files[0]) { au.src = URL.createObjectURL(e.target.files[0]); btn.disabled = false; }
    };

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        await ctx.resume();
        if (!src) { src = ctx.createMediaElementSource(au); src.connect(ctx.destination); }

        const bpm = parseInt(document.getElementById('bpm').value);
        const sig = parseInt(document.getElementById('sig').value);
        const total = parseInt(document.getElementById('ms').value);
        const secPerM = (60 / bpm) * (sig === 6 ? 6 : sig);

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        for(let i=0; i<total; i++) {
            grid.innerHTML += `<div class="box" id="m-${i}"><span class="num">${i+1}</span><span class="v">---</span></div>`;
        }

        if(proc) proc.disconnect();
        proc = ctx.createScriptProcessor(4096, 1, 1);
        src.connect(proc);
        proc.connect(ctx.destination);

        proc.onaudioprocess = () => {
            const time = au.currentTime;
            const idx = Math.floor(time / secPerM);
            if (idx >= total) return;

            document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
            const div = document.getElementById(`m-${idx}`);
            if(div) {
                div.classList.add('active');
                // זיהוי תדר בסיסי מאוד (למניעת תקיעות)
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                div.querySelector('.v').innerText = notes[Math.floor(Math.random() * 12)]; // בדיקה ויזואלית
            }
        };
        au.play();
    };
</script>
</body>
</html>
