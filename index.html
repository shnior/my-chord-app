<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתח אקורדים - גרסה מתוקנת</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/meyda/5.6.0/meyda.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 30px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 30px; max-width: 500px; margin: 0 auto; border: 1px solid #333; }
        #start-btn { background: #007bff; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; margin: 20px 0; }
        #start-btn:disabled { background: #444; opacity: 0.5; }
        #chord-result { font-size: 3em; color: #ffeb3b; margin: 20px 0; }
        .visualizer { display: flex; justify-content: center; gap: 5px; height: 100px; align-items: flex-end; }
        .bar { width: 20px; background: #4CAF50; transition: height 0.1s; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>מנתח אקורדים</h1>
    <input type="file" id="audio-file" accept="audio/*">
    <br>
    <button id="start-btn" disabled>התחל ניתוח</button>
    <h2 id="chord-result">העלה קובץ...</h2>
    <div class="visualizer" id="visualizer"></div>
    <audio id="audio-player" controls></audio>
</div>

<script>
    let audioContext;
    let source;
    let analyzer;
    
    const startBtn = document.getElementById('start-btn');
    const audioFile = document.getElementById('audio-file');
    const audioPlayer = document.getElementById('audio-player');
    const chordResult = document.getElementById('chord-result');

    // יצירת הגרפים
    for(let i=0; i<12; i++) {
        const bar = document.createElement('div');
        bar.id = `bar-${i}`;
        bar.className = 'bar';
        document.getElementById('visualizer').appendChild(bar);
    }

    const CHORD_TEMPLATES = {
        'C Major': [0, 4, 7], 'D Major': [2, 6, 9], 'E Major': [4, 8, 11],
        'F Major': [5, 9, 0], 'G Major': [7, 11, 2], 'A Major': [9, 1, 4], 'B Major': [11, 3, 6],
        'C Minor': [0, 3, 7], 'D Minor': [2, 5, 9], 'E Minor': [4, 7, 11], 'A Minor': [9, 0, 4]
    };

    audioFile.onchange = (e) => {
        if (e.target.files[0]) {
            audioPlayer.src = URL.createObjectURL(e.target.files[0]);
            startBtn.disabled = false;
            chordResult.innerText = "מוכן! לחץ על התחל";
        }
    };

    startBtn.onclick = async () => {
        try {
            // יצירת ה-Context רק בלחיצה
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            await audioContext.resume();

            // חיבור הנגן למערכת הניתוח
            if (!source) {
                source = audioContext.createMediaElementSource(audioPlayer);
                source.connect(audioContext.destination);
            }

            if (analyzer) analyzer.stop();

            analyzer = Meyda.createMeydaAnalyzer({
                audioContext: audioContext,
                source: source,
                bufferSize: 1024,
                featureExtractors: ['chroma'],
                callback: features => {
                    features.chroma.forEach((val, i) => {
                        document.getElementById(`bar-${i}`).style.height = (val * 100) + 'px';
                    });

                    let best = "---", max = 0.5;
                    for (const [name, idxs] of Object.entries(CHORD_TEMPLATES)) {
                        let s = idxs.reduce((a, b) => a + features.chroma[b], 0);
                        if (s > max) { max = s; best = name; }
                    }
                    chordResult.innerText = best;
                }
            });

            analyzer.start();
            audioPlayer.play();
            startBtn.innerText = "מנתח...";
            startBtn.disabled = true;

        } catch (err) {
            console.error(err);
            alert("שגיאה: " + err.message);
        }
    };
</script>
</body>
</html>
