<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתח אקורדים Studio - Piano View</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #0f172a; --text: #ffffff; --accent: #f43f5e; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10px; color: #94a3b8; font-weight: bold; }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 8px; border-radius: 6px; text-align: center; font-size: 13px; }

        #main-display { margin-bottom: 20px; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        #current-chord { font-size: 8em; font-weight: 900; color: #fbbf24; margin: 0; text-shadow: 0 0 30px rgba(251, 191, 36, 0.3); }

        /* עיצוב המקלדת */
        .piano { display: flex; justify-content: center; position: relative; height: 150px; margin: 20px auto; background: #111; padding: 5px; border-radius: 8px; width: fit-content; }
        .key { width: 40px; height: 140px; border: 1px solid #333; background: white; border-radius: 0 0 5px 5px; position: relative; cursor: default; }
        .key.black { width: 26px; height: 90px; background: #222; margin-left: -13px; margin-right: -13px; z-index: 2; border-radius: 0 0 3px 3px; }
        .key.active { background: var(--accent) !important; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 0 15px var(--accent); }

        #start-btn { background: var(--accent); color: white; border: none; padding: 15px; font-size: 1.2em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 15px; }
        audio { width: 100%; filter: invert(0.8); }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="group"><label>רקע</label><input type="color" id="bgCol"></div>
        <div class="group"><label>גופן</label><input type="color" id="txtCol"></div>
        <div class="group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
        <div class="group"><label>רגישות</label><input type="range" id="sens" min="30" max="80" value="55"></div>
    </div>

    <input type="file" id="fileInput" accept="audio/*" style="margin-bottom: 15px;">
    <button id="start-btn" disabled>הפעל זיהוי ומקלדת</button>
    <audio id="audio" controls></audio>

    <div id="main-display">
        <p id="current-chord">---</p>
    </div>

    <div class="piano" id="piano">
        <div class="key" data-note="0"></div>
        <div class="key black" data-note="1"></div>
        <div class="key" data-note="2"></div>
        <div class="key black" data-note="3"></div>
        <div class="key" data-note="4"></div>
        <div class="key" data-note="5"></div>
        <div class="key black" data-note="6"></div>
        <div class="key" data-note="7"></div>
        <div class="key black" data-note="8"></div>
        <div class="key" data-note="9"></div>
        <div class="key black" data-note="10"></div>
        <div class="key" data-note="11"></div>
        <div class="key" data-note="12"></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), btn = document.getElementById('start-btn');
    const bgIn = document.getElementById('bgCol'), txtIn = document.getElementById('txtCol');
    const display = document.getElementById('current-chord');
    const keys = document.querySelectorAll('.key');
    let ctx, source, analyzer;

    // הגדרות אישיות
    function updateColors(bg, txt) {
        document.documentElement.style.setProperty('--bg', bg);
        document.documentElement.style.setProperty('--text', txt);
    }
    bgIn.value = localStorage.getItem('studio-bg') || '#0f172a';
    txtIn.value = localStorage.getItem('studio-txt') || '#ffffff';
    updateColors(bgIn.value, txtIn.value);

    bgIn.oninput = (e) => { updateColors(e.target.value, txtIn.value); localStorage.setItem('studio-bg', e.target.value); };
    txtIn.oninput = (e) => { updateColors(bgIn.value, e.target.value); localStorage.setItem('studio-txt', e.target.value); };

    document.getElementById('fileInput').onchange = (e) => { if(e.target.files[0]) { audio.src = URL.createObjectURL(e.target.files[0]); btn.disabled = false; } };

    function highlightKeys(root, intervals) {
        keys.forEach(k => k.classList.remove('active'));
        if (root === -1) return;
        [0, ...intervals].forEach(interval => {
            const noteIdx = (root + interval) % 12;
            const key = document.querySelector(`.key[data-note="${noteIdx}"]`);
            if (key) key.classList.add('active');
        });
    }

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        await ctx.resume();
        if (!source) { source = ctx.createMediaElementSource(audio); source.connect(ctx.destination); }

        if (analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                const trans = parseInt(document.getElementById('trans').value);
                const sens = parseInt(document.getElementById('sens').value) / 100;
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const chords = [
                    {n:'', p:[4,7], weight: 1.2}, 
                    {n:'m', p:[3,7], weight: 1.1}
                ];

                let maxScore = sens, bestRoot = -1, bestType = null;

                for(let r=0; r<12; r++) {
                    for(let c of chords) {
                        let score = (f.chroma[r] + f.chroma[(r+c.p[0])%12] + f.chroma[(r+c.p[1])%12]) / 3 * c.weight;
                        if(score > maxScore) { 
                            maxScore = score; 
                            bestRoot = r; 
                            bestType = c;
                        }
                    }
                }

                if(bestRoot !== -1) {
                    const finalIdx = (bestRoot + trans + 12) % 12;
                    display.innerText = notes[finalIdx] + bestType.n;
                    highlightKeys(finalIdx, bestType.p);
                } else {
                    highlightKeys(-1, []);
                }
            }
        });
        analyzer.start();
        audio.play();
    };
</script>
</body>
</html>
