<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתח אקורדים מקצועי - תצוגה ישירה</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --bg: #0f172a; --text: #ffffff; --accent: #f43f5e; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; text-align: center; overflow: hidden; }
        
        .container { max-width: 800px; margin: 0 auto; background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        
        /* לוח בקרה עליון */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; font-size: 14px; text-align: center; }

        /* תצוגת האקורד המרכזית */
        #main-display { margin: 40px 0; padding: 60px 20px; background: rgba(255,255,255,0.03); border-radius: 25px; border: 2px solid rgba(255,255,255,0.05); min-height: 200px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #current-chord { font-size: 10em; font-weight: 900; color: #fbbf24; text-shadow: 0 0 50px rgba(251, 191, 36, 0.3); line-height: 1; margin: 0; }
        #chord-details { font-size: 1.5em; color: #94a3b8; margin-top: 10px; font-weight: 500; }

        #start-btn { background: var(--accent); color: white; border: none; padding: 18px; font-size: 1.4em; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(244, 63, 94, 0.3); transition: 0.2s; }
        #start-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        audio { width: 100%; filter: invert(0.8); }
        #bpm-status { font-size: 12px; color: #38bdf8; height: 15px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>זיהוי אקורדים - Live</h1>
    
    <div class="dashboard">
        <div class="group"><label>רקע</label><input type="color" id="bgCol" value="#0f172a"></div>
        <div class="group"><label>גופן</label><input type="color" id="txtCol" value="#ffffff"></div>
        <div class="group"><label>BPM</label><input type="number" id="bpm" value="120"><div id="bpm-status"></div></div>
        <div class="group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
    </div>

    <div style="margin-bottom: 25px; border: 2px dashed #334155; padding: 15px; border-radius: 15px;">
        <input type="file" id="fileInput" accept="audio/*">
    </div>

    <button id="start-btn" disabled>הפעל זיהוי חי</button>
    <audio id="audio" controls></audio>

    <div id="main-display">
        <p id="current-chord">---</p>
        <div id="chord-details">ממתין לשמע...</div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), btn = document.getElementById('start-btn'), bpmIn = document.getElementById('bpm'), status = document.getElementById('bpm-status');
    const display = document.getElementById('current-chord'), details = document.getElementById('chord-details');
    let ctx, source, analyzer;

    // עיצוב דינמי
    document.getElementById('bgCol').oninput = (e) => document.documentElement.style.setProperty('--bg', e.target.value);
    document.getElementById('txtCol').oninput = (e) => document.documentElement.style.setProperty('--text', e.target.value);

    // זיהוי BPM אוטומטי בעת העלאת קובץ
    async function autoDetect(file) {
        status.innerText = "מנתח קצב...";
        const tempCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100 * 30, 44100);
        const buffer = await file.arrayBuffer();
        const audioBuffer = await tempCtx.decodeAudioData(buffer);
        const data = audioBuffer.getChannelData(0);
        let peaks = [];
        for (let i = 0; i < data.length; i += 441) { if (data[i] > 0.55) peaks.push(i); }
        if (peaks.length > 5) {
            let diffs = [];
            for (let i = 1; i < peaks.length; i++) diffs.push(peaks[i] - peaks[i-1]);
            const median = diffs.sort((a,b) => a-b)[Math.floor(diffs.length/2)];
            let detected = Math.round(60 / (median / 44100));
            while (detected < 70) detected *= 2;
            while (detected > 150) detected /= 2;
            bpmIn.value = detected;
            status.innerText = "קצב זוהה: " + detected + " BPM";
        } else { status.innerText = "קצב לא זוהה - הגדר ידנית"; }
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if(file) { audio.src = URL.createObjectURL(file); btn.disabled = false; autoDetect(file); }
    };

    btn.onclick = async () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        await ctx.resume();
        if (!source) { source = ctx.createMediaElementSource(audio); source.connect(ctx.destination); }

        const trans = parseInt(document.getElementById('trans').value);

        if (analyzer) analyzer.stop();
        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: ctx, source: source, bufferSize: 8192, // באפר גדול יותר לדיוק תדרים
            featureExtractors: ['chroma'],
            callback: f => {
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const fullNames = ['דו','דו דיאז','רה','רה דיאז','מי','פה','פה דיאז','סול','סול דיאז','לה','לה דיאז','סי'];
                const chords = [
                    {n:'', p:[0,4,7], type:'Major'}, 
                    {n:'m', p:[0,3,7], type:'Minor'}, 
                    {n:'7', p:[0,4,7,10], type:'7th'}, 
                    {n:'maj7', p:[0,4,7,11], type:'Major 7th'}
                ];

                let max = 0.5, bestRoot = -1, bestType = "";

                for(let r=0; r<12; r++) {
                    for(let c of chords) {
                        let score = c.p.reduce((acc, p) => acc + f.chroma[(r+p)%12], 0);
                        if(score > max) { max = score; bestRoot = r; bestType = c; }
                    }
                }

                if(bestRoot !== -1) {
                    const transposedIndex = (bestRoot + trans + 12) % 12;
                    display.innerText = notes[transposedIndex] + bestType.n;
                    details.innerText = fullNames[transposedIndex] + " " + (bestType.type === 'Major' ? 'מז\'ור' : 'מינור');
                    display.style.color = "#fbbf24";
                } else {
                    display.style.color = "#334155";
                }
            }
        });
        analyzer.start();
        audio.play();
    };
</script>
</body>
</html>
