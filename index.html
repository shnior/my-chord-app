<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מזהה אקורדים ניסיוני</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/meyda/5.6.0/meyda.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { display: flex; justify-content: center; gap: 10px; height: 200px; align-items: flex-end; margin-top: 30px; }
        .column { display: flex; flex-direction: column; align-items: center; }
        .bar { width: 30px; background: #4CAF50; transition: height 0.1s; border-radius: 5px 5px 0 0; }
        .label { font-size: 12px; margin-top: 5px; color: #aaa; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #444; cursor: not-allowed; }
        h2 { min-height: 40px; color: #ffeb3b; }
    </style>
</head>
<body>
    <h1>מזהה אקורדים בזמן אמת</h1>
    <p>לחץ על הכפתור ונגן אקורד מול המיקרופון</p>
    
    <button id="start">התחל להקשיב</button>
    <h2 id="chord-name">מזהה...</h2>
    
    <div class="container" id="visualizer">
        <div class="column"><div id="bar-0" class="bar" style="height: 0%"></div><div class="label">C</div></div>
        <div class="column"><div id="bar-1" class="bar" style="height: 0%"></div><div class="label">C#</div></div>
        <div class="column"><div id="bar-2" class="bar" style="height: 0%"></div><div class="label">D</div></div>
        <div class="column"><div id="bar-3" class="bar" style="height: 0%"></div><div class="label">D#</div></div>
        <div class="column"><div id="bar-4" class="bar" style="height: 0%"></div><div class="label">E</div></div>
        <div class="column"><div id="bar-5" class="bar" style="height: 0%"></div><div class="label">F</div></div>
        <div class="column"><div id="bar-6" class="bar" style="height: 0%"></div><div class="label">F#</div></div>
        <div class="column"><div id="bar-7" class="bar" style="height: 0%"></div><div class="label">G</div></div>
        <div class="column"><div id="bar-8" class="bar" style="height: 0%"></div><div class="label">G#</div></div>
        <div class="column"><div id="bar-9" class="bar" style="height: 0%"></div><div class="label">A</div></div>
        <div class="column"><div id="bar-10" class="bar" style="height: 0%"></div><div class="label">A#</div></div>
        <div class="column"><div id="bar-11" class="bar" style="height: 0%"></div><div class="label">B</div></div>
    </div>

    <script>
        const startBtn = document.getElementById('start');
        const chordDisplay = document.getElementById('chord-name');

        const CHORD_TEMPLATES = {
            'C Major': [0, 4, 7], 'C# Major': [1, 5, 8], 'D Major': [2, 6, 9],
            'Eb Major': [3, 7, 10], 'E Major': [4, 8, 11], 'F Major': [5, 9, 0],
            'F# Major': [6, 10, 1], 'G Major': [7, 11, 2], 'Ab Major': [8, 0, 3],
            'A Major': [9, 1, 4], 'Bb Major': [10, 2, 5], 'B Major': [11, 3, 6],
            'C Minor': [0, 3, 7], 'D Minor': [2, 5, 9], 'E Minor': [4, 7, 11],
            'A Minor': [9, 0, 4], 'G Minor': [7, 10, 2]
        };

        startBtn.onclick = async () => {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);

                const analyzer = Meyda.createMeydaAnalyzer({
                    audioContext: audioContext,
                    source: source,
                    bufferSize: 1024,
                    featureExtractors: ['chroma'],
                    callback: features => {
                        const chroma = features.chroma;
                        chroma.forEach((value, i) => {
                            const bar = document.getElementById(`bar-${i}`);
                            bar.style.height = (value * 100) + '%';
                            bar.style.background = value > 0.6 ? '#ffeb3b' : '#4CAF50';
                        });

                        let bestChord = "מזהה...";
                        let maxSimilarity = 0.5;

                        for (const [name, notes] of Object.entries(CHORD_TEMPLATES)) {
                            let currentSimilarity = notes.reduce((sum, noteIdx) => sum + chroma[noteIdx], 0);
                            if (currentSimilarity > maxSimilarity) {
                                maxSimilarity = currentSimilarity;
                                bestChord = name;
                            }
                        }
                        chordDisplay.innerText = "אקורד מזוהה: " + bestChord;
                    }
                });
                analyzer.start();
                startBtn.innerText = "מקשיב...";
                startBtn.disabled = true;
            } catch (err) {
                alert("שגיאה בגישה למיקרופון: " + err);
            }
        };
    </script>
</body>
</html>
