<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ChordAI - Keyboard Edition</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #34d399; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .container { max-width: 900px; margin: 0 auto; }
        .search-box { background: var(--panel); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 60%; font-size: 16px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; margin: 5px; }

        /* Piano Display */
        .piano-view { background: #000; padding: 20px; border-radius: 10px; margin: 20px 0; display: inline-block; position: relative; }
        .piano { display: flex; border-radius: 5px; overflow: hidden; }
        .key { width: 40px; height: 150px; background: white; border: 1px solid #333; box-sizing: border-box; position: relative; }
        .key.black { width: 26px; height: 90px; background: #333; margin-left: -13px; margin-right: -13px; z-index: 2; border: none; }
        .key.active { background: var(--accent) !important; box-shadow: inset 0 -10px 10px rgba(0,0,0,0.2); }

        /* Live Chords */
        .chords-display { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .chord-unit { background: var(--panel); padding: 15px; border-radius: 10px; min-width: 80px; border: 2px solid transparent; transition: 0.3s; }
        .chord-unit.playing { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px rgba(52, 211, 153, 0.4); }
        .chord-name { font-size: 24px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <h2>ניתוח אקורדים לקלידים (לייב)</h2>
        <input type="text" id="songInput" placeholder="שם שיר (למשל: Let It Be)">
        <button onclick="startAnalysis()">נתח שיר</button>
        <button id="playBtn" style="display:none; background:#818cf8;" onclick="togglePlay()">נגן בלייב ▶</button>
    </div>

    <div id="pianoContainer" style="display:none;">
        <h3 id="currentChordTitle">ממתין...</h3>
        <div class="piano-view">
            <div class="piano" id="pianoKeys"></div>
        </div>
    </div>

    <div class="chords-display" id="chordsList"></div>
</div>

<script>
    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const CHORD_DATA = {
        '': [0, 4, 7], 'm': [0, 3, 7], '7': [0, 4, 7, 10], 'maj7': [0, 4, 7, 11], 'm7': [0, 3, 7, 10]
    };

    let song = null;
    let playing = false;
    let currentIndex = 0;
    let timer = null;

    // יצירת הקלידים
    function initPiano() {
        const piano = document.getElementById('pianoKeys');
        piano.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const isBlack = NOTES[i % 12].includes('#');
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black' : 'white'}`;
            key.id = `key-${i}`;
            piano.appendChild(key);
        }
    }

    function startAnalysis() {
        const name = document.getElementById('songInput').value || "שיר חדש";
        // נתונים מדומים לביצועים (במקום API שחוסם)
        song = {
            bpm: 85,
            chords: [
                {n: "C", b: 4}, {n: "G", b: 4}, {n: "Am", b: 4}, {n: "F", b: 4},
                {n: "C", b: 4}, {n: "G", b: 4}, {n: "F", b: 2}, {n: "C", b: 2}
            ]
        };
        renderChords();
        document.getElementById('pianoContainer').style.display = 'block';
        document.getElementById('playBtn').style.display = 'inline-block';
        showChord(song.chords[0].n, 0);
    }

    function renderChords() {
        const list = document.getElementById('chordsList');
        list.innerHTML = song.chords.map((c, i) => `
            <div class="chord-unit" id="unit-${i}" onclick="showChord('${c.n}', ${i})">
                <span class="chord-name">${c.n}</span>
                <small>${c.b} פעימות</small>
            </div>
        `).join('');
    }

    function showChord(chordName, index) {
        document.getElementById('currentChordTitle').innerText = "אקורד נוכחי: " + chordName;
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        document.querySelectorAll('.chord-unit').forEach(u => u.classList.remove('playing'));
        document.getElementById(`unit-${index}`).classList.add('playing');

        const rootStr = chordName.match(/^[A-G][#b]?/)[0];
        const type = chordName.replace(rootStr, '');
        let rootIdx = NOTES.indexOf(rootStr.replace('b', ''));

        (CHORD_DATA[type] || CHORD_DATA['']).forEach(interval => {
            const key = document.getElementById(`key-${rootIdx + interval}`);
            if (key) key.classList.add('active');
        });
    }

    function togglePlay() {
        playing = !playing;
        document.getElementById('playBtn').innerText = playing ? "עצור ⏹" : "נגן בלייב ▶";
        if (playing) playNext();
        else clearTimeout(timer);
    }

    function playNext() {
        if (!playing) return;
        showChord(song.chords[currentIndex].n, currentIndex);
        
        const beatMs = (60 / song.bpm) * 1000;
        const duration = song.chords[currentIndex].b * beatMs;

        currentIndex = (currentIndex + 1) % song.chords.length;
        timer = setTimeout(playNext, duration);
    }

    initPiano();
</script>
</body>
</html>
