<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAESTRO v30 PRO</title>

<script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>

<style>
body {
  margin:0;
  display:grid;
  grid-template-columns:300px 1fr;
  height:100vh;
  font-family:sans-serif;
  background:#0b0f14;
  color:#fff;
}
aside {
  padding:20px;
  background:#111;
  display:flex;
  flex-direction:column;
  gap:10px;
}
button {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
canvas {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<aside>
  <h2>MAESTRO v30 PRO</h2>

  <button onclick="loadFile()">🎧 טען קובץ</button>
  <input type="file" id="file" hidden accept="audio/*">

  <button onclick="togglePlay()">▶ נגן / עצור</button>
  <button onclick="startVoice()">🎙️ פקודות קוליות</button>

  <div>BPM: <span id="bpm">---</span></div>
</aside>

<main>
  <canvas id="wave"></canvas>
</main>

<script>
const state = {
  ctx: null,
  buffer: null,
  source: null,
  isPlaying: false,
  startTime: 0,
  offset: 0
};

// ========= LOAD =========
function loadFile() {
  document.getElementById("file").click();
}

file.onchange = async e => {
  const f = e.target.files[0];
  if (!f) return;

  state.ctx = new AudioContext();
  const data = await f.arrayBuffer();
  state.buffer = await state.ctx.decodeAudioData(data);

  drawWave(state.buffer);
  detectBPM(state.buffer);
};

// ========= PLAY =========
function createSource() {
  const src = state.ctx.createBufferSource();
  src.buffer = state.buffer;
  src.connect(state.ctx.destination);
  return src;
}

function togglePlay() {
  if (!state.buffer) return;

  if (!state.isPlaying) {
    state.source = createSource();
    state.source.start(0, state.offset);
    state.startTime = state.ctx.currentTime;
    state.isPlaying = true;

    state.source.onended = () => {
      state.isPlaying = false;
      state.offset = 0;
    };
  } else {
    state.source.stop();
    state.offset += state.ctx.currentTime - state.startTime;
    state.isPlaying = false;
  }
}

// ========= WAVE =========
function drawWave(buffer) {
  const canvas = document.getElementById("wave");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / canvas.width);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let i=0;i<canvas.width;i++){
    let min=1,max=-1;
    for (let j=0;j<step;j++){
      const val = data[(i*step)+j];
      if(val<min)min=val;
      if(val>max)max=val;
    }
    ctx.fillRect(i,(1+min)*canvas.height/2,1,(max-min)*canvas.height/2);
  }
}

// ========= BPM =========
function detectBPM(buffer) {
  const data = buffer.getChannelData(0);

  let peaks = [];
  for (let i=0;i<data.length;i+=10000){
    if (data[i] > 0.9) peaks.push(i);
  }

  let intervals = [];
  for (let i=1;i<peaks.length;i++){
    intervals.push(peaks[i]-peaks[i-1]);
  }

  let avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
  let bpm = 60 / (avg / buffer.sampleRate);

  document.getElementById("bpm").textContent = Math.round(bpm) || "---";
}

// ========= VOICE =========
function startVoice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("אין תמיכה בדפדפן");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "he-IL";

  rec.onresult = e => {
    const text = e.results[0][0].transcript;
    console.log("🎙️", text);

    if (text.includes("נגן")) togglePlay();
    if (text.includes("עצור")) togglePlay();
  };

  rec.start();
}
</script>

</body>
</html>
