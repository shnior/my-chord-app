<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>זיהוי אקורדים מקצועי </title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121512; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 24px; padding: 30px; max-width: 700px; margin: 0 auto; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        .file-upload-box { border: 2px dashed #444; padding: 20px; border-radius: 15px; margin-bottom: 20px; background: #252525; }
        
        #chord-result { font-size: 7em; color: #ffeb3b; margin: 10px 0; font-weight: 900; text-shadow: 0 0 30px rgba(255,235,59,0.3); }
        
        /* אזור רשימת האקורדים של השיר */
        .chord-log-container { margin-top: 30px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #444; text-align: right; }
        .chord-log-container h3 { margin-top: 0; color: #007bff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #chord-log { display: flex; flex-wrap: wrap; gap: 10px; font-size: 1.5em; min-height: 50px; }
        .log-item { background: #333; padding: 5px 15px; border-radius: 8px; color: #ffeb3b; border: 1px solid #555; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
        .t-btn { background: #007bff; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        
        #start-btn { background: #ff0055; color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        #start-btn:disabled { background: #333; cursor: not-allowed; }
        
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>זיהוי אקורדים מקצועי</h1>
    
    <div class="file-upload-box">
        <input type="file" id="audio-file" accept="audio/*">
    </div>
    
    <h2 id="chord-result">---</h2>

    <div class="controls">
        <button class="t-btn" onclick="changeTranspose(-1)">-</button>
        <span id="t-display" style="font-weight: bold;">סולם: 0</span>
        <button class="t-btn" onclick="changeTranspose(1)">+</button>
        <button id="clear-btn" style="margin-right:20px; background:#444; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;" onclick="clearLog()">נקה רשימה</button>
    </div>
    
    <button id="start-btn" disabled>התחל ניתוח שיר מלא</button>
    <audio id="audio-player" controls></audio>

    <div class="chord-log-container">
        <h3>מהלך האקורדים בשיר:</h3>
        <div id="chord-log">
            </div>
    </div>
</div>

<script>
    let audioContext, source, analyzer;
    let transpose = 0;
    let lastLoggedChord = "";
    let chordHistory = [];
    const HISTORY_SIZE = 20;
    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    function clearLog() {
        document.getElementById('chord-log').innerHTML = "";
        lastLoggedChord = "";
    }

    function changeTranspose(val) {
        transpose = (transpose + val + 12) % 12;
        let displayVal = transpose > 6 ? transpose - 12 : transpose;
        document.getElementById('t-display').innerText = "סולם: " + (displayVal >= 0 ? "+" : "") + displayVal;
    }

    document.getElementById('audio-file').onchange = (e) => {
        if (e.target.files[0]) {
            document.getElementById('audio-player').src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('start-btn').disabled = false;
            clearLog();
        }
    };

    document.getElementById('start-btn').onclick = async () => {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') await audioContext.resume();

        if (!source) {
            source = audioContext.createMediaElementSource(document.getElementById('audio-player'));
            source.connect(audioContext.destination);
        }

        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: audioContext,
            source: source,
            bufferSize: 2048,
            featureExtractors: ['chroma'],
            callback: features => {
                const chroma = features.chroma;
                const threshold = Math.max(...chroma) * 0.6;
                const cleanChroma = chroma.map(v => v > threshold ? v : 0);

                let bestChord = "---";
                let maxScore = 0;

                const CHORD_DATA = [
                    { name: '', pattern: [0, 4, 7] },
                    { name: 'm', pattern: [0, 3, 7] },
                    { name: '7', pattern: [0, 4, 7, 10] },
                    { name: 'maj7', pattern: [0, 4, 7, 11] },
                    { name: 'm7', pattern: [0, 3, 7, 10] }
                ];

                for (let root = 0; root < 12; root++) {
                    for (let type of CHORD_DATA) {
                        let score = type.pattern.reduce((sum, interval) => sum + cleanChroma[(root + interval) % 12], 0);
                        if (score > maxScore) {
                            maxScore = score;
                            let transposedRoot = (root + transpose + 12) % 12;
                            bestChord = NOTES[transposedRoot] + type.name;
                        }
                    }
                }

                if (bestChord !== "---") {
                    chordHistory.push(bestChord);
                    if (chordHistory.length > HISTORY_SIZE) chordHistory.shift();
                    
                    const counts = {};
                    chordHistory.forEach(c => counts[c] = (counts[c] || 0) + 1);
                    const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                    
                    document.getElementById('chord-result').innerText = winner;

                    // הוספה לרשימה רק אם האקורד באמת השתנה והוא יציב
                    if (winner !== lastLoggedChord && counts[winner] > 12) {
                        addChordToLog(winner);
                        lastLoggedChord = winner;
                    }
                }
            }
        });

        analyzer.start();
        document.getElementById('audio-player').play();
        document.getElementById('start-btn').innerText = "מנתח שיר...";
        document.getElementById('start-btn').disabled = true;
    };

    function addChordToLog(chord) {
        const log = document.getElementById('chord-log');
        const span = document.createElement('span');
        span.className = 'log-item';
        span.innerText = chord;
        log.appendChild(span);
        // גלילה אוטומטית לסוף
        log.scrollTop = log.scrollHeight;
    }
</script>
</body>
</html>
