<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Studio Pro | Shneior Eisenbach Edition</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --accent: #00f2ff;
            --gold: #ffcc00; --red: #ff3e3e; --border: #30363d; --text: #e6edf3;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - Control Center */
        aside {
            width: 380px; background: var(--panel); border-left: 1px solid var(--border);
            padding: 25px; display: flex; flex-direction: column; gap: 20px; box-shadow: 5px 0 30px rgba(0,0,0,0.5); z-index: 20;
        }
        .logo-area { border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 10px; }
        .logo-area h1 { font-size: 22px; margin: 0; color: var(--accent); letter-spacing: 1px; }
        .logo-area span { font-size: 10px; color: #8b949e; text-transform: uppercase; }

        .module { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .label { font-size: 11px; color: #8b949e; font-weight: 800; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .value-large { font-size: 38px; font-weight: 900; text-align: center; font-family: 'Courier New', monospace; color: #fff; }

        /* Main Stage */
        main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #161b22 0%, #05070a 100%); }
        .chord-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #main-chord { font-size: 200px; font-weight: 950; color: var(--gold); text-shadow: 0 0 80px rgba(255,204,0,0.3); margin: 0; line-height: 1; }
        #chord-details { font-size: 28px; color: var(--accent); font-weight: 300; letter-spacing: 5px; margin-top: 10px; }

        /* Visualizers */
        #spectrum { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0.15; pointer-events: none; }
        
        /* Footer - Mixer & Piano */
        footer { height: 280px; background: #010409; border-top: 1px solid var(--border); padding: 20px; display: grid; grid-template-rows: auto 1fr; gap: 15px; }
        .history-bar { display: flex; gap: 12px; overflow-x: auto; padding: 10px; direction: ltr; scrollbar-width: none; }
        .h-chip { background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; color: var(--accent); font-weight: 900; font-size: 18px; min-width: 80px; text-align: center; transition: 0.3s; }
        
        .piano-container { display: flex; justify-content: center; height: 110px; direction: ltr; perspective: 1000px; }
        .key { width: 40px; background: #f0f0f0; border: 1px solid #999; border-radius: 0 0 6px 6px; cursor: pointer; position: relative; transition: all 0.1s; transform-origin: top; }
        .key.black { width: 28px; background: #1a1a1a; height: 65px; margin-left: -14px; margin-right: -14px; z-index: 5; border: 1px solid #000; }
        .key.active { background: var(--red) !important; transform: rotateX(-15deg) translateY(5px); box-shadow: 0 10px 25px var(--red); border: none; }

        /* Controls */
        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,242,255,0.4); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        input[type="number"] { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 100%; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<aside>
    <div class="logo-area">
        <h1>MAESTRO STUDIO</h1>
        <span>Professional Chord Engine v22.0</span>
    </div>

    <div class="module">
        <label>קצב שיר (BPM)</label>
        <div id="bpm-display" class="value-large">---</div>
    </div>

    <div class="module">
        <label>טרנספוזיציה (Transpose)</label>
        <input type="number" id="transpose" value="0">
    </div>

    <div class="module">
        <label>ווליום מקלדת</label>
        <input type="range" id="volume" min="0" max="100" value="50">
    </div>

    <div class="module">
        <label>סטטוס MIDI</label>
        <div id="midi-status" style="font-size: 12px; color: var(--gold); font-weight: bold; text-align: center;">ממתין לחיבור מקלדת...</div>
    </div>

    <button class="btn" style="background: #21262d; color: #fff; margin-bottom: 10px;" onclick="document.getElementById('file-input').click()">טען קובץ שמע</button>
    <input type="file" id="file-input" style="display:none" accept="audio/*">
    
    <button id="power-btn" class="btn" disabled>הפעל מנוע סאונד</button>
</aside>

<main>
    <canvas id="spectrum"></canvas>
    <div class="chord-center">
        <div id="main-chord">--</div>
        <div id="chord-details">ממתין לניתוח שמע</div>
    </div>

    <footer>
        <div class="history-bar" id="history-rail"></div>
        <div class="piano-container" id="piano-rail"></div>
    </footer>
</main>

<script>
    /**
     * MAESTRO PRO ENGINE - ALL-IN-ONE
     * Shneior Eisenbach Professional Edition
     */

    // משתני ליבה
    let audioCtx, source, meyda, analyser, masterGain;
    let baseBPM = 120, currentTrans = 0;
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const notesHeb = ["דו", "דו#", "רה", "רה#", "מי", "פה", "פה#", "סול", "סול#", "לה", "לה#", "סי"];

    // 1. אתחול מקלדת (3 אוקטבות)
    const pianoRail = document.getElementById('piano-rail');
    const blackKeyMap = [1, 3, 6, 8, 10];
    for(let i=0; i<36; i++) {
        const k = document.createElement('div');
        k.className = `key ${blackKeyMap.includes(i%12) ? 'black' : ''}`;
        k.dataset.note = i;
        k.onmousedown = (e) => { e.preventDefault(); playSynthNote(i); };
        pianoRail.appendChild(k);
    }

    // 2. ניהול קבצים ו-BPM
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        document.getElementById('chord-details').innerText = "מנתח BPM...";
        const player = new Audio(URL.createObjectURL(file));
        window.activePlayer = player;
        
        // פונקציית ניתוח BPM מהירה
        await analyzeBPM(file);
        
        document.getElementById('power-btn').disabled = false;
        document.getElementById('chord-details').innerText = "מוכן לעבודה";
    };

    async function analyzeBPM(file) {
        const offCtx = new OfflineAudioContext(1, 44100 * 30, 44100);
        const buffer = await offCtx.decodeAudioData(await file.arrayBuffer());
        // לוגיקה פשוטה לזיהוי פיקים
        const data = buffer.getChannelData(0);
        let peaks = [];
        for(let i=0; i<data.length; i+=2000) if(Math.abs(data[i]) > 0.9) peaks.push(i/44100);
        if(peaks.length > 5) {
            let diffs = [];
            for(let i=1; i<peaks.length; i++) diffs.push(peaks[i]-peaks[i-1]);
            baseBPM = Math.round(60 / (diffs.reduce((a,b)=>a+b)/diffs.length));
            document.getElementById('bpm-display').innerText = baseBPM;
        }
    }

    // 3. מנוע סאונד וזיהוי אקורדים
    document.getElementById('power-btn').onclick = async () => {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();

        masterGain = audioCtx.createGain();
        analyser = audioCtx.createAnalyser();
        masterGain.connect(analyser).connect(audioCtx.destination);

        source = audioCtx.createMediaElementSource(window.activePlayer);
        source.connect(masterGain);

        meyda = Meyda.createMeydaAnalyzer({
            audioContext: audioCtx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: (f) => detectChord(f.chroma)
        });

        meyda.start();
        window.activePlayer.play();
        drawVisualizer();
    };

    function detectChord(chroma) {
        const trans = parseInt(document.getElementById('transpose').value);
        const types = [
            {n:"", p:[4,7], h:"מז'ור"}, {n:"m", p:[3,7], h:"מינור"},
            {n:"7", p:[4,10], h:"7"}, {n:"maj7", p:[4,11], h:"מז'ור 7"}
        ];

        let bestScore = 0.5, bestChord = "--", bestFull = "";

        for(let r=0; r<12; r++) {
            types.forEach(t => {
                const score = (chroma[r] * 2 + chroma[(r+t.p[0])%12] + chroma[(r+t.p[1])%12]) / 4;
                if(score > bestScore) {
                    bestScore = score;
                    const root = notes[(r + trans + 12) % 12];
                    bestChord = root + t.n;
                    bestFull = notesHeb[(r + trans + 12) % 12] + " " + t.h;
                }
            });
        }

        if(bestChord !== "--" && document.getElementById('main-chord').innerText !== bestChord) {
            document.getElementById('main-chord').innerText = bestChord;
            document.getElementById('chord-details').innerText = bestFull;
            updateHistory(bestChord);
            lightKeys(bestChord);
        }
    }

    function updateHistory(chord) {
        const rail = document.getElementById('history-rail');
        const chip = document.createElement('div');
        chip.className = 'h-chip'; chip.innerText = chord;
        rail.prepend(chip);
        if(rail.children.length > 20) rail.lastChild.remove();
    }

    function lightKeys(chord) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const root = chord.replace(/m|7|maj7/g, '');
        const rootIdx = notes.indexOf(root);
        let intervals = [0, 4, 7];
        if(chord.includes('maj7')) intervals = [0,4,7,11];
        else if(chord.includes('7')) intervals = [0,4,7,10];
        else if(chord.includes('m')) intervals = [0,3,7];

        intervals.forEach(i => {
            const n = (rootIdx + i) % 12;
            document.querySelectorAll(`.key[data-note="${n}"], .key[data-note="${n+12}"], .key[data-note="${n+24}"]`)
                    .forEach(k => k.classList.add('active'));
        });
    }

    function playSynthNote(note) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = 440 * Math.pow(2, (note-21)/12);
        g.gain.value = document.getElementById('volume').value / 500;
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.8);
    }

    // 4. MIDI - חיבור ל-Tyros 5
    if (navigator.requestMIDIAccess) {
        navigator.requestMIDIAccess().then(midi => {
            const inputs = midi.inputs.values();
            for (let input of inputs) {
                document.getElementById('midi-status').innerText = "מחובר ל: " + input.name;
                document.getElementById('midi-status').style.color = "var(--accent)";
                input.onmidimessage = (msg) => {
                    const [cmd, note, vel] = msg.data;
                    if(cmd === 144 && vel > 0) {
                        const n = note - 36;
                        if(n >= 0 && n < 36) {
                            playSynthNote(n);
                            document.querySelector(`.key[data-note="${n}"]`)?.classList.add('active');
                        }
                    } else if(cmd === 128 || (cmd === 144 && vel === 0)) {
                        document.querySelector(`.key[data-note="${note-36}"]`)?.classList.remove('active');
                    }
                };
            }
        });
    }

    // 5. ויזואליזציה (Canvas)
    function drawVisualizer() {
        const canvas = document.getElementById('spectrum');
        const ctx = canvas.getContext('2d');
        const data = new Uint8Array(analyser.frequencyBinCount);
        function frame() {
            analyser.getByteFrequencyData(data);
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff';
            const barW = canvas.width / 128;
            for(let i=0; i<128; i++) {
                const h = (data[i]/255) * canvas.height;
                ctx.fillRect(i*barW, canvas.height - h, barW - 1, h);
            }
            requestAnimationFrame(frame);
        }
        frame();
    }
</script>
</body>
</html>
