<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זיהוי אקורדים - Studio V2.5</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        /* משתני עיצוב שישתנו דינמית */
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent: #f43f5e;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 20px; text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { 
            max-width: 1000px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 { color: #38bdf8; margin-bottom: 25px; }
        
        /* לוח בקרה משופר */
        .setup-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 15px; background: rgba(0,0,0,0.2); 
            padding: 20px; border-radius: 15px; margin-bottom: 20px; 
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #aaa; }
        input, select { 
            background: #333; color: white; border: 1px solid #444; 
            padding: 8px; border-radius: 8px; text-align: center; 
        }

        /* הגדרות צבעים */
        .color-picker-group {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;
            padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px;
        }

        #start-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 15px 40px; font-size: 1.2em; border-radius: 10px; 
            cursor: pointer; font-weight: bold; width: 100%; margin: 10px 0; 
        }
        #start-btn:disabled { background: #444; cursor: not-allowed; }

        audio { width: 100%; margin: 15px 0; }

        #chord-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 25px; }
        
        .measure { 
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); 
            padding: 25px 10px; border-radius: 12px; 
            font-size: 2.2em; font-weight: 800; color: #fbbf24; 
            position: relative; cursor: pointer; overflow: hidden;
        }
        .measure-num { position: absolute; top: 5px; right: 8px; font-size: 12px; color: #666; }
        .active { border-color: var(--accent); background: rgba(244, 63, 94, 0.1); transform: scale(1.02); }
        
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #38bdf8; width: 0%; }
    </style>
</head>
<body>

<div class="container">
    <h1>זיהוי אקורדים Studio</h1>
    
    <div class="color-picker-group">
        <div class="input-group">
            <label>צבע רקע</label>
            <input type="color" id="bg-picker" value="#121212">
        </div>
        <div class="input-group">
            <label>צבע גופן</label>
            <input type="color" id="text-picker" value="#ffffff">
        </div>
    </div>

    <div class="setup-grid">
        <div class="input-group"><label>קצב (BPM)</label><input type="number" id="bpm" value="120"></div>
        <div class="input-group">
            <label>משקל</label>
            <select id="sig"><option value="4">4/4</option><option value="3">3/4</option></select>
        </div>
        <div class="input-group"><label>תיבות</label><input type="number" id="measures" value="32"></div>
        <div class="input-group"><label>Transpose</label><input type="number" id="trans" value="0"></div>
    </div>

    <div style="margin-bottom: 20px; border: 1px dashed #444; padding: 10px; border-radius: 10px;">
        <input type="file" id="audio-file" accept="audio/*">
    </div>

    <button id="start-btn" disabled>הפעל ניתוח</button>
    <audio id="player" controls></audio>

    <div id="chord-grid"></div>
</div>

<script>
    // ניהול צבעים
    const bgPicker = document.getElementById('bg-picker');
    const textPicker = document.getElementById('text-picker');

    bgPicker.addEventListener('input', (e) => {
        document.documentElement.style.setProperty('--bg-color', e.target.value);
    });

    textPicker.addEventListener('input', (e) => {
        document.documentElement.style.setProperty('--text-color', e.target.value);
    });

    // לוגיקת האפליקציה (זהה לגרסה הקודמת
