<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO PRO - CHORDIFY MODE</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #121212;
            --surface: #1e1e1e;
            --grid-border: #333;
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Navigation */
        header { background: var(--surface); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--grid-border); }
        .logo { color: var(--primary); font-weight: 900; font-size: 24px; letter-spacing: -1px; }

        /* Chord Grid - THE CHORDIFY LOOK */
        #chord-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 10px; 
            padding: 20px; 
            overflow-y: auto; 
            flex-grow: 1;
            align-content: flex-start;
        }
        .chord-box { 
            background: var(--surface); 
            aspect-ratio: 1/1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid var(--grid-border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .chord-box.active { 
            border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
            transform: scale(1.05);
            background: #2a2a2a;
        }
        .chord-name { font-size: 28px; font-weight: bold; }
        .chord-time { font-size: 12px; color: #888; margin-top: 5px; }

        /* Control Bar */
        .controls { background: var(--surface); padding: 20px; display: flex; align-items: center; gap: 20px; border-top: 2px solid var(--grid-border); }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); cursor: pointer; font-size: 20px; }
        .progress-container { flex-grow: 1; height: 6px; background: #333; border-radius: 3px; position: relative; cursor: pointer; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 3px; }

        /* Hidden inputs */
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">MAESTRO PRO <span style="color:white; font-size:14px; font-weight:300;">AI CHORDIFY</span></div>
    <button onclick="document.getElementById('file').click()" style="background:none; border:1px solid #555; color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">📂 טען שיר</button>
    <input type="file" id="file" accept="audio/*">
</header>

<div id="chord-grid">
    </div>

<div class="controls">
    <button class="play-btn" id="playBtn">▶</button>
    <div class="progress-container" id="progressContainer">
        <div id="progress-bar"></div>
    </div>
    <div id="currentTime" style="width: 50px; font-family: monospace;">0:00</div>
</div>

<script>
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const templates = [
        { name: "", i: [0, 4, 7] },         // Major
        { name: "m", i: [0, 3, 7] },        // Minor
        { name: "7", i: [0, 4, 7, 10] },    // 7th
        { name: "maj7", i: [0, 4, 7, 11] }, // Maj7
        { name: "m7", i: [0, 3, 7, 10] }    // min7
    ];

    let audio = new Audio();
    let ctx, src, meyda;
    let lastChord = "";
    let smoothingBuffer = new Array(12).fill(0);
    const alpha = 0.15; // פקטור החלקה (EMA)

    // UI Elements
    const grid = document.getElementById('chord-grid');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progress-bar');
    const currentTimeText = document.getElementById('currentTime');

    document.getElementById('file').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            audio.src = URL.createObjectURL(file);
            grid.innerHTML = ""; 
            lastChord = "";
        }
    };

    playBtn.onclick = () => {
        if (!ctx) initAudio();
        audio.paused ? audio.play() : audio.pause();
        playBtn.innerText = audio.paused ? "▶" : "⏸";
    };

    function initAudio() {
        ctx = new AudioContext();
        src = ctx.createMediaElementSource(audio);
        src.connect(ctx.destination);
        
        meyda = Meyda.createMeydaAnalyzer({
            audioContext: ctx,
            source: src,
            bufferSize: 8192,
            featureExtractors: ["chroma", "energy"],
            callback: analyze
        });
        meyda.start();
    }

    function analyze(features) {
        if (!features.chroma || features.energy < 0.5) return; // התעלמות משקט

        // 1. החלקת Chroma באמצעות EMA (Exponential Moving Average)
        features.chroma.forEach((v, i) => {
            smoothingBuffer[i] = (alpha * v) + ((1 - alpha) * smoothingBuffer[i]);
        });

        // 2. זיהוי אקורד עם עדיפות לבאס
        let bestScore = -1;
        let bestRoot = 0;
        let bestType = templates[0];

        for (let r = 0; r < 12; r++) {
            templates.forEach(t => {
                let score = 0;
                // תוספת משקל לתו השורש (Root)
                score += smoothingBuffer[r] * 1.5; 
                
                t.i.forEach(idx => {
                    score += smoothingBuffer[(r + idx) % 12];
                });

                if (score > bestScore) {
                    bestScore = score;
                    bestRoot = r;
                    bestType = t;
                }
            });
        }

        const currentChord = notes[bestRoot] + bestType.name;

        // 3. מנגנון יצירת קוביות (Grid Logic)
        // אנחנו יוצרים קובייה חדשה רק אם האקורד השתנה משמעותית או עבר זמן מסוים
        if (currentChord !== lastChord && bestScore > 1.5) {
            addChordToGrid(currentChord);
            lastChord = currentChord;
        }
        
        updateProgress();
    }

    function addChordToGrid(name) {
        // הסרת סימון מפעיל קודם
        document.querySelectorAll('.chord-box').forEach(b => b.classList.remove('active'));

        const box = document.createElement('div');
        box.className = 'chord-box active';
        
        const time = formatTime(audio.currentTime);
        box.innerHTML = `
            <div class="chord-name">${name}</div>
            <div class="chord-time">${time}</div>
        `;
        
        grid.appendChild(box);
        box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function updateProgress() {
        const p = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = p + "%";
        currentTimeText.innerText = formatTime(audio.currentTime);
    }

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // ניווט בתוך השיר בלחיצה על הפס
    document.getElementById('progressContainer').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const p = x / rect.width;
        audio.currentTime = p * audio.duration;
    };
</script>

</body>
</html>
