<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מזהה אקורדים מסונכרן קצב (Beat Sync)</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 25px; max-width: 600px; margin: 0 auto; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .beat-indicator { width: 20px; height: 20px; background: #444; border-radius: 50%; margin: 10px auto; transition: 0.1s; }
        .beat-active { background: #ff0055; transform: scale(1.3); box-shadow: 0 0 15px #ff0055; }

        #chord-result { font-size: 5.5em; color: #ffeb3b; margin: 10px 0; font-weight: 900; min-height: 1.2em; transition: transform 0.1s; }
        .chord-bump { transform: scale(1.1); }

        .transpose-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; background: #252525; padding: 10px; border-radius: 12px; }
        .t-btn { background: #007bff; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: bold; }
        
        .visualizer { display: flex; justify-content: center; gap: 4px; height: 60px; align-items: flex-end; margin-bottom: 20px; opacity: 0.6; }
        .bar { width: 15px; background: #4CAF50; transition: height 0.05s; }
        
        #start-btn { background: #ff0055; color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 20px rgba(255,0,85,0.3); }
        #start-btn:disabled { background: #333; cursor: not-allowed; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>מזהה אקורדים Beat-Sync</h1>
    <input type="file" id="audio-file" accept="audio/*">
    
    <div class="beat-indicator" id="beat-dot"></div>
    
    <div class="visualizer" id="visualizer"></div>
    
    <h2 id="chord-result">---</h2>

    <div class="transpose-controls">
        <button class="t-btn" onclick="changeTranspose(-1)">-</button>
        <span id="t-display" style="min-width: 100px;">סולם: 0</span>
        <button class="t-btn" onclick="changeTranspose(1)">+</button>
    </div>
    
    <button id="start-btn" disabled>הפעל ניתוח קצבי</button>
    <audio id="audio-player" controls></audio>
</div>

<script>
    let audioContext, source, analyzer;
    let transpose = 0;
    let lastChord = "---";
    let lastEnergy = 0;
    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    // בניית ויזואליזציה
    for(let i=0; i<12; i++) {
        const bar = document.createElement('div');
        bar.id = `bar-${i}`; bar.className = 'bar';
        document.getElementById('visualizer').appendChild(bar);
    }

    const CHORD_DATA = [
        { name: '', pattern: [0, 4, 7] },
        { name: 'm', pattern: [0, 3, 7] },
        { name: '7', pattern: [0, 4, 7, 10] },
        { name: 'maj7', pattern: [0, 4, 7, 11] },
        { name: 'm7', pattern: [0, 3, 7, 10] },
        { name: 'sus4', pattern: [0, 5, 7] }
    ];

    function changeTranspose(val) {
        transpose = (transpose + val + 12) % 12;
        let displayVal = transpose > 6 ? transpose - 12 : transpose;
        document.getElementById('t-display').innerText = "סולם: " + (displayVal >= 0 ? "+" : "") + displayVal;
    }

    document.getElementById('audio-file').onchange = (e) => {
        if (e.target.files[0]) {
            document.getElementById('audio-player').src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('start-btn').disabled = false;
        }
    };

    document.getElementById('start-btn').onclick = async () => {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        await audioContext.resume();
        source = audioContext.createMediaElementSource(document.getElementById('audio-player'));
        source.connect(audioContext.destination);

        analyzer = Meyda.createMeydaAnalyzer({
            audioContext: audioContext,
            source: source,
            bufferSize: 1024,
            featureExtractors: ['chroma', 'energy'],
            callback: features => {
                const chroma = features.chroma;
                const energy = features.energy;
                const beatDot = document.getElementById('beat-dot');
                const result = document.getElementById('chord-result');

                // זיהוי Beat פשוט לפי קפיצת אנרגיה
                if (energy > lastEnergy * 1.5 && energy > 5) {
                    beatDot.classList.add('beat-active');
                    result.classList.add('chord-bump');
                    setTimeout(() => {
                        beatDot.classList.remove('beat-active');
                        result.classList.remove('chord-bump');
                    }, 100);
                    
                    // עדכון אקורד רק כשיש פעימה (או אנרגיה גבוהה)
                    updateChord(chroma);
                }
                lastEnergy = energy;

                // עדכון הויזואליזציה בכל מקרה
                chroma.forEach((val, i) => {
                    document.getElementById(`bar-${i}`).style.height = (val * 100) + '%';
                });
            }
        });

        analyzer.start();
        document.getElementById('audio-player').play();
        document.getElementById('start-btn').disabled = true;
    };

    function updateChord(chroma) {
        let bestChord = "---";
        let maxScore = 0.4;

        for (let root = 0; root < 12; root++) {
            for (let type of CHORD_DATA) {
                let score = type.pattern.reduce((sum, interval) => sum + chroma[(root + interval) % 12], 0) / type.pattern.length;
                if (score > maxScore) {
                    maxScore = score;
                    let transposedRoot = (root + transpose + 12) % 12;
                    bestChord = NOTES[transposedRoot] + type.name;
                }
            }
        }
        if (bestChord !== "---") {
            document.getElementById('chord-result').innerText = bestChord;
        }
    }
</script>
</body>
</html>
