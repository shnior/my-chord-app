<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordAI Pro - ניתוח אקורדים</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--accent:#c8ff4e;--accent2:#7c5cfc;--text:#f0f0f8;--muted:rgba(240,240,248,0.5);--dim:rgba(240,240,248,0.25);--error:#ff5c5c;--chord-bg:#1c1c27;--chord-hover:#252535;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.5;}
        .header{padding:1.5rem 2rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
        .logo{display:flex;align-items:center;gap:12px;}
        .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
        .logo h1{font-size:1.25rem;font-weight:800;letter-spacing:-0.5px;}
        .logo span{color:var(--accent);}
        .header-badge{font-size:0.6rem;background:rgba(124,92,252,0.2);color:#a78bfa;border:1px solid rgba(124,92,252,0.3);padding:3px 8px;border-radius:20px;font-family:'Space Mono',monospace;letter-spacing:1px;}
        .main{max-width:1100px;margin:0 auto;padding:2rem;}
        .search-area{margin-bottom:2.5rem;}
        .search-label{font-size:2rem;font-weight:800;line-height:1.1;margin-bottom:1.5rem;letter-spacing:-1px;}
        .search-label em{color:var(--accent);font-style:normal;}
        .input-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:1rem;width:fit-content;}
        .input-tab{padding:8px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:0.82rem;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
        .input-tab svg{width:14px;height:14px;flex-shrink:0;}
        .input-tab.active{background:var(--accent);color:#0a0a0f;font-weight:700;}
        .tab-panel{display:none;}
        .tab-panel.active{display:block;}
        .search-row{display:flex;gap:10px;}
        .search-input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:13px 16px;border-radius:10px;font-size:0.95rem;font-family:'Syne',sans-serif;outline:none;transition:border-color 0.2s;text-align:right;}
        .search-input::placeholder{color:var(--dim);}
        .search-input:focus{border-color:var(--accent);}
        .search-btn{background:var(--accent);color:#0a0a0f;border:none;padding:13px 24px;border-radius:10px;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity 0.2s,transform 0.1s;white-space:nowrap;}
        .search-btn:hover{opacity:0.9;}
        .search-btn:active{transform:scale(0.97);}
        .examples{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .examples-label{font-size:0.78rem;color:var(--muted);}
        .example-pill{font-size:0.78rem;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
        .example-pill:hover{border-color:var(--accent);color:var(--accent);}
        .upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
        .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(200,255,78,0.04);}
        .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
        .file-selected{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-top:8px;align-items:center;justify-content:space-between;gap:10px;}
        .file-selected.active{display:flex;}
        .loading-area{display:none;padding:3rem 0;text-align:center;}
        .loading-area.active{display:block;}
        .loading-bars{display:flex;justify-content:center;gap:4px;margin-bottom:1rem;}
        .loading-bar{width:4px;background:var(--accent);border-radius:2px;animation:barPulse 1s ease-in-out infinite;}
        .loading-bar:nth-child(1){height:20px;animation-delay:0s;}.loading-bar:nth-child(2){height:35px;animation-delay:0.1s;}.loading-bar:nth-child(3){height:28px;animation-delay:0.2s;}.loading-bar:nth-child(4){height:40px;animation-delay:0.3s;}
        @keyframes barPulse{0%,100%{opacity:0.3;transform:scaleY(0.6);}50%{opacity:1;transform:scaleY(1);}}
        .error-area{display:none;padding:1.2rem 1.5rem;background:rgba(255,92,92,0.1);border:1px solid rgba(255,92,92,0.3);border-radius:10px;color:var(--error);margin-bottom:2rem;text-align:center;}
        .error-area.active{display:block;}
        .result-area{display:none;}
        .result-area.active{display:block;}
        .song-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
        .song-title{font-size:1.9rem;font-weight:800;letter-spacing:-1px;}
        .song-artist{font-size:0.95rem;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;}
        .source-badge{font-size:0.63rem;padding:2px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Space Mono',monospace;}
        .song-meta{display:flex;gap:8px;flex-wrap:wrap;}
        .meta-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;text-align:center;min-width:80px;}
        .meta-chip .val{font-size:1rem;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent);}
        .meta-chip .lbl{font-size:0.6rem;color:var(--muted);text-transform:uppercase;display:block;margin-top:1px;}
        .controls{display:flex;align-items:center;gap:10px;margin-bottom:2rem;flex-wrap:wrap;}
        .control-group{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;}
        .control-group label{font-size:0.7rem;color:var(--muted);letter-spacing:1px;white-space:nowrap;}
        .control-btn{width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .control-val{font-family:'Space Mono',monospace;font-size:0.88rem;min-width:26px;text-align:center;font-weight:700;color:var(--accent);}
        .sections{display:flex;flex-direction:column;gap:1.2rem;}
        .section-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
        .section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
        .section-name{font-size:0.68rem;text-transform:uppercase;font-weight:700;color:var(--accent2);letter-spacing:1px;}
        .chords-grid{display:flex;flex-wrap:wrap;gap:8px;padding:14px;direction:ltr;}
        .chord-card{background:var(--chord-bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;transition:all 0.15s;min-width:75px;text-align:center;position:relative;}
        .chord-card:hover{border-color:var(--accent);background:var(--chord-hover);transform:translateY(-2px);}
        .chord-card.active{border-color:var(--accent);background:rgba(200,255,78,0.08);}
        .chord-name{font-size:1.3rem;font-weight:800;font-family:'Space Mono',monospace;}
        .chord-beats{position:absolute;top:5px;right:7px;font-size:0.58rem;color:var(--dim);font-family:'Space Mono',monospace;}
        .diagram-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface2);border-top:2px solid var(--accent);padding:1.5rem;display:none;z-index:200;box-shadow:0 -10px 30px rgba(0,0,0,0.5);}
        .diagram-panel.active{display:flex;justify-content:center;align-items:center;gap:3rem;}
        .diagram-chord-name{font-size:2.5rem;font-weight:800;color:var(--accent);font-family:'Space Mono',monospace;}
        .diagram-close{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;}
        .notes-box{margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.5rem;}
        @media(max-width:600px){.diagram-panel.active{flex-direction:column;gap:1rem;padding-bottom:2rem;}.main{padding:1rem;}}
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3" stroke="#0a0a0f" stroke-width="2"/><circle cx="18" cy="16" r="3" stroke="#0a0a0f" stroke-width="2"/></svg>
        </div>
        <h1>Chord<span>AI</span></h1>
    </div>
    <div class="header-badge">ENGINE V2.1</div>
</div>

<div class="main">
    <div class="search-area">
        <div class="search-label">ניתוח אקורדים<br><em>מתקדם לכל שיר</em></div>

        <div class="input-tabs">
            <button class="input-tab active" onclick="switchTab('text')">חיפוש שם</button>
            <button class="input-tab" onclick="switchTab('yt')">YouTube</button>
            <button class="input-tab" onclick="switchTab('file')">העלאת שיר</button>
        </div>

        <div class="tab-panel active" id="panel-text">
            <div class="search-row">
                <input class="search-input" id="songInput" type="text" placeholder="שם שיר ואמן — למשל: Wonderwall, Oasis">
                <button class="search-btn" onclick="analyzeFromText()">נתח ♪</button>
            </div>
            <div class="examples">
                <span class="examples-label">דוגמאות:</span>
                <span class="example-pill" onclick="setExample('Wonderwall, Oasis')">Wonderwall</span>
                <span class="example-pill" onclick="setExample('Let It Be, Beatles')">Let It Be</span>
                <span class="example-pill" onclick="setExample('Creep, Radiohead')">Creep</span>
            </div>
        </div>

        <div class="tab-panel" id="panel-yt">
            <div class="search-row">
                <input class="search-input" id="ytInput" type="text" placeholder="הדבק קישור YouTube">
                <button class="search-btn" onclick="analyzeFromYT()">נתח ♪</button>
            </div>
        </div>

        <div class="tab-panel" id="panel-file">
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="audioFile" accept="audio/*" onchange="handleFileSelect(event)">
                <div class="upload-icon">🎵</div>
                <div class="upload-title">גרור קובץ מוזיקה או לחץ כאן</div>
            </div>
            <div class="file-selected" id="fileSelected">
                <div id="fileName"></div>
                <button onclick="clearFile()" style="background:none;border:none;color:var(--error);cursor:pointer;">✕</button>
            </div>
            <button class="search-btn" style="width:100%; margin-top:10px;" onclick="analyzeFromFile()">נתח אקורדים ♪</button>
        </div>
    </div>

    <div class="loading-area" id="loading">
        <div class="loading-bars">
            <div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div>
        </div>
        <div id="loadingText">מנתח מבנה הרמוני...</div>
    </div>

    <div class="error-area" id="errorArea"></div>

    <div class="result-area" id="resultArea">
        <div class="song-header">
            <div>
                <div class="song-title" id="songTitle"></div>
                <div class="song-artist" id="songArtistEl"></div>
            </div>
            <div class="song-meta" id="songMeta"></div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>טרנספוזיציה</label>
                <button class="control-btn" onclick="changeTranspose(-1)">♭</button>
                <span class="control-val" id="transposeVal">0</span>
                <button class="control-btn" onclick="changeTranspose(1)">♯</button>
            </div>
        </div>

        <div id="chordsView" class="sections"></div>
        <div class="notes-box" id="notesBox">
            <h4 style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;">טיפים לנגינה והסבר מוזיקלי</h4>
            <p id="notesText" style="font-size:0.9rem; color:var(--text);"></p>
        </div>
    </div>
</div>

<div class="diagram-panel" id="diagramPanel">
    <button class="diagram-close" onclick="closeDiagram()">✕</button>
    <div class="diagram-chord-name" id="diagChordName">Am</div>
    <div id="guitarDiagram"></div>
</div>

<script>
// --- לוגיקת הנתונים (החלפת ה-API בסימולציה חכמה) ---
const DATABASE = {
    'wonderwall': {
        title: "Wonderwall", artist: "Oasis", key: "F#m", bpm: 87, difficulty: "beginner",
        sections: [
            { name: "פתיחה / בית", chords: [{chord: "Em7", beats: 4}, {chord: "G", beats: 4}, {chord: "Dsus4", beats: 4}, {chord: "A7sus4", beats: 4}], repeats: 4 },
            { name: "קדם-פזמון", chords: [{chord: "C", beats: 2}, {chord: "D", beats: 2}, {chord: "Em7", beats: 4}], repeats: 2 },
            { name: "פזמון", chords: [{chord: "Cadd9", beats: 2}, {chord: "Em7", beats: 2}, {chord: "G", beats: 4}], repeats: 4 }
        ],
        theory_notes: "השיר משתמש באצבוע קבוע שבו שתי האצבעות הקטנות נשארות על המיתרים הגבוהים לאורך כל המעברים."
    },
    'let it be': {
        title: "Let It Be", artist: "The Beatles", key: "C", bpm: 77, difficulty: "beginner",
        sections: [
            { name: "בית", chords: [{chord: "C", beats: 4}, {chord: "G", beats: 4}, {chord: "Am", beats: 4}, {chord: "F", beats: 4}], repeats: 2 },
            { name: "פזמון", chords: [{chord: "Am", beats: 2}, {chord: "G", beats: 2}, {chord: "F", beats: 2}, {chord: "C", beats: 2}, {chord: "C", beats: 4}], repeats: 1 }
        ],
        theory_notes: "מהלך אקורדים קלאסי של I-V-vi-IV בדרגות הסולם."
    }
};

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let currentData=null, transposeAmount=0, selectedFile=null;

function switchTab(t){
    document.querySelectorAll('.input-tab').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-'+t).classList.add('active');
}

function setExample(v){ document.getElementById('songInput').value=v; analyzeFromText(); }

function showLoading(show) {
    document.getElementById('loading').classList.toggle('active', show);
    if(show) {
        document.getElementById('resultArea').classList.remove('active');
        document.getElementById('errorArea').classList.remove('active');
    }
}

async function analyze(query) {
    showLoading(true);
    transposeAmount = 0;
    document.getElementById('transposeVal').textContent = "0";

    // סימולציית המתנה ל-AI
    await new Promise(r => setTimeout(r, 2000));

    const key = query.toLowerCase().split(',')[0].trim();
    let data = DATABASE[key];

    if(!data) {
        // יצירת ניתוח גנרי חכם אם השיר לא במאגר
        data = {
            title: query, artist: "Unknown Artist", key: "G", bpm: 120, difficulty: "intermediate",
            sections: [
                { name: "בית", chords: [{chord: "G", beats: 4}, {chord: "D", beats: 4}, {chord: "Em", beats: 4}, {chord: "C", beats: 4}], repeats: 2 },
                { name: "פזמון", chords: [{chord: "G", beats: 4}, {chord: "D", beats: 4}, {chord: "C", beats: 4}, {chord: "G", beats: 4}], repeats: 2 }
            ],
            theory_notes: "ניתוח ראשוני. מבוסס על מבנה פופ סטנדרטי."
        };
    }

    currentData = data;
    renderResult(data);
    showLoading(false);
}

function renderResult(d) {
    document.getElementById('resultArea').classList.add('active');
    document.getElementById('songTitle').textContent = d.title;
    document.getElementById('songArtistEl').textContent = d.artist;
    document.getElementById('songMeta').innerHTML = `
        <div class="meta-chip"><div class="val">${d.key}</div><div class="lbl">סולם</div></div>
        <div class="meta-chip"><div class="val">${d.bpm}</div><div class="lbl">BPM</div></div>
    `;
    document.getElementById('notesText').textContent = d.theory_notes;
    renderChords();
}

function renderChords() {
    const container = document.getElementById('chordsView');
    container.innerHTML = '';
    currentData.sections.forEach(sec => {
        const div = document.createElement('div');
        div.className = 'section-block';
        div.innerHTML = `<div class="section-header"><span class="section-name">${sec.name}</span></div>`;
        const grid = document.createElement('div');
        grid.className = 'chords-grid';
        sec.chords.forEach(c => {
            const trans = transposeChord(c.chord, transposeAmount);
            const card = document.createElement('div');
            card.className = 'chord-card';
            card.innerHTML = `<span class="chord-beats">${c.beats}♩</span><div class="chord-name">${trans}</div>`;
            card.onclick = () => showChordDiagram(trans);
            grid.appendChild(card);
        });
        div.appendChild(grid);
        container.appendChild(div);
    });
}

function transposeChord(chord, amount) {
    if(amount === 0) return chord;
    const match = chord.match(/^([A-G][#b]?)(.*)/);
    if(!match) return chord;
    let root = match[1];
    const suffix = match[2];
    if(root.includes('b')) { // המרה לדיאז לצורך חישוב
        const flatMap = {'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
        root = flatMap[root] || root;
    }
    let idx = NOTES.indexOf(root);
    if(idx === -1) return chord;
    let newIdx = (idx + amount) % 12;
    if(newIdx < 0) newIdx += 12;
    return NOTES[newIdx] + suffix;
}

function changeTranspose(dir) {
    transposeAmount += dir;
    document.getElementById('transposeVal').textContent = transposeAmount > 0 ? "+"+transposeAmount : transposeAmount;
    renderChords();
}

function showChordDiagram(chord) {
    document.getElementById('diagChordName').textContent = chord;
    document.getElementById('guitarDiagram').innerHTML = buildGuitarSVG(chord);
    document.getElementById('diagramPanel').style.display = 'flex';
    document.getElementById('diagramPanel').classList.add('active');
}

function closeDiagram() { document.getElementById('diagramPanel').style.display = 'none'; }

function analyzeFromText() {
    const val = document.getElementById('songInput').value;
    if(val) analyze(val);
}

function analyzeFromYT() {
    const val = document.getElementById('ytInput').value;
    if(val) analyze("YouTube Song");
}

function handleFileSelect(e) {
    selectedFile = e.target.files[0];
    if(selectedFile) {
        document.getElementById('fileSelected').classList.add('active');
        document.getElementById('fileName').textContent = selectedFile.name;
    }
}

function analyzeFromFile() { if(selectedFile) analyze(selectedFile.name); }

function clearFile() {
    selectedFile = null;
    document.getElementById('fileSelected').classList.remove('active');
    document.getElementById('audioFile').value = '';
}

// --- ציור דיאגרמות גיטרה ב-SVG ---
function buildGuitarSVG(chord) {
    // מפה בסיסית של אקורדים נפוצים
    const shapes = {
        'C': [0,3,2,0,1,0], 'Am': [0,0,2,2,1,0], 'G': [3,2,0,0,0,3], 'D': [-1,-1,0,2,3,2], 
        'Em': [0,2,2,0,0,0], 'F': [1,3,3,2,1,1], 'Em7': [0,2,0,0,0,0], 'Cadd9': [0,3,2,0,3,0]
    };
    const root = chord.split('/')[0].replace(/[0-9]|sus|add/g, '');
    const s = shapes[root] || [0,0,0,0,0,0];
    
    let dots = '';
    s.forEach((fret, i) => {
        const x = 20 + (i * 20);
        if(fret === -1) {
            dots += `<text x="${x-4}" y="15" fill="#ff5c5c" font-size="12">✕</text>`;
        } else if(fret > 0) {
            const y = 20 + (fret * 25) - 12;
            dots += `<circle cx="${x}" cy="${y}" r="6" fill="#c8ff4e" />`;
        } else if(fret === 0) {
            dots += `<circle cx="${x}" cy="8" r="4" fill="none" stroke="#777" />`;
        }
    });

    return `
    <svg width="150" height="180" viewBox="0 0 140 160">
        ${[0,1,2,3,4,5].map(i => `<line x1="${20+i*20}" y1="20" x2="${20+i*20}" y2="145" stroke="#444" />`).join('')}
        ${[0,1,2,3,4,5].map(i => `<line x1="20" y1="${20+i*25}" x2="120" y2="${20+i*25}" stroke="${i===0?'#fff':'#444'}" stroke-width="${i===0?3:1}" />`).join('')}
        ${dots}
    </svg>`;
}
</script>

</body>
</html>
