<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Platinum v23 | Shneior Eisenbach</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root {
            --bg: #030508; --panel: #0a0d12; --accent: #00f2ff;
            --gold: #ffcc00; --red: #ff3e3e; --border: #1f2937;
            --text: #f3f4f6; --gray: #9ca3af;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 1fr 280px; height: 100vh; overflow: hidden; }

        /* סרגל צד */
        aside {
            grid-row: 1 / -1; background: var(--panel); border-left: 1px solid var(--border);
            padding: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 50;
        }
        .logo { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 10px; }
        .logo h1 { font-size: 20px; color: var(--accent); margin: 0; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 10px; }
        .label { font-size: 10px; color: var(--gray); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .val { font-size: 28px; font-weight: 900; text-align: center; color: #fff; font-family: monospace; }

        /* במה מרכזית */
        main { grid-column: 2; grid-row: 1; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111827 0%, #030508 100%); }
        .display-unit { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        #chord-main { font-size: 220px; font-weight: 950; color: var(--gold); text-shadow: 0 0 60px rgba(255,204,0,0.4); }
        #chord-sub { font-size: 32px; color: var(--accent); font-weight: 300; margin-top: 10px; }

        /* Waveform */
        #waveform-area { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 140px; 
            background: rgba(0,0,0,0.4); border-top: 1px solid var(--border); cursor: pointer;
        }
        #waveform-canvas { width: 100%; height: 100%; opacity: 0.7; }

        /* פקדי נגינה בתחתית */
        .transport-controls {
            display: flex; justify-content: center; gap: 20px; padding: 15px; background: #000; border-top: 1px solid var(--border);
        }
        .transport-btn {
            background: #1f2937; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .transport-btn:hover { background: var(--accent); color: black; }

        /* Footer */
        footer { grid-column: 2; grid-row: 2; background: #000; display: flex; flex-direction: column; }
        .history { display: flex; gap: 10px; overflow-x: auto; padding: 15px; direction: ltr; height: 70px; }
        .tag { background: var(--panel); border: 1px solid var(--border); padding: 5px 15px; border-radius: 5px; color: var(--accent); font-weight: 900; font-size: 18px; }

        .piano { display: flex; justify-content: center; flex: 1; direction: ltr; padding: 10px; }
        .key { width: 40px; background: #fff; border: 1px solid #333; border-radius: 0 0 4px 4px; position: relative; }
        .key.b { width: 26px; background: #1a1a1a; height: 65px; margin-left: -13px; margin-right: -13px; z-index: 5; }
        .key.active { background: var(--red) !important; box-shadow: 0 5px 20px var(--red); }

        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<aside>
    <div class="logo"><h1>MAESTRO V23</h1><span>RHYTHM SYNC EDITION</span></div>
    
    <button class="btn-main" style="background:#21262d; color:#fff; margin-bottom:10px;" onclick="document.getElementById('audio-in').click()">טען קובץ שמע</button>
    <input type="file" id="audio-in" style="display:none" accept="audio/*">

    <div class="card"><span class="label">BPM מזוהה</span><div id="bpm-val" class="val">---</div></div>
    
    <div class="card">
        <span class="label">עדכון אקורד (כל X פעימות)</span>
        <select id="update-rate" style="width:100%; background:0; border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px;">
            <option value="1">כל פעימה (1/4)</option>
            <option value="2" selected>כל 2 פעימות (1/2)</option>
            <option value="4">כל תיבה (4/4)</option>
        </select>
    </div>

    <div class="card">
        <span class="label">טרנספוזיציה</span>
        <input type="number" id="trans-val" value="0" style="width:100%; background:0; border:1px solid var(--border); color:#fff; text-align:center; font-size:24px; border-radius:8px;">
    </div>

    <div class="card">
        <span class="label">ווליום</span>
        <input type="range" id="vol" min="0" max="100" value="80">
    </div>

    <div id="clock" style="margin-top:auto; text-align:center; font-family:monospace; color:var(--gray); font-size:18px;">00:00</div>
</aside>

<main>
    <div id="waveform-area">
        <canvas id="waveform-canvas"></canvas>
    </div>
    <div class="display-unit">
        <div id="chord-main">--</div>
        <div id="chord-sub">ממתין לקובץ</div>
    </div>
    
    <div class="transport-controls">
        <button class="transport-btn" onclick="skip(-10)">-10 ש'</button>
        <button id="play-pause-btn" class="transport-btn" style="min-width:120px;" onclick="togglePlay()">נגן</button>
        <button class="transport-btn" onclick="skip(10)">+10 ש'</button>
    </div>
</main>

<footer>
    <div class="history" id="hist"></div>
    <div class="piano" id="p-keys"></div>
</footer>

<script>
let aCtx, source, analyser, meyda, masterGain;
let player = new Audio();
let isPlaying = false;
let currentBPM = 120;
let lastUpdate = 0;

const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const notesHeb = ["דו", "דו#", "רה", "רה#", "מי", "פה", "פה#", "סול", "סול#", "לה", "לה#", "סי"];

// יצירת קלידים
const piano = document.getElementById('p-keys');
const bKeys = [1, 3, 6, 8, 10];
for(let i=0; i<36; i++) {
    const k = document.createElement('div');
    k.className = `key ${bKeys.includes(i%12) ? 'b' : ''}`;
    k.dataset.note = i;
    piano.appendChild(k);
}

// ניהול שמע
document.getElementById('audio-in').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    player.src = URL.createObjectURL(file);
    document.getElementById('chord-sub').innerText = "מנתח קצב...";
    
    const buffer = await file.arrayBuffer();
    const tempCtx = new OfflineAudioContext(1, 44100 * 300, 44100);
    const audioBuffer = await tempCtx.decodeAudioData(buffer);
    drawWaveform(audioBuffer);
    detectBPM(audioBuffer);
};

function detectBPM(buffer) {
    const data = buffer.getChannelData(0);
    let peaks = [];
    for(let i=0; i<data.length; i+=2205) if(Math.abs(data[i]) > 0.9) peaks.push(i/44100);
    if(peaks.length > 10) {
        let diffs = [];
        for(let i=1; i<peaks.length; i++) diffs.push(peaks[i]-peaks[i-1]);
        currentBPM = Math.round(60 / (diffs.sort()[Math.floor(diffs.length/2)]));
        document.getElementById('bpm-val').innerText = currentBPM;
        document.getElementById('chord-sub').innerText = "מוזיקה מוכנה";
    }
}

function togglePlay() {
    if(!aCtx) initAudio();
    if(player.paused) {
        player.play();
        document.getElementById('play-pause-btn').innerText = "השהה";
    } else {
        player.pause();
        document.getElementById('play-pause-btn').innerText = "נגן";
    }
}

function skip(sec) {
    player.currentTime += sec;
}

async function initAudio() {
    aCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = aCtx.createGain();
    analyser = aCtx.createAnalyser();
    masterGain.connect(analyser).connect(aCtx.destination);
    source = aCtx.createMediaElementSource(player);
    source.connect(masterGain);

    meyda = Meyda.createMeydaAnalyzer({
        audioContext: aCtx, source: source, bufferSize: 8192,
        featureExtractors: ['chroma'],
        callback: (f) => processRhythmicChord(f.chroma)
    });
    meyda.start();
    loop();
}

// לוגיקת האקורדים לפי קצב
function processRhythmicChord(chroma) {
    const beatsPerUpdate = parseFloat(document.getElementById('update-rate').value);
    const updateInterval = (60 / currentBPM) * beatsPerUpdate; // שניות בין עדכונים
    
    const now = player.currentTime;
    if(now - lastUpdate < updateInterval) return; // מחכה לפעימה הבאה
    
    lastUpdate = now;
    
    const trans = parseInt(document.getElementById('trans-val').value);
    let best = { s: 0.4, n: "--", h: "" };
    const types = [{n:"", p:[4,7], h:"מז'ור"}, {n:"m", p:[3,7], h:"מינור"}, {n:"7", p:[4,10], h:"7"}];

    for(let r=0; r<12; r++) {
        types.forEach(t => {
            let score = (chroma[r] * 2 + chroma[(r+t.p[0])%12] + chroma[(r+t.p[1])%12]) / 4;
            if(score > best.s) {
                best.s = score;
                best.n = notes[(r + trans + 12) % 12] + t.n;
                best.h = notesHeb[(r + trans + 12) % 12] + " " + t.h;
            }
        });
    }

    if(best.n !== "--") updateUI(best.n, best.h);
}

function updateUI(n, h) {
    document.getElementById('chord-main').innerText = n;
    document.getElementById('chord-sub').innerText = h;
    const tag = document.createElement('div');
    tag.className = 'tag'; tag.innerText = n;
    const hRail = document.getElementById('hist');
    hRail.prepend(tag);
    if(hRail.children.length > 15) hRail.lastChild.remove();
    
    // הארת קלידים
    document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
    const root = n.replace(/m|7/g, '');
    const rIdx = notes.indexOf(root);
    let ivs = n.includes('m') ? [0,3,7] : [0,4,7];
    ivs.forEach(i => {
        const note = (rIdx + i) % 12;
        document.querySelectorAll(`.key[data-note="${note}"], .key[data-note="${note+12}"], .key[data-note="${note+24}"]`)
                .forEach(k => k.classList.add('active'));
    });
}

function drawWaveform(buffer) {
    const canvas = document.getElementById('waveform-canvas');
    const ctx = canvas.getContext('2d');
    const data = buffer.getChannelData(0);
    const step = Math.ceil(data.length / canvas.width);
    canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
    ctx.strokeStyle = '#00f2ff';
    ctx.beginPath();
    for(let i=0; i<canvas.width; i++) {
        let min = 1, max = -1;
        for(let j=0; j<step; j++) {
            const d = data[(i*step)+j];
            if(d < min) min = d; if(d > max) max = d;
        }
        ctx.moveTo(i, (1+min)*canvas.height/2);
        ctx.lineTo(i, (1+max)*canvas.height/2);
    }
    ctx.stroke();
}

document.getElementById('waveform-area').onclick = (e) => {
    if(!player.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
};

function loop() {
    const fmt = (s) => new Date(s * 1000).toISOString().substr(14, 5);
    document.getElementById('clock').innerText = fmt(player.currentTime);
    masterGain.gain.value = document.getElementById('vol').value / 100;
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
