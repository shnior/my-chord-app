<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>זיהוי אקורדים מקצועי</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 24px; padding: 30px; max-width: 550px; margin: 0 auto; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        h1 { color: #007bff; margin-bottom: 25px; font-size: 2.2em; }

        /* תיחום אזור בחירת הקובץ */
        .file-upload-box {
            border: 2px dashed #444;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            background: #252525;
            transition: 0.3s;
        }
        .file-upload-box:hover { border-color: #007bff; background: #2a2a2a; }
        input[type="file"] { color: #aaa; cursor: pointer; font-size: 14px; }

        #chord-result { font-size: 6.5em; color: #ffeb3b; margin: 10px 0; font-weight: 900; min-height: 1.2em; text-shadow: 0 0 30px rgba(255,235,59,0.3); }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; background: #252525; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .t-btn { background: #007bff; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .t-btn:hover { background: #0056b3; transform: scale(1.1); }
        
        .visualizer { display: flex; justify-content: center; gap: 5px; height: 40px; align-items: flex-end; margin-bottom: 20px; opacity: 0.3; }
        .bar { width: 10px; background: #4CAF50; border-radius: 2px; }

        #start-btn { background: #ff0055; color: white; border: none; padding: 18px 60px; font-size: 24px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(255,0,85,0.3); transition: 0.3s; }
        #start-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255,0,85,0.4); }
        #start-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.6; }
        
        audio { width: 100%; margin-top: 25px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h1>זיהוי אקורדים מקצועי</h1>
    
    <div class="file-upload-box">
        <p style="margin-top:0; color:#bbb;">בחר קובץ שמע לניתוח (MP3/WAV)</p>
        <input type="file" id="audio-file" accept="audio/*">
    </div>
    
    <div class="visualizer" id="visualizer"></div>
    
    <h2 id="chord-result">---</h2>

    <div class="controls">
        <button class="t-btn" onclick="changeTranspose(-1)">-</button>
        <span id="t-display" style="font-weight: bold; font-size: 1.2em; min-width: 120px;">סולם: 0</span>
        <button class="t-btn" onclick="changeTranspose(1)">+</button>
    </div>
    
    <button id="start-btn" disabled>התחל ניתוח</button>
    <audio id="audio-player" controls></audio>
</div>
