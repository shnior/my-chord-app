<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chord Studio Master V20 - מהדורת האולפן</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #080a0f; --card: #161b22; --gold: #ffcc00; --red: #ff4d4d; --text: #e6edf3; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* סרגל צד מקצועי */
        .sidebar { width: 340px; background: #010409; border-left: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .sidebar h1 { font-size: 18px; color: var(--accent); margin: 0; font-weight: 800; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .module { background: var(--card); border: 1px solid #30363d; padding: 15px; border-radius: 12px; }
        .label { font-size: 11px; color: #8b949e; font-weight: 700; display: block; margin-bottom: 8px; }
        .val { font-size: 28px; font-weight: 900; color: #fff; font-family: monospace; }

        /* אזור ראשי */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #1c2128 0%, #080a0f 100%); }
        .display-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #chord-name { font-size: 150px; font-weight: 950; color: var(--gold); text-shadow: 0 0 50px rgba(255,204,0,0.3); margin: 0; }
        #chord-type-heb { font-size: 24px; color: var(--accent); font-weight: 600; margin-top: 10px; }

        /* פעימה ויזואלית */
        #pulse { position: absolute; width: 400px; height: 400px; border: 4px solid var(--accent); border-radius: 50%; opacity: 0; pointer-events: none; }
        .hit { animation: pulse-hit 0.4s ease-out; }
        @keyframes pulse-hit { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }

        /* מדף תחתון - מקלדת והיסטוריה */
        .shelf { background: rgba(0,0,0,0.9); border-top: 1px solid #30363d; padding: 15px; }
        .piano { display: flex; justify-content: center; height: 85px; gap: 2px; direction: ltr; margin-bottom: 15px; }
        .key { width: 32px; background: #eee; border-radius: 0 0 4px 4px; border: 1px solid #999; cursor: pointer; transition: 0.1s; }
        .key.black { width: 22px; background: #222; height: 50px; margin-left: -11px; margin-right: -11px; z-index: 5; border-radius: 0 0 2px 2px; }
        .key.active { background: var(--red) !important; box-shadow: 0 0 20px var(--red); transform: translateY(3px); }

        .history { display: flex; gap: 10px; overflow-x: auto; direction: ltr; padding-bottom: 5px; }
        .h-item { background: #21262d; border: 1px solid #30363d; padding: 5px 12px; border-radius: 6px; color: var(--accent); font-weight: bold; }

        /* כפתורים */
        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.02); }
        .btn-sec { background: #30363d; color: #fff; margin-bottom: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        audio { width: 100%; margin-top: 10px; opacity: 0.7; filter: invert(1); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>אולפן אקורדים V20</h1>
    
    <div class="module">
        <span class="label">קצב (BPM)</span>
        <div id="bpm-val" class="val">---</div>
    </div>

    <div class="module">
        <span class="label">מהירות נגינה</span>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.05" value="1">
        <div id="rate-text" style="text-align:center; font-size:12px; color:var(--accent); margin-top:5px;">100% (רגיל)</div>
    </div>

    <div class="module">
        <span class="label">טרנספוזיציה</span>
        <input type="number" id="trans" value="0" style="width:100%; background:#000; color:var(--accent); border:1px solid #444; padding:5px; text-align:center; font-weight:bold;">
    </div>

    <div class="module">
        <span class="label">ווליום מטרונום + מקלדת</span>
        <input type="range" id="vol" min="0" max="100" value="40">
    </div>

    <button class="btn btn-sec" onclick="document.getElementById('fileIn').click()">טען קובץ שמע (MP3/WAV)</button>
    <input type="file" id="fileIn" style="display:none" accept="audio/*">
    
    <button id="start-btn" class="btn" disabled>הפעל מערכת זיהוי</button>
    
    <audio id="audio" controls></audio>
</div>

<div class="main">
    <div class="display-area">
        <div id="pulse"></div>
        <div id="chord-name">--</div>
        <div id="chord-type-heb">ממתין לקובץ...</div>
    </div>

    <div class="shelf">
        <div class="history" id="history"></div>
        <div class="piano" id="piano"></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio'), chordDisp = document.getElementById('chord-name');
    const bpmDisp = document.getElementById('bpm-val'), pulse = document.getElementById('pulse');
    const historyDiv = document.getElementById('history'), piano = document.getElementById('piano');
    const rateSlider = document.getElementById('rate'), rateTxt = document.getElementById('rate-text');
    
    let audioCtx, source, meyda, baseBPM = 120, nextBeat = 0, beatCount = 0;

    // בניית מקלדת והוספת צליל בלחיצה
    const blackKeys = [1, 3, 6, 8, 10];
    for(let i=0; i<36; i++) {
        const k = document.createElement('div');
        k.className = `key ${blackKeys.includes(i%12) ? 'black' : ''}`;
        k.dataset.note = i;
        k.onmousedown = () => playSynthNote(i);
        piano.appendChild(k);
    }

    rateSlider.oninput = () => {
        audio.playbackRate = rateSlider.value;
        rateTxt.innerText = `${Math.round(rateSlider.value * 100)}%`;
    };

    document.getElementById('fileIn').onchange = async (e) => {
        if(e.target.files[0]) {
            audio.src = URL.createObjectURL(e.target.files[0]);
            await detectBPM(e.target.files[0]);
            document.getElementById('start-btn').disabled = false;
        }
    };

    async function detectBPM(file) {
        const offCtx = new OfflineAudioContext(1, 44100 * 30, 44100);
        const buf = await offCtx.decodeAudioData(await file.arrayBuffer());
        const src = offCtx.createBufferSource(); src.buffer = buf;
        const low = offCtx.createBiquadFilter(); low.type = "lowpass"; low.frequency.value = 150;
        src.connect(low).connect(offCtx.destination); src.start(0);
        const rendered = await offCtx.startRendering();
        const data = rendered.getChannelData(0);
        let peaks = [];
        for(let i=0; i<data.length; i+=300) if(Math.abs(data[i]) > 0.8) peaks.push(i/44100);
        let diffs = [];
        for(let i=1; i<peaks.length; i++) { let d = peaks[i]-peaks[i-1]; if(d>0.3 && d<1.0) diffs.push(d); }
        if(diffs.length > 0) {
            baseBPM = Math.round(60 / (diffs.reduce((a,b)=>a+b)/diffs.length));
            bpmDisp.innerText = baseBPM;
        }
    }

    // פונקציית צליל (סינתיסייזר)
    function playSynthNote(noteIndex, duration = 0.5) {
        if(!audioCtx) return;
        const freq = 440 * Math.pow(2, (noteIndex - 21) / 12); // חישוב תדר לפי חצי טון
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(document.getElementById('vol').value / 1000, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    document.getElementById('start-btn').onclick = async () => {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
        if(!source) {
            source = audioCtx.createMediaElementSource(audio);
            source.connect(audioCtx.destination);
        }

        if(meyda) meyda.stop();
        meyda = Meyda.createMeydaAnalyzer({
            audioContext: audioCtx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                if(audio.paused) return;
                
                // מטרונום
                const now = audioCtx.currentTime;
                const beatDur = 60 / (baseBPM * audio.playbackRate);
                if(now >= nextBeat) {
                    if(nextBeat === 0) nextBeat = now;
                    playClick();
                    nextBeat += beatDur;
                    beatCount = (beatCount % 4) + 1;
                }

                // זיהוי אקורדים משופר
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const types = [
                    {n:'', p:[4,7], h:'מז׳ור'}, {n:'m', p:[3,7], h:'מינור'}, 
                    {n:'7', p:[4,10], h:'7 דומיננטי'}, {n:'maj7', p:[4,11], h:'מז׳ור 7'}, 
                    {n:'dim', p:[3,6], h:'מוקטן'}
                ];
                const trans = parseInt(document.getElementById('trans').value);
                let best = "---", top = 0.45, currentH = "";

                for(let r=0; r<12; r++) {
                    for(let t of types) {
                        let score = (f.chroma[r] * 1.7 + f.chroma[(r+t.p[0])%12] + f.chroma[(r+t.p[1])%12]) / 3.7;
                        if(score > top) { top = score; best = notes[(r+trans+12)%12] + t.n; currentH = t.h; }
                    }
                }

                if(best !== "---" && chordDisp.innerText !== best) {
                    chordDisp.innerText = best;
                    document.getElementById('chord-type-heb').innerText = currentH;
                    updateUI(best);
                }
            }
        });
        meyda.start(); audio.play(); nextBeat = audioCtx.currentTime;
    };

    function playClick() {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.frequency.value = beatCount === 4 ? 800 : 400;
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        pulse.classList.remove('hit');
        void pulse.offsetWidth; pulse.classList.add('hit');
    }

    function updateUI(chord) {
        const tag = document.createElement('div'); tag.className = 'h-item';
        tag.innerText = chord; historyDiv.prepend(tag);
        if(historyDiv.children.length > 25) historyDiv.lastChild.remove();

        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const root = chord.replace(/m|7|maj7|dim/g, '');
        const rootIdx = notes.indexOf(root);
        let intervals = [0,4,7];
        if(chord.includes('maj7')) intervals = [0,4,7,11];
        else if(chord.includes('7')) intervals = [0,4,7,10];
        else if(chord.includes('m')) intervals = [0,3,7];
        else if(chord.includes('dim')) intervals = [0,3,6];

        intervals.forEach(i => {
            const n = (rootIdx + i) % 12;
            document.querySelectorAll(`.key[data-note="${n}"], .key[data-note="${n+12}"], .key[data-note="${n+24}"]`).forEach(k => k.classList.add('active'));
            // אופציונלי: השמעת האקורד בזמן זיהוי (מבוטל כרגע כדי לא להפריע לשיר)
        });
    }
</script>
</body>
</html>
