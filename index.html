<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מזהה אקורדים מקצועי</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 40px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 30px; max-width: 500px; margin: 0 auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input[type="file"] { margin: 20px 0; background: #333; padding: 10px; border-radius: 8px; width: 80%; color: white; border: 1px solid #444; }
        #start-btn { background: #007bff; color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        #start-btn:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        #start-btn:hover:not(:disabled) { background: #0056b3; transform: scale(1.05); }
        #chord-result { font-size: 4em; color: #ffeb3b; margin: 20px 0; min-height: 1.2em; text-shadow: 0 0 20px rgba(255,235,59,0.5); }
        .visualizer { display: flex; justify-content: center; gap: 8px; height: 120px; align-items: flex-end; margin-bottom: 20px; }
        .bar { width: 20px; background: #4CAF50; transition: height 0.1s; border-radius: 4px 4px 0 0; }
        .label { font-size: 11px; color: #888; margin-top: 5px; }
        audio { width: 100%; margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h1>מזהה אקורדים</h1>
    <p>1. בחר קובץ שמע</p>
    <input type="file" id="audio-file" accept="audio/*">
    
    <div class="visualizer" id="visualizer"></div>
    
    <h2 id="chord-result">---</h2>
    
    <button id="start-btn" disabled>התחל ניתוח</button>
    <audio id="audio-player" controls style="display:none;"></audio>
</div>

<script>
    let audioContext;
    let source;
    let analyzer;

    const startBtn = document.getElementById('start-btn');
    const audioFile = document.getElementById('audio-file');
    const audioPlayer = document.getElementById('audio-player');
    const chordResult = document.getElementById('chord-result');

    // בניית הויזואליזציה
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    notes.forEach((note, i) => {
        const col = document.createElement('div');
        col.style.display = 'flex'; col.style.flexDirection = 'column'; col.style.alignItems = 'center';
        col.innerHTML = `<div id="bar-${i}" class="bar" style="height: 0%"></div><div class="label">${note}</div>`;
        document.getElementById('visualizer').appendChild(col);
    });

    const CHORD_TEMPLATES = {
        'C Major': [0, 4, 7], 'C# Major': [1, 5, 8], 'D Major': [2, 6, 9],
        'Eb Major': [3, 7, 10], 'E Major': [4, 8, 11], 'F Major': [5, 9, 0],
        'F# Major': [6, 10, 1], 'G Major': [7, 11, 2], 'Ab Major': [8, 0, 3],
        'A Major': [9, 1, 4], 'Bb Major': [10, 2, 5], 'B Major': [11, 3, 6],
        'C Minor': [0, 3, 7], 'D Minor': [2, 5, 9], 'E Minor': [4, 7, 11],
        'A Minor': [9, 0, 4], 'G Minor': [7, 10, 2]
    };

    audioFile.onchange = (e) => {
        if (e.target.files[0]) {
            audioPlayer.src = URL.createObjectURL(e.target.files[0]);
            audioPlayer.style.display = 'block';
            startBtn.disabled = false;
            chordResult.innerText = "מוכן!";
        }
    };

    startBtn.onclick = async () => {
        // בדיקה קריטית אם הספרייה נטענה
        if (typeof Meyda === 'undefined') {
            alert("שגיאה: הספרייה Meyda לא נטענה. וודא שיש לך חיבור לאינטרנט ונסה לרענן את הדף.");
            return;
        }

        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            await audioContext.resume();

            if (!source) {
                source = audioContext.createMediaElementSource(audioPlayer);
                source.connect(audioContext.destination);
            }

            if (analyzer) analyzer.stop();

            analyzer = Meyda.createMeydaAnalyzer({
                audioContext: audioContext,
                source: source,
                bufferSize: 1024,
                featureExtractors: ['chroma'],
                callback: features => {
                    const chroma = features.chroma;
                    chroma.forEach((val, i) => {
                        const bar = document.getElementById(`bar-${i}`);
                        bar.style.height = (val * 100) + '%';
                        bar.style.background = val > 0.6 ? '#ffeb3b' : '#4CAF50';
                    });

                    let bestChord = "---";
                    let maxSim = 0.5;
                    for (const [name, notesIdx] of Object.entries(CHORD_TEMPLATES)) {
                        let sim = notesIdx.reduce((sum, idx) => sum + chroma[idx],
