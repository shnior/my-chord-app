<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Studio Pro | Interactive Audio Edition</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root {
            --bg-deep: #05070a; --panel: #0d1117; --accent: #00f2ff;
            --gold: #ffcc00; --red: #ff3e3e; --border: #30363d;
            --text: #e6edf3; --gray: #8b949e;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text); margin: 0; display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 1fr 280px; height: 100vh; overflow: hidden; direction: rtl; }

        /* סרגל צד */
        aside {
            grid-row: 1 / -1; background: var(--panel); border-left: 1px solid var(--border);
            padding: 25px; display: flex; flex-direction: column; gap: 20px; box-shadow: 10px 0 50px rgba(0,0,0,0.5); z-index: 20;
        }
        .logo-area { border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 10px; text-align: center; }
        .logo-area h1 { font-size: 24px; margin: 0; color: var(--accent); font-weight: 900; }

        .module { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .label { font-size: 11px; color: var(--gray); font-weight: 800; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .val-large { font-size: 38px; font-weight: 900; text-align: center; font-family: monospace; color: #fff; }

        /* במה מרכזית */
        main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #161b22 0%, #05070a 100%); grid-column: 2; grid-row: 1; }
        .chord-viewer { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; pointer-events: none; }
        #main-chord-display { font-size: 220px; font-weight: 950; color: var(--gold); text-shadow: 0 0 80px rgba(255,204,0,0.3); margin: 0; line-height: 0.8; }
        #chord-description-heb { font-size: 32px; color: var(--accent); font-weight: 300; letter-spacing: 5px; margin-top: 20px; }

        /* ויזואליזציה אינטראקטיבית */
        #spectrum-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 60%; opacity: 0.2; pointer-events: none; }
        
        /* הפיכת אזור גל הקול ללחיץ (Interactive Seek Bar) */
        #interactive-timeline { position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; cursor: pointer; border-top: 1px solid rgba(255,255,255,0.05); }
        #waveform-canvas { width: 100%; height: 100%; pointer-events: none; opacity: 0.5; }

        /* אזור תחתון - היסטוריה ומקלדת */
        footer { grid-column: 2; grid-row: 2; background: #010409; border-top: 1px solid var(--border); padding: 20px; display: grid; grid-template-rows: auto 1fr; gap: 15px; }
        .history-rail { display: flex; gap: 12px; overflow-x: auto; padding: 10px; direction: ltr; scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-chip { background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; color: var(--accent); font-weight: 900; font-size: 18px; min-width: 80px; text-align: center; }
        
        .piano-wrapper { display: flex; justify-content: center; height: 120px; direction: ltr; }
        .k { width: 42px; background: #f0f0f0; border: 1px solid #999; border-radius: 0 0 6px 6px; position: relative; }
        .k.b { width: 28px; background: #1a1a1a; height: 70px; margin-left: -14px; margin-right: -14px; z-index: 5; border: 1px solid #000; }
        .k.active-note { background: var(--red) !important; box-shadow: 0 10px 25px var(--red); border: none; }

        /* כפתורים ופקדים */
        .btn { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; font-size: 14px; }
        .btn:hover:not(:disabled) { filter: brightness(1.2); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        input[type="number"] { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<aside>
    <div class="logo-area">
        <h1>MAESTRO STUDIO</h1>
        <span>Shneior Eisenbach Pro Edition v22.1</span>
    </div>

    <div class="module">
        <label>קצב (BPM)</label>
        <div id="bpm-display" class="val-large">---</div>
    </div>

    <div class="module">
        <label>טרנספוזיציה</label>
        <input type="number" id="transpose-control" value="0">
    </div>

    <div class="module">
        <label>ווליום שמע</label>
        <input type="range" id="volume-control" min="0" max="100" value="70">
    </div>

    <button class="btn" style="background: #21262d; color: #fff; margin-bottom: 10px;" onclick="document.getElementById('audio-upload').click()">טען שיר</button>
    <input type="file" id="audio-upload" style="display:none" accept="audio/*">
    
    <button id="main-power-btn" class="btn" disabled>הפעל ניתוח והשמעה</button>
    
    <div id="time-display" style="text-align: center; font-family: monospace; color: var(--gray); font-size: 14px; margin-top: auto;">00:00 / 00:00</div>
</aside>

<main>
    <canvas id="spectrum-canvas"></canvas>
    
    <div id="interactive-timeline" title="לחץ כדי לקפוץ לנקודה בשיר">
        <canvas id="waveform-canvas"></canvas>
    </div>

    <div class="chord-viewer">
        <div id="main-chord-display">--</div>
        <div id="chord-description-heb">טען שיר להתחלה</div>
    </div>

    <footer>
        <div class="history-rail" id="history-container"></div>
        <div class="piano-wrapper" id="piano-container"></div>
    </footer>
</main>

// === תיקון מס' 1: מנוע יציבות רגיש יותר ===
class ChordStabilizer {
    constructor() {
        this.buffer = [];
        this.bufferSize = 4; // שומר רק 4 דגימות אחרונות
    }

    getStabilizedChord(newChord) {
        this.buffer.push(newChord);
        if (this.buffer.length > this.bufferSize) this.buffer.shift();
        
        const counts = {};
        let maxCount = 0;
        let mostFrequent = null;
        
        for (let c of this.buffer) {
            counts[c] = (counts[c] || 0) + 1;
            if (counts[c] > maxCount) {
                maxCount = counts[c];
                mostFrequent = c;
            }
        }
        
        // עכשיו מספיק שזיהינו את אותו אקורד פעמיים בטווח קצר, והוא יאושר. 
        if (maxCount >= 2) return mostFrequent;
        return null;
    }
}
