<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Studio Elite V21 - הגרסה המקצועית</title>
    <script src="https://unpkg.com/meyda@5.6.0/dist/web/meyda.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; --gold: #ffcc00; --red: #ff3e3e; --gray: #30363d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* סרגל צד - ניהול אולפן */
        .sidebar { width: 350px; background: #010409; border-left: 1px solid var(--gray); padding: 25px; display: flex; flex-direction: column; gap: 20px; box-shadow: 10px 0 50px rgba(0,0,0,0.5); }
        .sidebar h1 { font-size: 18px; color: var(--accent); margin: 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; letter-spacing: 1px; }

        .widget { background: var(--panel); border: 1px solid var(--gray); padding: 15px; border-radius: 12px; }
        .widget label { font-size: 11px; color: #8b949e; font-weight: 800; display: block; margin-bottom: 10px; text-transform: uppercase; }
        .val-large { font-family: 'Courier New', monospace; font-size: 35px; font-weight: 900; color: #fff; text-align: center; }

        /* אזור ראשי - תצוגת אקורדים */
        .stage { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #161b22 0%, #05070a 100%); }
        .chord-viewer { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #main-chord { font-size: 180px; font-weight: 950; color: var(--gold); line-height: 0.8; text-shadow: 0 0 70px rgba(255,204,0,0.4); margin: 0; transition: transform 0.1s; }
        #chord-desc { font-size: 28px; color: var(--accent); font-weight: 400; margin-top: 20px; letter-spacing: 4px; }

        /* פעימה ויזואלית (Pulse) */
        #beat-ring { position: absolute; width: 450px; height: 450px; border: 3px solid var(--accent); border-radius: 50%; opacity: 0; pointer-events: none; }
        .pulse-animation { animation: ring-pulse 0.4s ease-out; }
        @keyframes ring-pulse { 0% { transform: scale(0.8); opacity: 1; border-width: 15px; } 100% { transform: scale(1.3); opacity: 0; border-width: 1px; } }

        /* מדף תחתון - מקלדת והיסטוריה */
        .bottom-shelf { background: rgba(0,0,0,0.95); border-top: 1px solid var(--gray); padding: 20px; }
        .piano-wrapper { display: flex; justify-content: center; height: 90px; gap: 2px; direction: ltr; margin-bottom: 20px; }
        .key { width: 35px; background: #f0f0f0; border-radius: 0 0 6px 6px; border: 1px solid #999; cursor: pointer; position: relative; transition: background 0.1s, transform 0.05s; }
        .key:active { transform: translateY(4px); background: #ddd; }
        .key.black { width: 24px; background: #1a1a1a; height: 55px; margin-left: -12px; margin-right: -12px; z-index: 5; border: 1px solid #000; }
        .key.active-note { background: var(--red) !important; box-shadow: 0 0 25px var(--red); border: none; }

        .history-list { display: flex; gap: 12px; overflow-x: auto; direction: ltr; padding: 5px; scrollbar-width: none; }
        .h-tag { background: #1c2128; border: 1px solid var(--gray); padding: 8px 18px; border-radius: 8px; color: var(--accent); font-weight: 900; font-size: 15px; }

        /* כפתורים ופונקציות */
        .btn { cursor: pointer; border: none; border-radius: 10px; padding: 15px; font-weight: 900; transition: 0.3s; font-size: 14px; width: 100%; text-align: center; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 0 25px rgba(0,242,255,0.5); transform: translateY(-2px); }
        .btn-secondary { background: #21262d; color: #fff; margin-bottom: 10px; border: 1px solid var(--gray); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        input[type="number"] { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; width: 100%; text-align: center; font-size: 18px; font-weight: bold; }
        audio { width: 100%; margin-top: 15px; filter: invert(1) hue-rotate(180deg); opacity: 0.7; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>אולפן אקורדים V21</h1>
    
    <div class="widget">
        <label>קצב שיר (BPM)</label>
        <div id="bpm-display" class="val-large">---</div>
    </div>

    <div class="widget">
        <label>מהירות נגינה</label>
        <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.05" value="1">
        <div id="rate-label" style="text-align:center; font-size:12px; color:var(--accent); margin-top:8px; font-weight:bold;">100% (רגיל)</div>
    </div>

    <div class="widget">
        <label>טרנספוזיציה (Transpose)</label>
        <input type="number" id="transpose-input" value="0">
    </div>

    <div class="widget">
        <label>ווליום (מטרונום ומקלדת)</label>
        <input type="range" id="volume-slider" min="0" max="100" value="40">
    </div>

    <button class="btn btn-secondary" onclick="document.getElementById('audio-upload').click()">טען שיר מהמחשב</button>
    <input type="file" id="audio-upload" style="display:none" accept="audio/*">
    
    <button id="power-btn" class="btn btn-primary" disabled>הפעל מנוע זיהוי</button>
    
    <audio id="player" controls></audio>
</div>

<div class="stage">
    <div class="chord-viewer">
        <div id="beat-ring"></div>
        <div id="main-chord">--</div>
        <div id="chord-desc">ממתין לפקודה...</div>
    </div>

    <div class="bottom-shelf">
        <div class="history-list" id="chord-history"></div>
        <div class="piano-wrapper" id="piano-keys"></div>
    </div>
</div>

<script>
    const player = document.getElementById('player'), mainChord = document.getElementById('main-chord');
    const bpmDisplay = document.getElementById('bpm-display'), beatRing = document.getElementById('beat-ring');
    const historyContainer = document.getElementById('chord-history'), pianoContainer = document.getElementById('piano-keys');
    const rateSlider = document.getElementById('rate-slider'), rateLabel = document.getElementById('rate-label');
    const transInput = document.getElementById('transpose-input'), volSlider = document.getElementById('volume-slider');
    
    let audioCtx, source, meyda, baseBPM = 120, nextBeatTime = 0, currentBeat = 0;

    // טעינת הגדרות שמורות
    transInput.value = localStorage.getItem('chord_trans') || 0;
    volSlider.value = localStorage.getItem('chord_vol') || 40;

    // יצירת המקלדת המנגנת (36 קלידים)
    const blackKeyPattern = [1, 3, 6, 8, 10];
    for(let i=0; i<36; i++) {
        const k = document.createElement('div');
        k.className = `key ${blackKeyPattern.includes(i%12) ? 'black' : ''}`;
        k.dataset.note = i;
        k.onmousedown = (e) => { e.preventDefault(); playSound(i); };
        pianoContainer.appendChild(k);
    }

    // ניהול מהירות
    rateSlider.oninput = () => {
        player.playbackRate = rateSlider.value;
        rateLabel.innerText = `${Math.round(rateSlider.value * 100)}%`;
    };

    // העלאת קובץ וזיהוי BPM
    document.getElementById('audio-upload').onchange = async (e) => {
        if(e.target.files[0]) {
            mainChord.innerText = "...";
            player.src = URL.createObjectURL(e.target.files[0]);
            await runBPMAnalysis(e.target.files[0]);
            document.getElementById('power-btn').disabled = false;
            mainChord.innerText = "--";
            document.getElementById('chord-desc').innerText = "מוכן לנגינה";
        }
    };

    async function runBPMAnalysis(file) {
        const offlineCtx = new OfflineAudioContext(1, 44100 * 30, 44100);
        const buffer = await offlineCtx.decodeAudioData(await file.arrayBuffer());
        const source = offlineCtx.createBufferSource(); source.buffer = buffer;
        const filter = offlineCtx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 150;
        source.connect(filter).connect(offlineCtx.destination); source.start(0);
        const rendered = await offlineCtx.startRendering();
        const data = rendered.getChannelData(0);
        let peaks = [];
        for(let i=0; i<data.length; i+=300) if(Math.abs(data[i]) > 0.85) peaks.push(i/44100);
        let intervals = [];
        for(let i=1; i<peaks.length; i++) { let d = peaks[i]-peaks[i-1]; if(d>0.3 && d<1.0) intervals.push(d); }
        if(intervals.length > 0) {
            baseBPM = Math.round(60 / (intervals.reduce((a,b)=>a+b)/intervals.length));
            bpmDisplay.innerText = baseBPM;
        }
    }

    // מנוע סאונד - פסנתר חשמלי וירטואלי
    function playSound(noteIndex, length = 0.6) {
        if(!audioCtx) return;
        const frequency = 440 * Math.pow(2, (noteIndex - 21) / 12);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle'; // צליל רך יותר
        osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        gain.gain.setValueAtTime(volSlider.value / 800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + length);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + length);
    }

    // הפעלת המערכת
    document.getElementById('power-btn').onclick = async () => {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
        if(!source) {
            source = audioCtx.createMediaElementSource(player);
            source.connect(audioCtx.destination);
        }

        if(meyda) meyda.stop();
        meyda = Meyda.createMeydaAnalyzer({
            audioContext: audioCtx, source: source, bufferSize: 8192,
            featureExtractors: ['chroma'],
            callback: f => {
                if(player.paused) return;
                
                // לוגיקת מטרונום
                const now = audioCtx.currentTime;
                const beatDuration = 60 / (baseBPM * player.playbackRate);
                if(now >= nextBeatTime) {
                    if(nextBeatTime === 0) nextBeatTime = now;
                    playMetronomeClick();
                    nextBeatTime += beatDuration;
                    currentBeat = (currentBeat % 4) + 1;
                }

                // זיהוי אקורדים מתקדם
                const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                const types = [
                    {n:'', p:[4,7], h:'מז׳ור'}, {n:'m', p:[3,7], h:'מינור'}, 
                    {n:'7', p:[4,10], h:'7 דומיננטי'}, {n:'maj7', p:[4,11], h:'מז׳ור 7'}, 
                    {n:'dim', p:[3,6], h:'מוקטן'}
                ];
                
                const trans = parseInt(transInput.value);
                localStorage.setItem('chord_trans', trans);
                localStorage.setItem('chord_vol', volSlider.value);

                let bestChord = "---", maxScore = 0.48, bestDesc = "";

                for(let r=0; r<12; r++) {
                    for(let t of types) {
                        // שקלול הרמוני - תו השורש מקבל עדיפות גבוהה
                        let score = (f.chroma[r] * 1.9 + f.chroma[(r+t.p[0])%12] + f.chroma[(r+t.p[1])%12]) / 3.9;
                        if(score > maxScore) {
                            maxScore = score;
                            bestChord = notes[(r + trans + 12) % 12] + t.n;
                            bestDesc = notes[(r + trans + 12) % 12] + " " + t.h;
                        }
                    }
                }

                if(bestChord !== "---" && mainChord.innerText !== bestChord) {
                    mainChord.innerText = bestChord;
                    document.getElementById('chord-desc').innerText = bestDesc;
                    updateVisuals(bestChord);
                }
            }
        });
        meyda.start(); player.play(); nextBeatTime = audioCtx.currentTime;
    };

    function playMetronomeClick() {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.frequency.value = currentBeat === 4 ? 900 : 450;
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        
        beatRing.classList.remove('pulse-animation');
        void beatRing.offsetWidth; 
        beatRing.classList.add('pulse-animation');
    }

    function updateVisuals(chord) {
        // היסטוריה
        const tag = document.createElement('div'); tag.className = 'h-tag';
        tag.innerText = chord; historyContainer.prepend(tag);
        if(historyContainer.children.length > 20) historyContainer.lastChild.remove();

        // עדכון מקלדת ויזואלי
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active-note'));
        const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const root = chord.replace(/m|7|maj7|dim/g, '');
        const rootIdx = notes.indexOf(root);
        let intervals = [0,4,7];
        
        if(chord.includes('maj7')) intervals = [0,4,7,11];
        else if(chord.includes('7')) intervals = [0,4,7,10];
        else if(chord.includes('m')) intervals = [0,3,7];
        else if(chord.includes('dim')) intervals = [0,3,6];

        intervals.forEach(i => {
            const n = (rootIdx + i) % 12;
            document.querySelectorAll(`.key[data-note="${n}"], .key[data-note="${n+12}"], .key[data-note="${n+24}"]`).forEach(k => k.classList.add('active-note'));
        });
    }
</script>
</body>
</html>
